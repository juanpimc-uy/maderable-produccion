<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<title>Maderable · Tiempos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap');
:root {
  --bg:#0f0f0f; --panel:#1e1e1e; --card:#252525; --border:#2a2a2a; --borderL:#333;
  --text:#e8e8e8; --muted:#888; --faint:#1a1a1a;
  --accent:#FFD600; --amber:#FFD600; --green:#3DD68C; --red:#F05C5C; --blue:#5B8DEF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.mono{font-family:'Space Mono',monospace;}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar { width:200px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-logo { padding:18px 16px; border-bottom:1px solid var(--border); font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:var(--amber); letter-spacing:2px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer; font-size:13px; color:var(--muted); border-left:3px solid transparent; transition:all .15s; user-select:none; }
.nav-item:hover { background:var(--faint); color:var(--text); }
.nav-item.active { background:rgba(245,166,35,.08); color:var(--amber); border-left-color:var(--amber); font-weight:600; }
.nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }

/* ── Layout ─────────────────────────────────────────────────────────── */
.shell { display:flex; height:100vh; overflow:hidden; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.content { flex:1; overflow-y:auto; padding:24px; }

/* ── Tabs ────────────────────────────────────────────────────────────── */
.tabs-bar{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab-btn{
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;padding:8px 20px;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--muted);cursor:pointer;transition:color .15s,border-color .15s;
  position:relative;top:1px;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;}.tab-panel.active{display:block;}

/* ── Controls bar ────────────────────────────────────────────────────── */
.ctrl-bar{display:flex;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.ctrl-field{display:flex;flex-direction:column;gap:4px;}
.ctrl-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
.ctrl-input{
  background:var(--panel);border:1px solid var(--border);border-radius:5px;
  padding:7px 10px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:12px;outline:none;transition:border-color .15s;
}
.ctrl-input:focus{border-color:var(--accent);}
.ctrl-select{
  background:var(--panel);border:1px solid var(--border);border-radius:5px;
  padding:7px 10px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:12px;outline:none;cursor:pointer;
}
.ctrl-select option{background:var(--panel);}
.btn-load{
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:.5px;padding:8px 20px;background:var(--accent);
  color:#000;border:none;border-radius:5px;cursor:pointer;
  transition:opacity .15s;white-space:nowrap;
}
.btn-load:hover{opacity:.85;}
.btn-load:disabled{opacity:.45;cursor:not-allowed;}

/* ── Employee cards ──────────────────────────────────────────────────── */
.emp-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;}
.emp-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;user-select:none;
  transition:background .15s;border-radius:8px;
}
.emp-card-header:hover{background:rgba(255,255,255,.03);}
.emp-card-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}
.emp-card-meta{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
.emp-card-right{display:flex;align-items:center;gap:10px;}
.badge-activo{background:rgba(61,214,140,.15);color:var(--green);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:3px;text-transform:uppercase;}
.badge-completo{background:var(--faint);color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:3px;text-transform:uppercase;}
.chevron{font-size:12px;color:var(--muted);transition:transform .2s;}
.emp-card-body{border-top:1px solid var(--border);padding:16px 18px;display:none;}
.emp-card-body.open{display:block;}

/* ── Jornada row ─────────────────────────────────────────────────────── */
.jornada-row{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.jornada-field{display:flex;align-items:center;gap:6px;}
.jornada-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.jornada-input{
  background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:5px 8px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:11px;outline:none;transition:border-color .15s;
}
.jornada-input:focus{border-color:var(--accent);}
.jornada-input.changed{border-color:var(--accent);}

/* ── Session table ───────────────────────────────────────────────────── */
.ses-wrap{overflow-x:auto;}
table.ses-table{width:100%;border-collapse:collapse;font-size:12px;}
table.ses-table th{
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;
  color:var(--muted);text-transform:uppercase;text-align:left;
  padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap;
}
table.ses-table td{
  padding:5px 6px;border-bottom:1px solid rgba(42,42,42,.7);
  vertical-align:middle;
}
table.ses-table tr:last-child td{border-bottom:none;}
table.ses-table tr.row-modified{border-left:3px solid var(--accent);}
table.ses-table tr:not(.row-modified){border-left:3px solid transparent;}
.ses-input{
  background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:4px 6px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:11px;outline:none;width:100%;transition:border-color .15s;
}
.ses-input:focus{border-color:var(--accent);}
.ses-select{
  background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:4px 6px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:11px;outline:none;cursor:pointer;width:100%;
}
.ses-select option{background:var(--card);}
.ses-error{font-family:'Space Mono',monospace;font-size:9px;color:var(--red);margin-top:2px;}
.en-curso{color:var(--green);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.5px;}
.btn-add-ses{
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:.5px;padding:5px 14px;background:transparent;
  border:1px solid var(--border);border-radius:4px;color:var(--muted);
  cursor:pointer;margin-top:10px;transition:color .15s,border-color .15s;
}
.btn-add-ses:hover{color:var(--accent);border-color:var(--accent);}
.btn-eliminar{
  font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;
  background:transparent;border:1px solid var(--border);border-radius:3px;
  color:var(--muted);cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;
}
.btn-eliminar:hover{color:var(--red);border-color:var(--red);}

/* ── Day cards (tab 2) ───────────────────────────────────────────────── */
.day-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
.day-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;cursor:pointer;user-select:none;border-radius:8px;
  transition:background .15s;
}
.day-card-header:hover{background:rgba(255,255,255,.03);}
.day-card-title{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--text);}
.day-card-body{border-top:1px solid var(--border);padding:14px 18px;display:none;}
.day-card-body.open{display:block;}

/* ── Reporte table ───────────────────────────────────────────────────── */
.rep-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px;}
.rep-table th{
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;
  color:var(--muted);text-transform:uppercase;text-align:left;
  padding:8px 12px;border-bottom:1px solid var(--border);
}
.rep-table td{padding:8px 12px;border-bottom:1px solid var(--border);}
.rep-table tr.rep-total td{background:var(--card);font-family:'Space Mono',monospace;font-weight:700;}
.rep-table tr.rep-sep td{background:transparent;padding:4px 0;border-bottom:none;}
.extras-pos{color:var(--red);font-weight:700;}

/* ── Export buttons ──────────────────────────────────────────────────── */
.export-bar{display:flex;gap:10px;margin-top:20px;}
.btn-export{
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:.5px;padding:8px 18px;border:1px solid var(--border);
  background:transparent;color:var(--muted);border-radius:5px;cursor:pointer;
  transition:color .15s,border-color .15s;
}
.btn-export:hover:not(:disabled){color:var(--accent);border-color:var(--accent);}
.btn-export:disabled{opacity:.4;cursor:not-allowed;}

/* ── Floating save button ────────────────────────────────────────────── */
#btn-guardar-fijo{
  position:fixed;bottom:24px;right:24px;z-index:100;
  font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
  letter-spacing:.5px;padding:12px 22px;background:var(--accent);
  color:#000;border:none;border-radius:8px;cursor:pointer;
  display:none;box-shadow:0 4px 20px rgba(255,214,0,.25);
  transition:opacity .15s;
}
#btn-guardar-fijo:hover{opacity:.85;}
#btn-guardar-fijo:disabled{opacity:.6;cursor:not-allowed;}

/* ── Misc ────────────────────────────────────────────────────────────── */
.empty-msg{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);padding:20px 0;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.add-row-tr td{background:rgba(255,214,0,.04);}
/* ── Filter chips ──────────────────────────────────────────────── */
.filter-bar{display:flex;gap:4px;margin-bottom:16px;}
.filter-chip{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.5px;padding:5px 14px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;text-transform:uppercase;}
.filter-chip:hover{border-color:var(--accent);color:var(--accent);}
.filter-chip.active{background:var(--accent);color:#000;border-color:var(--accent);}
/* ── Anomaly ────────────────────────────────────────────────────── */
tr.anomalia-row{background:#2a1f1f !important;}
tr.anomalia-row:hover{background:#332222 !important;}
.badge-anomalia{font-family:'Space Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;letter-spacing:.5px;text-transform:uppercase;margin-left:4px;}
.badge-anomalia.pendiente{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25);}
.badge-anomalia.aprobada{background:rgba(61,214,140,.12);color:var(--green);border:1px solid rgba(61,214,140,.25);}
.badge-anomalia.rechazada{background:rgba(240,92,92,.12);color:var(--red);border:1px solid rgba(240,92,92,.25);}
.dur-tachada{text-decoration:line-through;color:var(--muted);}
.btn-aprobar,.btn-rechazar{font-family:'Space Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;border:none;cursor:pointer;margin-left:2px;transition:opacity .15s;}
.btn-aprobar{background:rgba(61,214,140,.15);color:var(--green);}
.btn-rechazar{background:rgba(240,92,92,.15);color:var(--red);}
.btn-aprobar:hover,.btn-rechazar:hover{opacity:.7;}
.descuento-info{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);margin-top:1px;}
/* ── Print ──────────────────────────────────────────────────────── */
@media print{
  body{background:#fff !important;color:#000 !important;}
  .shell{display:block !important;}
  .sidebar,.tabs-bar,.ctrl-bar,.filter-bar,.export-bar,#btn-guardar-fijo,.btn-eliminar,.btn-add-ses{display:none !important;}
  .main,.content{overflow:visible !important;}
  .rep-table th,.rep-table td{color:#000 !important;border-color:#ccc !important;}
  .rep-table{font-size:10px !important;}
  .rep-total td{background:#eee !important;}
  .extras-pos{color:#c00 !important;}
  #print-header{display:block !important;}
}
#print-header{display:none;text-align:center;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;margin-bottom:16px;}

/* ── Session edit modal ─────────────────────────────────────────── */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;
  background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .15s;
}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal-box{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);
}
.modal-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}
.modal-subtitle{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
.modal-close{
  background:none;border:none;color:var(--muted);font-size:18px;
  cursor:pointer;padding:4px 8px;transition:color .15s;
}
.modal-close:hover{color:var(--red);}
.modal-body{padding:20px;}
.modal-section{margin-bottom:18px;}
.modal-label{
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;
  color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:block;
}
.modal-time-row{display:flex;gap:12px;align-items:flex-start;}
.modal-time-field{flex:1;}
.modal-time-field input[type="time"]{
  background:var(--card);border:1px solid var(--border);border-radius:5px;
  padding:8px 10px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:13px;outline:none;width:100%;transition:border-color .15s;
}
.modal-time-field input[type="time"]:focus{border-color:var(--accent);}
.modal-time-field input[type="time"]:disabled{opacity:.5;cursor:not-allowed;}
.link-badge{
  display:inline-block;font-family:'Space Mono',monospace;font-size:8px;
  letter-spacing:.5px;color:var(--blue);background:rgba(91,141,239,.1);
  padding:2px 6px;border-radius:3px;margin-top:4px;
}
.en-curso-live{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Space Mono',monospace;font-size:11px;color:var(--green);
  background:rgba(61,214,140,.08);padding:6px 10px;border-radius:5px;margin-top:4px;
}
.centro-chips{display:flex;flex-wrap:wrap;gap:6px;}
.centro-chip{
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.5px;
  padding:6px 12px;background:var(--card);border:1px solid var(--border);
  border-radius:5px;cursor:pointer;color:var(--muted);transition:all .15s;
  user-select:none;
}
.centro-chip:hover{border-color:var(--text);color:var(--text);}
.centro-chip.selected{background:rgba(255,214,0,.12);border-color:var(--accent);color:var(--accent);font-weight:700;}
.modal-input{
  background:var(--card);border:1px solid var(--border);border-radius:5px;
  padding:8px 10px;color:var(--text);font-family:'Space Mono',monospace;
  font-size:12px;outline:none;width:100%;transition:border-color .15s;
}
.modal-input:focus{border-color:var(--accent);}
.proy-results{
  max-height:120px;overflow-y:auto;background:var(--card);border:1px solid var(--border);
  border-radius:0 0 5px 5px;border-top:none;margin-top:-1px;display:none;
}
.proy-results.open{display:block;}
.proy-item{
  padding:6px 10px;font-family:'Space Mono',monospace;font-size:11px;
  color:var(--text);cursor:pointer;transition:background .1s;
}
.proy-item:hover{background:rgba(255,214,0,.08);}
.modal-footer{
  padding:16px 20px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:10px;
}
.modal-btn{
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:.5px;padding:8px 20px;border-radius:5px;cursor:pointer;
  border:none;transition:opacity .15s;
}
.modal-btn:disabled{opacity:.45;cursor:not-allowed;}
.modal-btn-primary{background:var(--accent);color:#000;}
.modal-btn-secondary{background:transparent;border:1px solid var(--border);color:var(--muted);}
.modal-btn-secondary:hover{border-color:var(--text);color:var(--text);}
.modal-error{font-family:'Space Mono',monospace;font-size:10px;color:var(--red);margin-top:8px;display:none;}
/* mini-form for new task */
.mini-form{
  background:rgba(255,214,0,.04);border:1px solid var(--border);border-radius:8px;
  padding:14px;margin-top:12px;display:none;
}
.mini-form.open{display:block;}
.mini-form-row{display:flex;gap:10px;margin-top:10px;align-items:flex-end;}
/* clickable session rows */
table.ses-table tbody tr{cursor:pointer;transition:background .1s;}
table.ses-table tbody tr:hover{background:rgba(255,255,255,.03);}
table.ses-table tbody tr.add-row-tr{cursor:default;}
table.ses-table tbody tr.add-row-tr:hover{background:rgba(255,214,0,.04);}
</style>
</head>
<body>
<div class="shell">

<!-- ═══ SIDEBAR ══════════════════════════════════════════════════════════ -->
<script src="sidebar.js"></script>
<div id="sidebar-root"></div>

<!-- ═══ MAIN ════════════════════════════════════════════════════════════ -->
<div class="main">
<div class="content">

  <!-- ── TABS ── -->
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="_tTab('dia')">POR DÍA</button>
    <button class="tab-btn" onclick="_tTab('operario')">POR OPERARIO</button>
    <button class="tab-btn" onclick="_tTab('reporte')">REPORTE</button>
  </div>

  <!-- ── FILTER CHIPS ── -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-chip active" onclick="_tSetFiltroRol('todos')">TODOS</button>
    <button class="filter-chip" onclick="_tSetFiltroRol('planta')">PLANTA</button>
    <button class="filter-chip" onclick="_tSetFiltroRol('oficina')">OFICINA</button>
  </div>

  <div id="print-header">MADERABLE — REPORTE DE HORAS</div>

  <!-- ═══ TAB 1: POR DÍA ══════════════════════════════════════════════ -->
  <div id="panel-dia" class="tab-panel active">
    <div class="ctrl-bar">
      <div class="ctrl-field">
        <span class="ctrl-label">FECHA</span>
        <input type="date" id="dia-fecha" class="ctrl-input">
      </div>
      <button class="btn-load" onclick="_tCargarDia()">CARGAR</button>
    </div>
    <div id="dia-result"></div>
  </div>

  <!-- ═══ TAB 2: POR OPERARIO ═════════════════════════════════════════ -->
  <div id="panel-operario" class="tab-panel">
    <div class="ctrl-bar">
      <div class="ctrl-field" id="op-emp-field" style="display:none;">
        <span class="ctrl-label">EMPLEADO</span>
        <select id="op-emp-select" class="ctrl-select"></select>
      </div>
      <div class="ctrl-field">
        <span class="ctrl-label">DESDE</span>
        <input type="date" id="op-desde" class="ctrl-input">
      </div>
      <div class="ctrl-field">
        <span class="ctrl-label">HASTA</span>
        <input type="date" id="op-hasta" class="ctrl-input">
      </div>
      <button class="btn-load" onclick="_tCargarOperario()">CARGAR</button>
      <button class="btn-export" id="btn-export-op-csv" style="display:none;" onclick="_tExportOpCSV()">↓ CSV</button>
    </div>
    <div id="operario-result"></div>
  </div>

  <!-- ═══ TAB 3: REPORTE ══════════════════════════════════════════════ -->
  <div id="panel-reporte" class="tab-panel">
    <div class="ctrl-bar">
      <div class="ctrl-field" id="rep-emp-field" style="display:none;">
        <span class="ctrl-label">EMPLEADO</span>
        <select id="rep-emp-select" class="ctrl-select">
          <option value="">TODOS</option>
        </select>
      </div>
      <div class="ctrl-field">
        <span class="ctrl-label">MES</span>
        <select id="rep-mes" class="ctrl-select">
          <option value="1">Enero</option><option value="2">Febrero</option>
          <option value="3">Marzo</option><option value="4">Abril</option>
          <option value="5">Mayo</option><option value="6">Junio</option>
          <option value="7">Julio</option><option value="8">Agosto</option>
          <option value="9">Septiembre</option><option value="10">Octubre</option>
          <option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
      </div>
      <div class="ctrl-field">
        <span class="ctrl-label">AÑO</span>
        <select id="rep-anio" class="ctrl-select"></select>
      </div>
      <button class="btn-load" onclick="_tGenerarReporte()">GENERAR</button>
    </div>
    <div class="export-bar">
      <button class="btn-export" id="btn-export-pdf"   disabled onclick="_tExportPDF()">↓ EXPORTAR PDF</button>
      <button class="btn-export" id="btn-export-excel" disabled onclick="_tExportExcel()">↓ EXPORTAR EXCEL</button>
    </div>
    <div id="reporte-result"></div>
  </div>

</div><!-- /content -->

<!-- ═══ FLOATING SAVE ═════════════════════════════════════════════════ -->
<button id="btn-guardar-fijo" onclick="_tGuardarTodo()">GUARDAR CAMBIOS (0)</button>

<!-- ═══ SHARED DATALIST FOR PROJECTS ════════════════════════════════ -->
<datalist id="proyectos-dl"></datalist>

<!-- ═══ SESSION EDIT MODAL ═════════════════════════════════════════ -->
<div class="modal-overlay" id="ses-modal" onclick="if(event.target===this)_tModalClose()">
<div class="modal-box">
  <div class="modal-header">
    <div>
      <div class="modal-title" id="modal-title">Editar sesión</div>
      <div class="modal-subtitle" id="modal-subtitle"></div>
    </div>
    <button class="modal-close" onclick="_tModalClose()">✕</button>
  </div>
  <div class="modal-body">
    <!-- Horario -->
    <div class="modal-section">
      <span class="modal-label">HORARIO</span>
      <div class="modal-time-row">
        <div class="modal-time-field">
          <span class="modal-label" style="font-size:8px;">INICIO</span>
          <input type="time" id="modal-inicio" step="60">
          <div id="modal-inicio-link"></div>
        </div>
        <div class="modal-time-field">
          <span class="modal-label" style="font-size:8px;">FIN</span>
          <input type="time" id="modal-fin" step="60">
          <div id="modal-fin-link"></div>
        </div>
      </div>
    </div>
    <!-- Centro -->
    <div class="modal-section">
      <span class="modal-label">CENTRO</span>
      <div class="centro-chips" id="modal-centros"></div>
    </div>
    <!-- Proyecto -->
    <div class="modal-section">
      <span class="modal-label">PROYECTO</span>
      <input class="modal-input" type="text" id="modal-proyecto" placeholder="Buscar proyecto..." autocomplete="off">
      <div class="proy-results" id="modal-proy-results"></div>
    </div>
    <!-- Mueble -->
    <div class="modal-section" id="modal-mueble-section">
      <span class="modal-label">MUEBLE</span>
      <input class="modal-input" type="text" id="modal-mueble" placeholder="Nombre del mueble...">
    </div>
    <!-- Nueva tarea (solo sesión activa) -->
    <div id="modal-nueva-tarea-wrap"></div>
    <!-- Error -->
    <div class="modal-error" id="modal-error"></div>
  </div>
  <div class="modal-footer">
    <button class="modal-btn modal-btn-secondary" onclick="_tModalClose()">CANCELAR</button>
    <button class="modal-btn modal-btn-primary" id="modal-guardar" onclick="_tModalGuardar()">GUARDAR</button>
  </div>
</div>
</div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────
let _tUser      = null;
let _tIsAdmin   = false;
let CALLER_ID   = null;
let _cvT        = [];   // [{id, codigo, nombre, es_descanso, requiere_proyecto, requiere_mueble}]
let _proyectosT = [];   // [{id, nombre, numero, ...}]
let _empListT   = [];   // [{id, nombre}] for selects (admin)
let _tReportData = null;

// change tracking
const _tSesChanges = new Map();   // sid → {field: value}
const _tJorChanges = new Map();   // jid → {field: value}

// ── Filtro rol ───────────────────────────────────────────────────────────
let _tFiltroRol = localStorage.getItem('tiempos_filtro_rol') || 'todos'; // 'todos' | 'planta' | 'oficina'

function _tSetFiltroRol(rol) {
  _tFiltroRol = rol;
  localStorage.setItem('tiempos_filtro_rol', rol);
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase() === rol));
  // Refresh active view
  const activeTab = document.querySelector('.tab-btn.active')?.textContent?.trim();
  if (activeTab === 'POR DÍA') _tCargarDia();
  else if (activeTab === 'POR OPERARIO') _tFilterOpSelect();
  // Reporte no auto-refresh — el usuario clickea GENERAR
}

function _tPassFiltro(emp) {
  if (_tFiltroRol === 'todos') return true;
  const rol = emp.rol_app || emp._rol_app || '';
  if (_tFiltroRol === 'planta') return rol === 'operario';
  if (_tFiltroRol === 'oficina') return rol === 'admin' || rol === 'oficina';
  return true;
}

function _tFilterOpSelect() {
  // Re-filter the op-emp-select dropdown
  const sel = document.getElementById('op-emp-select');
  if (!sel) return;
  const current = sel.value;
  const filtered = _empListT.filter(e => _tPassFiltro(e));
  sel.innerHTML = filtered.map(e => `<option value="${e.id}"${e.id===current?' selected':''}>${e.nombre}</option>`).join('');
}

// ── Auth ──────────────────────────────────────────────────────────────────
(function _auth() {
  const u = window.AUTH?.usuarioActual();
  if (!u) { window.location.href = '/index.html'; return; }
  if (u.rol_app === 'operario') { window.location.href = '/planta2.html'; return; }
  if (u.rol_app !== 'admin' && u.rol_app !== 'oficina') { window.location.href = '/index.html'; return; }
  _tUser    = u;
  _tIsAdmin = u.rol_app === 'admin' || !!(u.acceso_tiempos);
  CALLER_ID = u.id;

})();

// ── Fetch wrapper (handles 403 redirect) ──────────────────────────────────
async function _tFetch(url, opts) {
  const res = await fetch(url, opts);
  if (res.status === 403) {
    window.location.href = '/admin.html?error=sin_acceso';
    throw new Error('Sin acceso');
  }
  return res;
}

// ── Utils ─────────────────────────────────────────────────────────────────
function fmtHM(mins) {
  if (!mins || mins <= 0) return '0h 0m';
  const h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function fmtDate(dateStr) {
  if (!dateStr) return '—';
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function toLocalDT(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fromLocalDT(val) {
  if (!val) return null;
  return new Date(val).toISOString();
}
function todayStr() {
  return new Date().toISOString().split('T')[0];
}
function monthBounds(year, month) {
  const desde = `${year}-${String(month).padStart(2,'0')}-01`;
  const last  = new Date(year, month, 0).getDate();
  const hasta = `${year}-${String(month).padStart(2,'0')}-${last}`;
  return { desde, hasta };
}

// ── Init ──────────────────────────────────────────────────────────────────
async function _tInit() {
  if (!_tUser) return;

  // Default date controls
  document.getElementById('dia-fecha').value = todayStr();
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  const firstDay = `${y}-${String(m).padStart(2,'0')}-01`;
  const lastDay  = monthBounds(y, m).hasta;
  document.getElementById('op-desde').value = firstDay;
  document.getElementById('op-hasta').value = lastDay;
  document.getElementById('rep-mes').value  = m;

  // Year selector (reporte)
  const repAnio = document.getElementById('rep-anio');
  for (let yr = y; yr >= y - 2; yr--) {
    repAnio.innerHTML += `<option value="${yr}">${yr}</option>`;
  }

  // Admin-only controls
  if (_tIsAdmin) {
    document.getElementById('op-emp-field').style.display  = 'flex';
    document.getElementById('rep-emp-field').style.display = 'flex';
  }

  // Load centros-virtuales
  try {
    const r = await _tFetch('/api/tiempos?action=centros-virtuales');
    const d = await r.json();
    _cvT = d.centros || [];
  } catch(e) { console.warn('[tiempos] centros:', e.message); }

  // Load projects for datalist (TODO: endpoint buscar-proyectos no existe;
  // se usa proyectos-admin para autocomplete por nombre. Sin proyecto_id si no matchea.)
  try {
    const r = await _tFetch('/api/tiempos?action=proyectos-admin');
    const d = await r.json();
    _proyectosT = d.proyectos || [];
    const dl = document.getElementById('proyectos-dl');
    dl.innerHTML = _proyectosT.map(p => {
      const label = [p.numero, p.nombre].filter(Boolean).join(' · ');
      return `<option value="${label}" data-id="${p.id}" data-nombre="${p.nombre||label}">`;
    }).join('');
  } catch(e) { console.warn('[tiempos] proyectos:', e.message); }

  // Set active filter chip from localStorage
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase() === _tFiltroRol));

  // Load employees for selects (admin only)
  if (_tIsAdmin) {
    try {
      const r = await _tFetch('/api/tiempos?action=empleados');
      const d = await r.json();
      _empListT = d.empleados || [];
      const opSel  = document.getElementById('op-emp-select');
      const repSel = document.getElementById('rep-emp-select');
      const opFilter = _tUser.rol_app === 'admin'
        ? _empListT
        : _empListT.filter(e => e.rol_app === 'operario' || e.id === _tUser.id);
      opFilter.filter(e => _tPassFiltro(e)).forEach(e => {
        opSel.innerHTML  += `<option value="${e.id}">${e.nombre}</option>`;
      });
      opFilter.forEach(e => {
        repSel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`;
      });
    } catch(e) { console.warn('[tiempos] empleados:', e.message); }
  }
}

// ── Tab routing ───────────────────────────────────────────────────────────
function _tTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['dia','operario','reporte'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

// ── Change tracking ───────────────────────────────────────────────────────
function _tMarkSes(sid, field, val) {
  if (!_tSesChanges.has(sid)) _tSesChanges.set(sid, {});
  _tSesChanges.get(sid)[field] = val;
  _tMarkRowChanged(sid);
  _tUpdateSaveBtn();
}
function _tMarkJor(jid, field, val) {
  if (!_tJorChanges.has(jid)) _tJorChanges.set(jid, {});
  _tJorChanges.get(jid)[field] = val;
  document.querySelectorAll(`.jornada-input[data-jid="${jid}"]`).forEach(el => el.classList.add('changed'));
  _tUpdateSaveBtn();
}
function _tMarkRowChanged(sid) {
  const row = document.querySelector(`tr[data-sid="${sid}"]`);
  if (row) row.classList.add('row-modified');
}
function _tUpdateSaveBtn() {
  const n = _tSesChanges.size + _tJorChanges.size;
  const btn = document.getElementById('btn-guardar-fijo');
  btn.style.display = n > 0 ? 'block' : 'none';
  btn.textContent = `GUARDAR CAMBIOS (${n})`;
}
function _tClearChanges() {
  _tSesChanges.clear();
  _tJorChanges.clear();
  _tUpdateSaveBtn();
}

// ── Session field handlers ────────────────────────────────────────────────
function _tSesField(sid, field, rawVal) {
  let val = rawVal;
  if (field === 'inicio' || field === 'fin') val = rawVal ? fromLocalDT(rawVal) : null;
  _tMarkSes(sid, field, val);
}
function _tSesCentro(sid, codigo) {
  _tMarkSes(sid, 'centro', codigo);
  const cv = _cvT.find(c => c.codigo === codigo);
  const mCell = document.querySelector(`tr[data-sid="${sid}"] .mueble-wrap`);
  if (mCell) mCell.style.display = cv?.requiere_mueble ? '' : 'none';
}
function _tSesProyecto(sid, rawVal) {
  // Try to match against project list (label = "numero · nombre" or "nombre")
  const opt = _proyectosT.find(p => {
    const label = [p.numero, p.nombre].filter(Boolean).join(' · ');
    return label === rawVal || p.nombre === rawVal;
  });
  if (opt) {
    _tMarkSes(sid, 'proyecto_id',    opt.id);
    _tMarkSes(sid, 'proyecto_nombre', opt.nombre);
  } else {
    _tMarkSes(sid, 'proyecto_id',    null);
    _tMarkSes(sid, 'proyecto_nombre', rawVal || null);
  }
}
function _tQuickSalidaHora(empId) {
  const emp = _empListT.find(e => e.id === empId);
  return (emp?.rol_app === 'oficina') ? '17:00' : '17:30';
}

function _tQuickSalida(jid, fecha, empId) {
  const hora = _tQuickSalidaHora(empId);
  const input = document.getElementById('sal-input-' + jid);
  if (input) input.value = hora;
  _tJorField(jid, 'salida', hora);
  const btn = document.getElementById('sal-quick-' + jid);
  if (btn) btn.remove();
}

function _tJorField(jid, field, rawVal) {
  let val = rawVal;
  if (field === 'entrada' || field === 'salida') {
    if (rawVal) {
      // If value is HH:MM (from time input), combine with jornada date
      if (rawVal.length <= 5) {
        const fecha = _tFechaByJornada.get(jid) || todayStr();
        val = fromLocalDT(fecha + 'T' + rawVal);
      } else {
        val = fromLocalDT(rawVal);
      }
    } else {
      val = null;
    }
  }
  if (field === 'descanso_minutos') val = parseInt(rawVal, 10) || 0;
  _tMarkJor(jid, field, val);
}

// ── Batch save ────────────────────────────────────────────────────────────
async function _tGuardarTodo() {
  const btn = document.getElementById('btn-guardar-fijo');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>GUARDANDO…';

  // Save sesiones
  for (const [sid, fields] of [..._tSesChanges]) {
    const errEl = document.querySelector(`tr[data-sid="${sid}"] .ses-error`);
    if (errEl) errEl.textContent = '';
    try {
      const res  = await _tFetch('/api/tiempos?action=editar-sesion', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ sesion_id: sid, caller_id: CALLER_ID, ...fields }),
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Error al guardar');
      _tSesChanges.delete(sid);
      document.querySelector(`tr[data-sid="${sid}"]`)?.classList.remove('row-modified');
    } catch(e) {
      if (errEl) errEl.textContent = e.message;
    }
  }

  // Save jornadas
  for (const [jid, fields] of [..._tJorChanges]) {
    try {
      const res  = await _tFetch('/api/tiempos?action=editar-jornada', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ jornada_id: jid, editor_id: CALLER_ID, ...fields }),
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Error al guardar jornada');
      _tJorChanges.delete(jid);
      document.querySelectorAll(`.jornada-input[data-jid="${jid}"]`).forEach(el => el.classList.remove('changed'));
    } catch(e) {
      console.error('[guardar jornada]', jid, e.message);
    }
  }

  btn.disabled = false;
  _tUpdateSaveBtn();
}

// ── Session data store (for modal access to adjacent sessions) ───────────
const _tSessionsByJornada = new Map(); // jornadaId → [{...session}]
const _tEmpleadoByJornada = new Map(); // jornadaId → empleado_id
const _tFechaByJornada    = new Map(); // jornadaId → 'YYYY-MM-DD'

// ── Shared session table renderer ─────────────────────────────────────────
function _tSesionTable(sesiones, jornadaId, empNombre, empleadoId, fecha) {
  // Store session data for modal
  _tSessionsByJornada.set(jornadaId, sesiones);
  if (empleadoId) _tEmpleadoByJornada.set(jornadaId, empleadoId);
  if (fecha) _tFechaByJornada.set(jornadaId, fecha);

  const rows = sesiones.map(s => {
    const activo  = s.estado === 'activo';
    const sinFin  = !s.fin;
    const cv      = _cvT.find(c => c.codigo === s.centro);
    const centroLabel = cv?.nombre || s.centro || '—';
    const proyNum     = s.proyecto_numero || '';
    const proyNom     = s.proyecto_cache_nombre || s.proyecto_nombre || '';
    const proyLabel   = proyNum
      ? `${proyNum}${proyNom ? `<div style="font-size:9px;color:#555;margin-top:1px;">${proyNom}</div>` : ''}`
      : (proyNom || '—');
    const fmtTime = iso => {
      if (!iso) return '—';
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    };
    const estadoBadge = activo
      ? '<span class="en-curso">EN CURSO</span>'
      : `<span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);">${s.estado}</span>`;

    // Anomaly badge
    let anomBadge = '';
    let durClass = '';
    let anomBtns = '';
    if (s.anomalia) {
      if (s.anomalia_aprobada === true) {
        anomBadge = '<span class="badge-anomalia aprobada">✓ APROBADA</span>';
      } else if (s.anomalia_aprobada === false) {
        anomBadge = '<span class="badge-anomalia rechazada">✗ RECHAZADA</span>';
        durClass = 'dur-tachada';
      } else {
        anomBadge = '<span class="badge-anomalia pendiente">⚠ ANOMALÍA</span>';
        durClass = 'dur-tachada';
        if (_tUser?.rol_app === 'admin') {
          anomBtns = `<button class="btn-aprobar" onclick="event.stopPropagation();_tAprobarAnomalia('${s.id}',true)">✓</button><button class="btn-rechazar" onclick="event.stopPropagation();_tAprobarAnomalia('${s.id}',false)">✗</button>`;
        }
      }
    }
    const durLabel = s.duracion_min != null ? `<span class="${durClass}">${fmtHM(s.duracion_min)}</span>` : '';
    const descInfo = s.duracion_min != null && s.cuenta_en_total !== undefined && !s.cuenta_en_total ? '' : '';

    const rowClass = s.anomalia ? ' anomalia-row' : '';

    return `
<tr data-sid="${s.id}" data-jid="${jornadaId}" class="${rowClass}" onclick="_tModalOpen('${s.id}','${jornadaId}'${empNombre ? `,'${empNombre.replace(/'/g,"\\'")}'` : ''})">
  <td class="mono" style="font-size:12px;">${fmtTime(s.inicio)}</td>
  <td class="mono" style="font-size:12px;">${sinFin && activo ? '' : fmtTime(s.fin)} ${estadoBadge} ${durLabel} ${anomBadge} ${anomBtns}</td>
  <td style="font-size:11px;">${centroLabel}</td>
  <td style="font-size:11px;color:var(--muted);">${proyLabel}</td>
  <td style="font-size:11px;color:var(--muted);">${s.item_nombre||''}</td>
  <td>
    <button class="btn-eliminar" onclick="event.stopPropagation();_tEliminarSesion('${s.id}',this)">✕</button>
    <div class="ses-error"></div>
  </td>
</tr>`;
  }).join('');

  const canAdd = _tUser && (_tUser.rol_app === 'admin' || _tUser.rol_app === 'oficina');
  const addBtn = canAdd
    ? `<button class="btn-add-ses" onclick="_tAgregarSesion('${jornadaId}',this)">+ AGREGAR SESIÓN</button>`
    : '';

  return `
<div class="ses-wrap">
<table class="ses-table">
  <thead><tr>
    <th>INICIO</th><th>FIN</th><th>CENTRO</th><th>PROYECTO</th><th>MUEBLE</th><th></th>
  </tr></thead>
  <tbody>${rows}</tbody>
</table>
</div>
${addBtn}`;
}

// ═══════════════════════════════════════════════════════════════════════════
// SESSION EDIT MODAL
// ═══════════════════════════════════════════════════════════════════════════
let _modalSesion    = null;  // current session data
let _modalJornadaId = null;
let _modalSesiones  = [];    // all sessions for this jornada (sorted by inicio)
let _modalIdx       = -1;    // index of current session in _modalSesiones
let _modalEmpNombre = '';
let _modalLiveTimer = null;
let _modalProyId    = null;
let _modalProyNombre = null;

function _tModalOpen(sesionId, jornadaId, empNombre) {
  const sesiones = _tSessionsByJornada.get(jornadaId) || [];
  const sorted   = [...sesiones].sort((a,b) => new Date(a.inicio) - new Date(b.inicio));
  const idx      = sorted.findIndex(s => s.id === sesionId);
  if (idx < 0) return;

  _modalSesion    = sorted[idx];
  _modalJornadaId = jornadaId;
  _modalSesiones  = sorted;
  _modalIdx       = idx;
  _modalEmpNombre = empNombre || '';

  const s    = _modalSesion;
  const prev = idx > 0 ? sorted[idx - 1] : null;
  const next = idx < sorted.length - 1 ? sorted[idx + 1] : null;
  const activo = s.estado === 'activo';

  // Header
  const fecha = s.inicio ? new Date(s.inicio).toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' }) : '';
  document.getElementById('modal-title').textContent = 'Editar sesión';
  document.getElementById('modal-subtitle').textContent = [_modalEmpNombre, fecha].filter(Boolean).join(' · ');

  // Inicio time
  const inicioInput = document.getElementById('modal-inicio');
  inicioInput.value = _isoToHM(s.inicio);
  inicioInput.disabled = false;
  const inicioLink = document.getElementById('modal-inicio-link');
  if (prev) {
    inicioLink.innerHTML = '<span class="link-badge">&#9889; = fin sesión anterior</span>';
  } else {
    inicioLink.innerHTML = '';
  }

  // Fin time
  const finInput = document.getElementById('modal-fin');
  const finLink  = document.getElementById('modal-fin-link');
  if (activo && !_tIsAdmin) {
    finInput.value    = '';
    finInput.disabled = true;
    finLink.innerHTML = '';
    _modalStartLiveTimer();
  } else {
    finInput.value    = _isoToHM(s.fin);
    finInput.disabled = false;
    if (next) {
      finLink.innerHTML = '<span class="link-badge">&#9889; = inicio sesión siguiente</span>';
    } else {
      finLink.innerHTML = '';
    }
    _modalStopLiveTimer();
  }

  // Centro chips
  const centrosDiv = document.getElementById('modal-centros');

// ── Time helpers ──────────────────────────────────────────────────────────
function _isoToHM(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function _hmToISO(hm, refISO) {
  if (!hm || !refISO) return null;
  const [h, m] = hm.split(':').map(Number);
  const d = new Date(refISO);
  d.setHours(h, m, 0, 0);
  return d.toISOString();
}

// ── Live timer for active session ─────────────────────────────────────────
function _modalStartLiveTimer() {
  _modalStopLiveTimer();
  const finLink = document.getElementById('modal-fin-link');
  const update = () => {
    if (!_modalSesion) return;
    const elapsed = Date.now() - new Date(_modalSesion.inicio).getTime();
    const mins = Math.floor(elapsed / 60000);
    const h = Math.floor(mins / 60), m = mins % 60;
    finLink.innerHTML = `<span class="en-curso-live">EN CURSO &nbsp;${h}h ${String(m).padStart(2,'0')}m</span>`;
  };
  update();
  _modalLiveTimer = setInterval(update, 15000);
}
function _modalStopLiveTimer() {
  if (_modalLiveTimer) { clearInterval(_modalLiveTimer); _modalLiveTimer = null; }
}

// ── Modal save ────────────────────────────────────────────────────────────
async function _tModalGuardar() {
  if (!_modalSesion) return;
  const btn   = document.getElementById('modal-guardar');
  const errEl = document.getElementById('modal-error');
  btn.disabled = true;
  btn.textContent = 'GUARDANDO...';
  errEl.style.display = 'none';

  const s    = _modalSesion;
  const activo = s.estado === 'activo';
  const prev = _modalIdx > 0 ? _modalSesiones[_modalIdx - 1] : null;
  const next = _modalIdx < _modalSesiones.length - 1 ? _modalSesiones[_modalIdx + 1] : null;

  // Collect changes
  const newInicio = _hmToISO(document.getElementById('modal-inicio').value, s.inicio);
  const newFin    = activo ? undefined : _hmToISO(document.getElementById('modal-fin').value, s.inicio);
  const selChip   = document.querySelector('#modal-centros .centro-chip.selected');
  const newCentro = selChip?.dataset.codigo;
  const newMueble = document.getElementById('modal-mueble').value || null;

  // Build patch for this session
  const patch = {};
  if (newInicio && newInicio !== s.inicio) patch.inicio = newInicio;
  if (newFin !== undefined && newFin !== s.fin) patch.fin = newFin;
  if (newCentro && newCentro !== s.centro) patch.centro = newCentro;
  if (_modalProyId !== s.proyecto_id) {
    patch.proyecto_id     = _modalProyId;
    patch.proyecto_nombre = _modalProyNombre;
  }
  if (newMueble !== (s.item_nombre || null)) patch.item_nombre = newMueble;

  // Linked time patches for adjacent sessions
  const linkedPatches = [];
  if (patch.inicio && prev) {
    // Update fin of previous session to match new inicio
    linkedPatches.push({ sesion_id: prev.id, caller_id: CALLER_ID, fin: patch.inicio });
  }
  if (patch.fin && next) {
    // Update inicio of next session to match new fin
    linkedPatches.push({ sesion_id: next.id, caller_id: CALLER_ID, inicio: patch.fin });
  }

  try {
    // Save this session if changed
    if (Object.keys(patch).length > 0) {
      const res = await _tFetch('/api/tiempos?action=editar-sesion', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ sesion_id: s.id, caller_id: CALLER_ID, ...patch }),
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Error al guardar');
    }

    // Save linked patches
    for (const lp of linkedPatches) {
      const res = await _tFetch('/api/tiempos?action=editar-sesion', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(lp),
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Error al guardar sesión enlazada');
    }

    _tModalClose();
    _tReloadCurrentView();
  } catch(e) {
    errEl.textContent  = e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'GUARDAR';
  }
}

function _tRenderDia(data) {
  const result = document.getElementById('dia-result');
  const emps = (data.empleados || []).filter(emp => _tPassFiltro(emp));
  if (emps.length === 0) {
    const addBtn = _tIsAdmin ? `<div style="margin-top:12px;"><button class="btn-add-ses" onclick="_tAgregarSesionSinJornada()">+ AGREGAR SESIÓN</button></div>` : '';
    result.innerHTML = `<p class="empty-msg">Sin jornadas ese día.</p>${addBtn}`;

  }

    const hayActivo = emp.sesiones.some(s => s.estado === 'activo');

      ? '<span class="badge-activo">ACTIVO 🟢</span>'

      <div class="jornada-field">

      <div class="emp-card-meta">${fmtHM(emp.total_minutos)}</div>
    </div>
    <div class="emp-card-right">${badge}<span class="chevron">▼</span></div>
  </div>
  <div class="emp-card-body">
    <div class="jornada-row">
      <div class="jornada-field">
        <span class="jornada-label">ENTRADA</span>
        <input class="jornada-input" type="time" step="60"
          data-jid="${jornada.id}"
          value="${_isoToHM(jornada.entrada)}"
          onchange="_tJorField('${jornada.id}','entrada',this.value)">
      </div>
      <div class="jornada-field">
        <span class="jornada-label">SALIDA</span>
        <div style="display:flex;align-items:center;gap:4px;">
          <input class="jornada-input" type="time" step="60"
            data-jid="${jornada.id}" id="sal-input-${jornada.id}"
            value="${_isoToHM(jornada.salida)}"
            onchange="_tJorField('${jornada.id}','salida',this.value);document.getElementById('sal-quick-${jornada.id}')?.remove()">
          ${!jornada.salida ? `<button id="sal-quick-${jornada.id}" style="white-space:nowrap;font-family:'Space Mono',monospace;font-size:9px;padding:3px 6px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer;" onmouseenter="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--muted)'" onclick="_tQuickSalida('${jornada.id}','${data.fecha}','${emp.empleado_id}')">⏎ ${_tQuickSalidaHora(emp.empleado_id)}</button>` : ''}
        </div>
      </div>
      <div class="jornada-field">
        <span class="jornada-label">DESCANSO (min)</span>
        <input class="jornada-input" type="number" min="0" step="1"
          style="width:70px;"
          data-jid="${jornada.id}"
          value="${jornada.descanso_minutos||0}"
          onchange="_tJorField('${jornada.id}','descanso_minutos',this.value)">
      </div>
      ${_tomoDescD}
    </div>
    ${_tSesionTable(emp.sesiones, jornada.id, emp.nombre, emp.empleado_id, data.fecha)}
  </div>
</div>`;
  }).join('');
  if (_tIsAdmin) {
    result.innerHTML += `<div style="margin-top:12px;"><button class="btn-add-ses" onclick="_tAgregarSesionSinJornada()">+ AGREGAR SESIÓN (otro operario)</button></div>`;
  }
}

function _tToggleCard(header) {
  const body    = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  const isOpen  = body.classList.toggle('open');
  if (chevron) chevron.textContent = isOpen ? '▲' : '▼';
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB 2 — POR OPERARIO
// ═══════════════════════════════════════════════════════════════════════════
async function _tCargarOperario() {
  const empleado_id = _tIsAdmin
    ? document.getElementById('op-emp-select').value
    : CALLER_ID;
  if (!empleado_id) { alert('Seleccioná un empleado'); return; }
  const desde = document.getElementById('op-desde').value;
  const hasta = document.getElementById('op-hasta').value;
  if (!desde || !hasta) { alert('Seleccioná rango de fechas'); return; }

  const result = document.getElementById('operario-result');
  result.innerHTML = '<span class="spinner"></span><span class="mono" style="color:var(--muted);font-size:12px;">Cargando…</span>';
  _tClearChanges();

  try {
    const url = `/api/tiempos?action=sesiones-empleado&empleado_id=${empleado_id}&desde=${desde}&hasta=${hasta}&caller_id=${CALLER_ID}`;
    const res  = await _tFetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error');
    _tOpData = json;
    _tRenderOperario(json);
    const csvBtn = document.getElementById('btn-export-op-csv');
    if (csvBtn) csvBtn.style.display = '';
  } catch(e) {
    result.innerHTML = `<p class="empty-msg">Error: ${e.message}</p>`;
  }
}

let _tOpData = null;

  const result = document.getElementById('operario-result');
  if (!data.dias || data.dias.length === 0) {
    result.innerHTML = `<p class="empty-msg">Sin jornadas para ${data.nombre} en ese período.</p>`;

  }
  result.innerHTML = `
<div class="mono" style="font-size:12px;color:var(--muted);margin-bottom:14px;">
  ${data.nombre.toUpperCase()}
</div>
${data.dias.map(dia => {
  const hayActivo = dia.sesiones.some(s => s.estado === 'activo');
  const jornada   = dia.jornada;
  const _dmO = data.descanso_modalidad;
  const _dmLabelO = _dmO === 'paga_30' ? '30 min pagos' : _dmO === 'no_paga_60' ? '60 min desc.' : null;
  const _tomoDescO = (_dmLabelO && _tUser?.rol_app === 'admin') ? `
      <div class="jornada-field">
        <span class="jornada-label">TOMÓ DESCANSO</span>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox"
            data-jid="${jornada.id}"
            id="tomo-desc-${jornada.id}"
            ${(jornada.tomo_descanso ?? true) ? 'checked' : ''}
            onchange="_tJorField('${jornada.id}','tomo_descanso',this.checked)">
          <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);">${_dmLabelO}</span>

  return `
<div class="day-card">
  <div class="day-card-header" onclick="_tToggleDayCard(this)">

      <span class="day-card-title">${fmtDate(dia.fecha)}</span>
      <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-left:12px;">${fmtHM(dia.total_minutos)}</span>
      ${hayActivo ? '<span class="badge-activo" style="margin-left:8px;">ACTIVO</span>' : ''}
      ${dia.tardanza_min > 0 ? `<span style="font-family:'Space Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25);margin-left:6px;">${dia.tardanza_min}m tarde</span>` : ''}
    </div>
    <span class="chevron">▼</span>
  </div>
  <div class="day-card-body">
    <div class="jornada-row">
      <div class="jornada-field">
        <span class="jornada-label">ENTRADA</span>
        <input class="jornada-input" type="time" step="60"
          data-jid="${jornada.id}"
          value="${_isoToHM(jornada.entrada)}"
          onchange="_tJorField('${jornada.id}','entrada',this.value)">
      </div>
      <div class="jornada-field">
        <span class="jornada-label">SALIDA</span>
        <div style="display:flex;align-items:center;gap:4px;">
          <input class="jornada-input" type="time" step="60"
            data-jid="${jornada.id}" id="sal-input-${jornada.id}"
            value="${_isoToHM(jornada.salida)}"
            onchange="_tJorField('${jornada.id}','salida',this.value);document.getElementById('sal-quick-${jornada.id}')?.remove()">
          ${!jornada.salida ? `<button id="sal-quick-${jornada.id}" style="white-space:nowrap;font-family:'Space Mono',monospace;font-size:9px;padding:3px 6px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer;" onmouseenter="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--muted)'" onclick="_tQuickSalida('${jornada.id}','${dia.fecha}','${data.empleado_id}')">⏎ ${_tQuickSalidaHora(data.empleado_id)}</button>` : ''}

      </div>

        <span class="jornada-label">DESCANSO (min)</span>
        <input class="jornada-input" type="number" min="0" step="1"

      </div>
      ${_tomoDescO}
    </div>
    ${_tSesionTable(dia.sesiones, jornada.id, data.nombre, data.empleado_id, dia.fecha)}

function _tToggleDayCard(header) {
  const body    = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');

// ═══════════════════════════════════════════════════════════════════════════
// TAB 3 — REPORTE
// ═══════════════════════════════════════════════════════════════════════════
async function _tGenerarReporte() {
  const mes      = parseInt(document.getElementById('rep-mes').value, 10);
  const anio     = parseInt(document.getElementById('rep-anio').value, 10);
  const empParam = _tIsAdmin ? document.getElementById('rep-emp-select').value : CALLER_ID;
  const { desde, hasta } = monthBounds(anio, mes);

  const result = document.getElementById('reporte-result');
  result.innerHTML = '<span class="spinner"></span><span class="mono" style="color:var(--muted);font-size:12px;">Generando…</span>';
  _tReportData = null;
  document.getElementById('btn-export-excel').disabled = true;
  document.getElementById('btn-export-pdf').disabled   = true;

  try {
    let url = `/api/tiempos?action=reporte-horas&desde=${desde}&hasta=${hasta}&caller_id=${CALLER_ID}`;
    if (empParam) url += `&empleado_id=${empParam}`;
    const res  = await _tFetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error');
    _tReportData = json;
    _tRenderReporte(json, anio, mes);
    document.getElementById('btn-export-excel').disabled = false;
    document.getElementById('btn-export-pdf').disabled   = false;
  } catch(e) {
    result.innerHTML = `<p class="empty-msg">Error: ${e.message}</p>`;
  }
}

function _fmtTimeLocal(val) {
  if (!val) return '—';
  // If already HH:MM string from backend, return as-is
  if (/^\d{2}:\d{2}$/.test(val)) return val;
  // Otherwise parse ISO and convert to UY (UTC-3)
  const d = new Date(new Date(val).getTime() - 3*60*60*1000);
  return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
}

let _repSemExpanded = {}; // 'empIdx-semIdx' → true

function _tToggleRepSem(key) {
  _repSemExpanded[key] = !_repSemExpanded[key];
  const el = document.getElementById('rep-det-' + key);
  if (el) el.style.display = _repSemExpanded[key] ? '' : 'none';
  const chev = document.getElementById('rep-chev-' + key);
  if (chev) chev.textContent = _repSemExpanded[key] ? '▴' : '▾';
}

function _tRenderReporte(data, anio, mes) {
  const result = document.getElementById('reporte-result');
  const emps = (data.empleados || []).filter(emp => _tPassFiltro({ rol_app: emp._rol_app || '' }));
  if (emps.length === 0) {
    result.innerHTML = '<p class="empty-msg">Sin datos para ese período.</p>';
    return;
  }
  _repSemExpanded = {};

  const periodoLabel = `${String(mes).padStart(2,'0')}/${anio}`;
  const ph = document.getElementById('print-header');
  if (ph) ph.textContent = `MADERABLE \u2014 REPORTE DE HORAS \u2014 ${periodoLabel}`;

  let html = `
<div class="mono" style="font-size:10px;color:var(--muted);margin-bottom:16px;letter-spacing:1px;">
  PERÍODO ${periodoLabel} &nbsp;·&nbsp; ${data.desde} → ${data.hasta}
</div>`;

  emps.forEach((emp, ei) => {
    if (ei > 0) html += '<div style="height:20px;"></div>';
    html += `<div class="mono" style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;">${emp.nombre}</div>`;
    html += `<table class="rep-table">
<thead><tr>
  <th></th><th>SEMANA</th>
  <th>HORAS NETAS</th><th>EXTRAS</th><th>TARDE</th><th>AUSENCIAS</th>
</tr></thead><tbody>`;

    emp.semanas.forEach((s, si) => {
      const key = `${ei}-${si}`;
      html += `<tr style="cursor:pointer;" onclick="_tToggleRepSem('${key}')">
        <td class="mono" style="font-size:10px;color:var(--muted);width:14px;" id="rep-chev-${key}">▾</td>
        <td class="mono" style="font-size:11px;color:var(--muted);">${fmtDate(s.semana_inicio)}–${fmtDate(s.semana_fin)}</td>
        <td class="mono">${fmtHM(s.horas_netas_min)}</td>
        <td>${s.extras_minutos > 0 ? `<span class="extras-pos">${fmtHM(s.extras_minutos)}</span>` : '—'}</td>
        <td class="mono">${s.minutos_tarde_semana > 0 ? s.minutos_tarde_semana + 'm' : '—'}</td>
        <td class="mono">${s.ausencias > 0 ? s.ausencias : '—'}</td>
      </tr>`;
      // Detalle diario (colapsado por defecto)
      html += `<tr id="rep-det-${key}" style="display:none;"><td colspan="6" style="padding:0;">
        <table style="width:100%;border-collapse:collapse;background:#161616;">
          <thead><tr>
            <th style="text-align:left;font-size:8px;color:var(--muted);padding:4px 12px;">FECHA</th>
            <th style="text-align:left;font-size:8px;color:var(--muted);padding:4px 6px;">ENTRADA</th>
            <th style="text-align:left;font-size:8px;color:var(--muted);padding:4px 6px;">SALIDA</th>
            <th style="text-align:left;font-size:8px;color:var(--muted);padding:4px 6px;">TARDE</th>
            <th style="text-align:center;font-size:8px;color:var(--muted);padding:4px 6px;">AUSENTE</th>
            <th style="text-align:right;font-size:8px;color:var(--muted);padding:4px 12px;">EXTRAS DÍA</th>
          </tr></thead><tbody>`;
      (s.dias || []).forEach(d => {
        html += `<tr style="font-size:10px;border-bottom:1px solid #1e1e1e;">
          <td style="padding:3px 12px;" class="mono">${fmtDate(d.fecha)}</td>
          <td style="padding:3px 6px;" class="mono">${d.ausente ? '—' : (d.entrada || '—')}</td>
          <td style="padding:3px 6px;" class="mono">${d.ausente ? '—' : (d.salida || '—')}</td>
          <td style="padding:3px 6px;" class="mono">${d.tarde_min > 0 ? d.tarde_min + 'm' : '—'}</td>
          <td style="padding:3px 6px;text-align:center;">${d.ausente ? '<span style="color:var(--red);">✗</span>' : ''}</td>
          <td style="padding:3px 12px;text-align:right;" class="mono">${d.extras_dia_min > 0 ? fmtHM(d.extras_dia_min) : '—'}</td>
        </tr>`;
      });
      html += `</tbody></table></td></tr>`;
    });

    const rm = emp.resumen_mensual || {};
    html += `<tr class="rep-total">
      <td></td>
      <td class="mono" style="color:var(--muted);">TOTAL</td>
      <td class="mono">${fmtHM(rm.total_horas_min || emp.total_minutos)}</td>
      <td>${(rm.total_extras_min || emp.total_extras_minutos) > 0 ? `<span class="extras-pos">${fmtHM(rm.total_extras_min || emp.total_extras_minutos)}</span>` : '—'}</td>
      <td class="mono">${(rm.total_minutos_tarde || 0) > 0 ? rm.total_minutos_tarde + 'm' : '—'}</td>
      <td class="mono">${(rm.total_ausencias || 0) > 0 ? rm.total_ausencias : '—'}</td>
    </tr>`;

    html += '</tbody></table>';
  });

  result.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════════════════════
function _tExportExcel() {
  if (!_tReportData) return;
  const mes  = String(document.getElementById('rep-mes').value).padStart(2,'0');
  const anio = document.getElementById('rep-anio').value;
  const sep = ';';
  const lines = ['Empleado;Semana desde;Semana hasta;Entrada;Salida;Descanso (min);Horas netas (h);Extras (h);Tarde (min);Ausencias'];
  const emps = (_tReportData.empleados || []).filter(emp => _tPassFiltro({ rol_app: emp._rol_app || '' }));
  emps.forEach(emp => {
    emp.semanas.forEach(s => {
      lines.push([
        emp.nombre, s.semana_inicio, s.semana_fin,
        _fmtTimeLocal(s.entrada), _fmtTimeLocal(s.salida),
        s.descanso_total_min || 0,
        +(s.horas_netas_min / 60).toFixed(2),
        +(s.extras_minutos / 60).toFixed(2),
        s.minutos_tarde_semana || 0,
        s.ausencias || 0,
      ].join(sep));
    });
    const rm = emp.resumen_mensual || {};
    lines.push([
      emp.nombre, 'TOTAL', '',
      '', '', '',
      +((rm.total_horas_min || emp.total_minutos) / 60).toFixed(2),
      +((rm.total_extras_min || emp.total_extras_minutos) / 60).toFixed(2),
      rm.total_minutos_tarde || 0,
      rm.total_ausencias || 0,
    ].join(sep));
  });
  const csv = lines.join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `reporte-horas-${anio}-${mes}.csv`;
  a.click();
}

function _tExportPDF() {
  if (!_tReportData) return;
  window.print();
}

function _tExportOpCSV() {
  if (!_tOpData || !_tOpData.dias) return;
  const sep = ';';
  const lines = ['Fecha;Entrada;Salida;Descanso (min);Horas netas (h);Tarde (min);Ausente'];
  _tOpData.dias.forEach(d => {
    const ent = d.jornada?.entrada ? _fmtTimeLocal(d.jornada.entrada) : '—';
    const sal = d.jornada?.salida  ? _fmtTimeLocal(d.jornada.salida)  : '—';
    const desc = d.jornada?.descanso_minutos || 0;
    const horas = +(d.total_minutos / 60).toFixed(2);
    const tarde = d.tardanza_min || 0;
    lines.push([d.fecha, ent, sal, desc, horas, tarde, ''].join(sep));
  });
  const csv = lines.join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const nombre = (_tOpData.nombre || 'empleado').replace(/\s+/g, '-').toLowerCase();
  const desde = document.getElementById('op-desde').value;
  const hasta = document.getElementById('op-hasta').value;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `horas-${nombre}-${desde}-${hasta}.csv`;
  a.click();
}
