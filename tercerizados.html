<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<script src="/js/supabase-config.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maderable · Tercerizados</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap');
  :root{
    --bg:#0f0f0f;--panel:#111;--card:#131313;--border:#1e1e1e;--border2:#2a2a2a;
    --accent:#FFD600;--blue:#4a9eff;--green:#4caf50;--red:#e03030;
    --muted:#555;--text:#e0e0e0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;}
  .shell{display:flex;height:100vh;overflow:hidden;}
  .sidebar{width:200px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;font-size:13px;color:var(--muted);border-left:3px solid transparent;transition:all .15s;text-decoration:none;}
  .nav-item:hover{background:rgba(255,255,255,.02);color:var(--text);}
  .nav-item.active{background:rgba(255,214,0,.06);color:var(--accent);border-left-color:var(--accent);font-weight:600;}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;height:50px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
  .topbar-title{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;letter-spacing:.3px;}
  .chip:hover{border-color:var(--accent);color:var(--accent);}
  .chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
  .board{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);overflow:hidden;}
  .col{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}
  .col-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .col-dot{width:8px;height:8px;border-radius:50%;}
  .col-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
  .col-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;margin-left:auto;}
  .col-body{flex:1;overflow-y:auto;padding:10px 12px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;transition:border-color .15s;}
  .card:hover{border-color:var(--border2);}
  .card-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .card-code{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);}
  .card-odf{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
  .card-nombre{font-size:12px;font-weight:600;color:#ccc;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-meta{font-size:10px;color:var(--muted);margin-bottom:6px;}
  .card-actions{display:flex;gap:6px;flex-wrap:wrap;}
  .btn-sm{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:3px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent);}
  .btn-sm.primary{background:var(--accent);color:#000;border-color:var(--accent);}
  .btn-sm.success{background:var(--green);color:#000;border-color:var(--green);}
  .badge-prov{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:#1a1a1a;border:1px solid var(--border2);color:var(--muted);}
  .badge-recep{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;}
  .badge-ok{background:#0a1f0a;color:var(--green);border:1px solid #1a3a1a;}
  .badge-obs{background:#1f1a00;color:#f59e0b;border:1px solid #3a2f00;}
  .badge-rehacer{background:#1f0a0a;color:var(--red);border:1px solid #3a1a1a;}
  /* overlay/modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
  .overlay.open{display:flex;}
  .modal{background:#1e1e1e;border:1px solid var(--border2);border-radius:10px;padding:22px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  .field label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;}
  .field input,.field select,.field textarea{background:#111;border:1px solid #242424;border-radius:4px;padding:7px 10px;color:#ccc;font-size:12px;outline:none;width:100%;font-family:'DM Sans',sans-serif;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
  .field textarea{height:50px;resize:vertical;}
  .col-footer{padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0;}
  .col-footer a{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline;}
  .col-footer a:hover{color:var(--accent);}
  @media(max-width:900px){.board{grid-template-columns:1fr;}.sidebar{display:none;}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
  .shake{animation:shake .35s ease;}
</style>
<script src="sidebar.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);">
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:40px;width:100%;max-width:360px;">
      <div style="font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:3px;text-align:center;margin-bottom:6px;">&#9675; MADERABLE</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-align:center;margin-bottom:28px;">TERCERIZADOS</div>
      <input id="pw-input" type="password" placeholder="contrase\u00f1a"
        style="width:100%;background:#111;border:1px solid var(--border);border-radius:6px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px;font-family:'Space Mono',monospace;letter-spacing:3px;"
        onkeydown="if(event.key==='Enter')_login()">
      <button onclick="_login()" style="width:100%;background:var(--accent);color:#000;border:none;border-radius:6px;padding:13px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;">INGRESAR \u2192</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="screen-app" style="display:none;">
<div class="shell">
<div id="sidebar-root"></div>
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="topbar-title">TERCERIZADOS</span>
    <div style="display:flex;gap:6px;margin-left:16px;" id="prov-chips"></div>
    <button onclick="abrirConfigProvs()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px;" title="Configurar proveedores">⚙</button>
  </div>

  <!-- BOARD -->
  <div class="board">
    <!-- Col 1: En taller -->
    <div class="col">
      <div class="col-header">
        <span class="col-dot" style="background:var(--accent);"></span>
        <span class="col-title">En taller</span>
        <span class="col-count" style="color:var(--accent);" id="count-taller">0</span>
        <button onclick="abrirNuevaPartida()" style="margin-left:auto;background:#FFD600;color:#000;font-family:monospace;font-size:9px;padding:4px 10px;border-radius:3px;border:none;cursor:pointer;font-weight:700;text-transform:uppercase;">+ Agregar</button>
      </div>
      <div class="col-body" id="col-taller"></div>
    </div>
    <!-- Col 2: En proveedor -->
    <div class="col">
      <div class="col-header">
        <span class="col-dot" style="background:var(--blue);"></span>
        <span class="col-title">En proveedor</span>
        <span class="col-count" style="color:var(--blue);" id="count-prov">0</span>
      </div>
      <div class="col-body" id="col-prov"></div>
    </div>
    <!-- Col 3: Recibidas -->
    <div class="col">
      <div class="col-header">
        <span class="col-dot" style="background:var(--green);"></span>
        <span class="col-title">Recibidas</span>
        <span class="col-count" style="color:var(--green);" id="count-recv">0</span>
      </div>
      <div class="col-body" id="col-recv"></div>
      <div class="col-footer"><a onclick="_toggleVerTodas();" id="ver-todas-link">Ver todas</a></div>
    </div>
  </div>


</div><!-- /main -->
</div><!-- /shell -->

<!-- MODAL DESPACHO -->
<div class="overlay" id="overlay-desp" onclick="cerrarModal('desp')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Despachar al Proveedor</div>
    <div class="field"><label>Tipo de despacho</label>
      <div style="display:flex;gap:8px;">
        <button id="desp-btn-total" onclick="setTipoDesp('total')" class="btn-sm primary">Total</button>
        <button id="desp-btn-parcial" onclick="setTipoDesp('parcial')" class="btn-sm">Parcial</button>
      </div>
    </div>
    <div class="field"><label>Cantidad de bultos</label><input type="number" id="desp-bultos" min="1" value="1" style="width:100px;"/></div>
    <div class="field"><label>Partes que salen</label><textarea id="desp-partes" placeholder="Ej: Asiento izq., respaldo..."></textarea></div>
    <div class="field"><label>Fecha salida</label><input type="date" id="desp-fecha"/></div>
    <div class="field"><label>Nota</label><input id="desp-nota" placeholder="Observaciones..."/></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-sm primary" onclick="confirmarDespacho()">Despachar →</button>
      <button class="btn-sm" onclick="cerrarModal('desp')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL RECEPCION -->
<div class="overlay" id="overlay-recv" onclick="cerrarModal('recv')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Registrar Recepción</div>
    <div class="field"><label>Fecha recepción</label><input type="date" id="recv-fecha"/></div>
    <div class="field"><label>Estado al recibir</label>
      <select id="recv-estado">
        <option value="ok">✓ Conforme</option>
        <option value="obs">⚠ Con observaciones</option>
        <option value="rehacer">✗ A rehacer</option>
      </select>
    </div>
    <div class="field"><label>Observaciones</label><textarea id="recv-obs" placeholder="Notas..."></textarea></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-sm success" onclick="confirmarRecepcion()">✓ Confirmar</button>
      <button class="btn-sm" onclick="cerrarModal('recv')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE BARU -->
<div class="overlay" id="overlay-detalle-baru" onclick="cerrarModal('detalle-baru')">
  <div class="modal" onclick="event.stopPropagation()" style="width:480px;">
    <div class="modal-title" id="detalle-baru-title">DETALLE ENVÍO</div>
    <div id="detalle-baru-body"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn-sm" onclick="cerrarModal('detalle-baru')">Cerrar</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════
// DATOS
// ══════════════════════════════════════════════════════════════════════════
let PROVS = JSON.parse(localStorage.getItem('proveedores') || '{"tap":"Tapicero","lus":"Lustrador"}');
let _PROYECTOS = [];
window.sbFetch('proyectos_cache?activo=eq.true&order=nombre')
  .then(data => { _PROYECTOS = data || []; })
  .catch(e => console.error('Error cargando proyectos:', e));

let PARTIDAS = JSON.parse(localStorage.getItem('partidas') || '[]');

function guardarPartidas(ids) {
  localStorage.setItem('partidas', JSON.stringify(PARTIDAS));
  const lista = ids ? PARTIDAS.filter(p => ids.includes(p.id)) : PARTIDAS;
  lista.forEach(p => fetch('/api/tiempos?action=guardar-partida',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}).catch(err => console.error('guardar-partida error:', err)));
}

// ══════════════════════════════════════════════════════════════════════════
// ESTADO UI
// ══════════════════════════════════════════════════════════════════════════
let filtroProveedor = 'todos'; // 'todos' | 'tap' | 'lus'
let modalPartidaId = null;
let modalTipoNueva = 'lus';
let tipoDesp = 'total';
let verTodasRecibidas = false;

// ══════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════
function render() {
  renderChips();
  const listaBase = filtroProveedor === 'todos' ? PARTIDAS : PARTIDAS.filter(p => p.proveedorNombre === filtroProveedor || (p.tipo === filtroProveedor));
  const listaActiva = listaBase.filter(p => !p.archivada);
  const taller = listaActiva.filter(p => p.estado === 'en_taller');
  const prov = listaActiva.filter(p => p.estado === 'despachada');
  let recv;
  if (verTodasRecibidas) {
    // Ver todas incluye archivadas
    recv = listaBase.filter(p => p.estado === 'recibida');
  } else {
    recv = listaActiva.filter(p => p.estado === 'recibida');
    const mesActual = new Date().toISOString().slice(0, 7);
    recv = recv.filter(p => (p.fechaRecepcion || '').startsWith(mesActual));
  }

  document.getElementById('count-taller').textContent = taller.length;
  document.getElementById('count-prov').textContent = prov.length;
  document.getElementById('count-recv').textContent = recv.length;

  document.getElementById('col-taller').innerHTML = taller.length
    ? taller.map(p => cardHtml(p, 'taller')).join('')
    : '<div style="text-align:center;padding:20px;color:var(--muted);font-size:11px;">Sin partidas en taller</div>';

  document.getElementById('col-prov').innerHTML = prov.length
    ? prov.map(p => cardHtml(p, 'prov')).join('')
    : '<div style="text-align:center;padding:20px;color:var(--muted);font-size:11px;">Sin partidas en proveedor</div>';

  document.getElementById('col-recv').innerHTML = recv.length
    ? recv.map(p => cardHtml(p, 'recv')).join('')
    : '<div style="text-align:center;padding:20px;color:var(--muted);font-size:11px;">Sin recepciones este mes</div>';

  const link = document.getElementById('ver-todas-link');
  if (link) link.textContent = verTodasRecibidas ? 'Solo este mes' : 'Ver todas';
}

function cardHtml(p, col) {
  const provLabel = p.proveedorNombre || (p.tipo === 'tap' ? PROVS.tap : PROVS.lus);
  const showProv = filtroProveedor === 'todos';
  let actions = '';
  if (col === 'taller') {
    actions = `<button class="btn-sm primary" onclick="abrirDespacho('${p.id}')">→ Despachar</button>`;
  } else if (col === 'prov') {
    const esBaru = (p.proveedorNombre||'').toUpperCase().includes('BARU');
    const baruPendiente = esBaru && !p.baru_completado_at;
    actions = baruPendiente
      ? `<button class="btn-sm" disabled style="opacity:.4;cursor:not-allowed;" title="BARU no completó el trabajo aún">✓ Recibir</button>`
      : `<button class="btn-sm success" onclick="abrirRecepcion('${p.id}')">✓ Recibir</button>`;
  }
  // Etiquetas + archivar en todas las columnas
  const etqBtn = `<button class="btn-sm" onclick="imprimirEtiquetas('${p.id}')" style="border-color:#333;color:#aaa;" onmouseenter="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseleave="this.style.borderColor='#333';this.style.color='#aaa'">\u{1F5A8}</button>`;
  const archBtn = `<button class="btn-sm" onclick="archivarPartida('${p.id}')" style="border-color:#333;color:#555;font-size:9px;" onmouseenter="this.style.borderColor='var(--muted)';this.style.color='var(--muted)'" onmouseleave="this.style.borderColor='#333';this.style.color='#555'">Archivar</button>`;
  actions = (actions ? actions : '') + etqBtn + archBtn;
  let recepBadge = '';
  if (col === 'recv' && p.estadoRecep) {
    const cls = p.estadoRecep === 'ok' ? 'badge-ok' : p.estadoRecep === 'obs' ? 'badge-obs' : 'badge-rehacer';
    const txt = p.estadoRecep === 'ok' ? '✓ Conforme' : p.estadoRecep === 'obs' ? '⚠ Obs.' : '✗ Rehacer';
    recepBadge = `<span class="badge-recep ${cls}">${txt}</span>`;
  }
  const clickEdit = col === 'taller' ? ` onclick="abrirEditarPartida('${p.id}')" style="cursor:pointer;"`
    : col === 'recv' ? ` onclick="abrirDetalleBaruRecv('${p.id}')" style="cursor:pointer;"` : '';
  return `<div class="card"${clickEdit}>
    <div class="card-row1">
      <span class="card-code">${p.muebleCodigo || '—'}</span>
      <span style="display:flex;align-items:center;gap:6px;">
        ${p.numero_envio ? `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:#0a1a2a;color:var(--blue);border:1px solid #1a2a3a;">${p.numero_envio}</span>` : ''}
        <span class="card-odf">${p.proyectoNum || ''}</span>
      </span>
    </div>
    <div class="card-nombre">${p.muebleNombre || '—'}</div>
    <div class="card-meta">
      ${p.obra ? p.obra + ' · ' : ''}${p.cliente ? p.cliente + ' · ' : ''}${p.bultos ? p.bultos + ' bulto(s)' : ''}
      ${p.partes ? ' · ' + p.partes : ''}
      ${p.fechaDespacho ? ' · ' + p.fechaDespacho : ''}
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
      ${showProv ? `<span class="badge-prov" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${provLabel}</span>` : ''}
      ${recepBadge}
      ${col === 'prov' && p.fechaRetornoEstimada ? (() => {
        const hoy = new Date(); hoy.setHours(0,0,0,0);
        const ret = new Date(p.fechaRetornoEstimada + 'T00:00:00');
        const atrasada = ret < hoy;
        const fmtRet = ret.toLocaleDateString('es-UY',{day:'2-digit',month:'2-digit'});
        const modBadge = p.retorno_modificado_baru ? '<span style="font-family:monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:#1f1a00;color:#f59e0b;border:1px solid #3a2f00;margin-left:4px;">\u270E Modif. proveedor</span>' : '';
        return `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);">Retorno: ${fmtRet}</span><span style="font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;letter-spacing:1px;text-transform:uppercase;${atrasada?'background:#2a0a0a;color:#ef5350;border:1px solid #3a1a1a;':'background:#0a2a0a;color:#4caf50;border:1px solid #1a3a1a;'}">${atrasada?'ATRASADA':'VIGENTE'}</span>${modBadge}`;
      })() : ''}
      ${col === 'prov' && p.fechaDespacho ? `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#888;">\u2192 Despachado \u00b7 ${new Date(p.fechaDespacho + (p.fechaDespacho.includes('T') ? '' : 'T12:00:00')).toLocaleDateString('es-UY',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>` : ''}
      ${col === 'prov' && p.fechaRecepcionProveedor ? `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:#4caf50;">\u2713 Recibido por proveedor \u00b7 ${new Date(p.fechaRecepcionProveedor).toLocaleDateString('es-UY',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>` : ''}
      ${col === 'prov' && p.baru_completado_at ? `<span style="font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:#0a2a0a;color:#4caf50;border:1px solid #1a3a1a;">\u2713 Completado por BARU</span>` : ''}
    </div>
    ${col === 'prov' && p.instruccion_lustre && (p.proveedorNombre||'').toUpperCase().includes('BARU') ? `<div style="margin-top:6px;border-left:2px solid var(--accent);padding-left:8px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.instruccion_lustre}</div>` : ''}
    ${actions ? `<div class="card-actions" style="margin-top:6px;" onclick="event.stopPropagation()">${actions}</div>` : ''}
  </div>`;
}

function renderChips() {
  const el = document.getElementById('prov-chips');
  const c = (id, label) => `<span class="chip ${filtroProveedor===id?'active':''}" onclick="filtroProveedor='${id}';render();">${label}</span>`;
  let html = c('todos','Todos');
  _provsCache.forEach(pv => { html += c(pv.nombre, pv.nombre); });
  // Fallback si no hay proveedores cargados aún
  if (!_provsCache.length) { html += c('lus', PROVS.lus) + c('tap', PROVS.tap); }
  // Botón reporte BARU (admin only, solo cuando filtro BARU activo)
  const sess = (() => { try { return JSON.parse(sessionStorage.getItem('mble_session')||'{}'); } catch(e) { return {}; } })();
  if (sess.rol_app === 'admin' && filtroProveedor.toUpperCase().includes('BARU')) {
    html += ` <span class="chip" onclick="window.open('/baru-reporte.html','_blank')" style="margin-left:8px;">📊 Reporte BARU</span>`;
  }
  el.innerHTML = html;
}

function _toggleVerTodas() { verTodasRecibidas = !verTodasRecibidas; render(); }

let _despBultosMarcados = [];

function abrirDespacho(id) {
  modalPartidaId = id;
  const p = PARTIDAS.find(x => x.id === id);
  if (!p) return;
  const bultos = p.bultos || 1;
  const provNombre = p.proveedorNombre || (p.tipo === 'tap' ? PROVS.tap : PROVS.lus);
  _despBultosMarcados = new Array(bultos).fill(false);

  const overlay = document.createElement('div');
  overlay.className = 'overlay open';
  overlay.id = 'overlay-desp-bultos';
  overlay.onclick = () => document.body.removeChild(overlay);
  const esBaru = (provNombre||'').toUpperCase().includes('BARU');
  const instruccionField = esBaru ? `
    <div class="field" style="margin-bottom:14px;">
      <label>Instrucción de lustre</label>
      <textarea id="desp-instruccion" placeholder="Ej: Lustrado según muestra..." style="height:60px;font-family:'Space Mono',monospace;font-size:11px;">${(p.instruccion_lustre||'').replace(/</g,'&lt;')}</textarea>
      <div id="desp-sugerencias" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;"></div>
    </div>` : '';

  overlay.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">DESPACHO A ${(provNombre||'').toUpperCase()}</div>
    ${instruccionField}
    <div id="desp-bultos-list"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button id="desp-confirm-btn" class="btn-sm" disabled onclick="_confirmarDespachoBultos('${id}')">Confirmar despacho (0/${bultos})</button>
      <button class="btn-sm" onclick="document.body.removeChild(document.getElementById('overlay-desp-bultos'))">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  _renderDespBultos(p);

  // Cargar sugerencias de instrucción para BARU
  if (esBaru && p.proyectoNum) {
    fetch('/api/baru-sugerencias-instruccion?proyecto_num=' + encodeURIComponent(p.proyectoNum))
      .then(r => r.json())
      .then(d => {
        if (!d.ok || !d.sugerencias?.length) return;
        const el = document.getElementById('desp-sugerencias');
        if (!el) return;
        el.innerHTML = d.sugerencias.map(s =>
          `<span onclick="document.getElementById('desp-instruccion').value=this.textContent" style="font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:3px;background:#111;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;" onmouseenter="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">${s}</span>`
        ).join('');
      }).catch(() => {});
  }
}

function _renderDespBultos(p) {
  const bultos = p.bultos || 1;
  const list = document.getElementById('desp-bultos-list');
  if (!list) return;
  let html = '';
  for (let i = 0; i < bultos; i++) {
    const checked = _despBultosMarcados[i];
    html += `<div onclick="_toggleDespBulto(${i})" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${checked?'#0a1a0a':'var(--panel)'};border:1px solid ${checked?'var(--green)':'var(--border)'};border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all .15s;">
      <div style="width:18px;height:18px;border-radius:4px;border:2px solid ${checked?'var(--green)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:11px;${checked?'background:var(--green);color:#000;':'color:transparent;'}">${checked?'\u2713':''}</div>
      <span style="font-size:11px;font-family:'Space Mono',monospace;">BULTO ${i+1}</span>
      <span style="font-size:9px;color:var(--muted);margin-left:auto;">${p.numero_envio||''}</span>
    </div>`;
  }
  list.innerHTML = html;
  const marcados = _despBultosMarcados.filter(Boolean).length;
  const btn = document.getElementById('desp-confirm-btn');
  if (btn) {
    btn.textContent = `Confirmar despacho (${marcados}/${bultos})`;
    btn.disabled = marcados < bultos;
    btn.className = marcados >= bultos ? 'btn-sm primary' : 'btn-sm';
  }
}

function _toggleDespBulto(idx) {
  _despBultosMarcados[idx] = !_despBultosMarcados[idx];
  const p = PARTIDAS.find(x => x.id === modalPartidaId);
  if (p) _renderDespBultos(p);
}

async function _confirmarDespachoBultos(id) {
  const p = PARTIDAS.find(x => x.id === id);
  if (!p) return;
  // Guardar instrucción de lustre si existe el campo
  const instrEl = document.getElementById('desp-instruccion');
  if (instrEl) {
    const instruccion = instrEl.value.trim();
    try {
      await fetch('/api/baru-guardar-instruccion', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ id: p.id, instruccion_lustre: instruccion })
      });
      p.instruccion_lustre = instruccion;
    } catch(e) { console.error('guardar-instruccion error:', e); }
  }
  try {
    const res = await fetch('/api/tiempos?action=despachar-partida', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ partida_id: p.id, bultos: p.bultos||1, partes:'', fecha: hoy(), nota:'', tipoDespacho:'total' })
    });
    const data = await res.json();
    if (data.ok) {
      p.estado = 'despachada';
      p.tipoDespacho = 'total';
      p.fechaDespacho = hoy();
      p.numero_envio = data.numero_envio || p.numero_envio || '';
    }
  } catch(e) {
    p.estado = 'despachada'; p.fechaDespacho = hoy();
  }
  guardarPartidas([p.id]);
  const ov = document.getElementById('overlay-desp-bultos');
  if (ov) document.body.removeChild(ov);
  render();
}

function setTipoDesp(t) {
  tipoDesp = t;
  document.getElementById('desp-btn-total').className = 'btn-sm' + (t==='total'?' primary':'');
  document.getElementById('desp-btn-parcial').className = 'btn-sm' + (t==='parcial'?' primary':'');
}

async function confirmarDespacho() {
  const p = PARTIDAS.find(x=>x.id===modalPartidaId); if(!p) return;
  const bultos = parseInt(document.getElementById('desp-bultos').value) || 1;
  const partes = document.getElementById('desp-partes').value;
  const fecha = document.getElementById('desp-fecha').value;
  const nota = document.getElementById('desp-nota').value;

  if (tipoDesp === 'total') {
    // Llamar endpoint para asignar numero_envio
    try {
      const res = await fetch('/api/tiempos?action=despachar-partida', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ partida_id: p.id, bultos, partes, fecha, nota, tipoDespacho:'total' })
      });
      const data = await res.json();
      if (data.ok) {
        p.estado = 'despachada';
        p.tipoDespacho = 'total';
        p.bultos = bultos;
        p.partes = partes;
        p.fechaDespacho = fecha;
        p.nota = nota;
        p.numero_envio = data.numero_envio || '';
      }
    } catch(e) {
      // Fallback local sin numero_envio
      p.estado = 'despachada'; p.tipoDespacho = 'total';
      p.bultos = bultos; p.partes = partes; p.fechaDespacho = fecha; p.nota = nota;
    }
  } else {
    const nueva = { ...p, id:'p'+Date.now(), estado:'en_taller', tipoDespacho:'parcial',
      bultos, partes, fechaRecepcion:'', estadoRecep:'', obs:'', nota:'' };
    p.nota = `Despacho parcial el ${fecha}. Quedan partes en taller.`;
    PARTIDAS.push(nueva);
    // Save nueva first, then despachar it
    await fetch('/api/tiempos?action=guardar-partida',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(nueva)}).catch(err=>console.error('guardar-partida error:',err));
    try {
      const res = await fetch('/api/tiempos?action=despachar-partida', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ partida_id: nueva.id, bultos, partes, fecha, nota, tipoDespacho:'parcial' })
      });
      const data = await res.json();
      if (data.ok) { nueva.estado='despachada'; nueva.numero_envio = data.numero_envio || ''; nueva.fechaDespacho = fecha; }
    } catch(e) { nueva.estado='despachada'; nueva.fechaDespacho = fecha; }
  }
  guardarPartidas([p.id]); cerrarModal('desp'); render();
}

function abrirRecepcion(id) {
  modalPartidaId = id;
  document.getElementById('recv-fecha').value = hoy();
  document.getElementById('recv-estado').value = 'ok';
  document.getElementById('recv-obs').value = '';
  abrirModal('recv');
}

function confirmarRecepcion() {
  const p = PARTIDAS.find(x=>x.id===modalPartidaId); if(!p) return;
  p.estado = 'recibida';
  p.fechaRecepcion = document.getElementById('recv-fecha').value;
  p.estadoRecep = document.getElementById('recv-estado').value;
  p.obs = document.getElementById('recv-obs').value;
  p.retorno_modificado_baru = false;
  guardarPartidas([p.id]); cerrarModal('recv'); render();
}

async function archivarPartida(id) {
  if (!confirm('¿Archivar esta partida? No aparecerá más en el tablero.')) return;
  const p = PARTIDAS.find(x => x.id === id);
  if (!p) return;
  p.archivada = true;
  try {
    await fetch('/api/tiempos?action=archivar-partida',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({partida_id:id})});
  } catch(e) { console.error('archivar error:', e); }
  render();
}

let _provsCache = [];
async function abrirNuevaPartida() {
  // Si hay filtro de proveedor activo, asignar tipo automáticamente
  if (filtroProveedor !== 'todos') {
    modalTipoNueva = filtroProveedor;
  } else {
    modalTipoNueva = 'lus';
  }
  // Cargar proveedores
  try {
    const r = await fetch('/api/tiempos?action=proveedores-terceros');

    if (d.ok) _provsCache = d.proveedores || [];
  } catch(e) {}
  const mostrarProceso = filtroProveedor === 'todos';
  // Determinar proveedor pre-seleccionado por filtro
  const provFiltrado = (filtroProveedor !== 'todos') ? _provsCache.find(pv => pv.tipo === filtroProveedor) : null;
  const provOpts = _provsCache.map(pv => `<option value="${pv.nombre}" data-tipo="${pv.tipo}" ${provFiltrado && pv.id === provFiltrado.id ? 'selected' : ''}>${pv.nombre}</option>`).join('');

  const overlay = document.createElement('div');
  overlay.className = 'overlay open';
  overlay.id = 'overlay-nueva';
  overlay.onclick = () => document.body.removeChild(overlay);
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Nueva Partida</div>
      ${mostrarProceso ? `<div class="field"><label>Proceso</label>
        <div style="display:flex;gap:6px;">
          <span class="chip active" id="chip-tipo-lus" onclick="_setTipoNueva('lus')">Lustre</span>
          <span class="chip" id="chip-tipo-tap" onclick="_setTipoNueva('tap')">Tapiceria</span>
        </div>
      </div>` : ''}
      <div class="field"><label>Proveedor</label>
        <select id="nueva-proveedor" ${provFiltrado ? 'disabled' : ''}>
          <option value="">Seleccionar...</option>
          ${provOpts}
        </select>
      </div>
      <div class="field" style="position:relative;"><label>Proyecto</label>
        <input type="text" id="nueva-pr-search" placeholder="Buscar proyecto..." autocomplete="off"
          oninput="_filtrarProyNueva()" onfocus="_filtrarProyNueva()" onblur="setTimeout(()=>{const l=document.getElementById('nueva-pr-list');if(l)l.style.display='none';},150)" />
        <div id="nueva-pr-list" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:100;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;max-height:200px;overflow-y:auto;margin-top:2px;"></div>
        <input type="hidden" id="nueva-pr" value="" />
        <div style="margin-top:4px;"><a href="#" onclick="event.preventDefault();document.getElementById('nueva-pr').value='manual';document.getElementById('nueva-manual').style.display='flex';document.getElementById('nueva-muebles-wrap').style.display='none';" style="font-size:10px;color:#555;text-decoration:underline;">Cargar manualmente</a></div>
      </div>
      <div class="field"><label>Cliente</label><input id="nueva-cliente" placeholder="Nombre del cliente"/></div>
      <div id="nueva-manual" style="display:none;gap:12px;flex-direction:column;">
        <div class="field"><label>Número proyecto</label><input id="nueva-num" placeholder="ODF-2385"/></div>
        <div class="field"><label>Obra</label><input id="nueva-obra" placeholder="HUGO BOSS"/></div>
      </div>
      <div id="nueva-muebles-wrap" style="display:none;">
        <div class="field"><label>Mueble</label>
          <select id="nueva-mueble"><option value="">Seleccionar mueble...</option></select>
        </div>
      </div>
      <div class="field"><label>Nombre mueble</label><input id="nueva-nombre" placeholder="Descripción"/></div>
      <div class="field"><label>Bultos</label><input type="number" id="nueva-bultos" min="1" value="1" style="width:100px;"/></div>
      <div style="display:flex;gap:8px;">
        <button class="btn-sm primary" onclick="confirmarNueva()">Agregar</button>
        <button class="btn-sm" onclick="document.body.removeChild(document.getElementById('overlay-nueva'))">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function _setTipoNueva(t) {
  modalTipoNueva = t;
  document.getElementById('chip-tipo-lus').className = 'chip' + (t==='lus'?' active':'');
  document.getElementById('chip-tipo-tap').className = 'chip' + (t==='tap'?' active':'');
  // Re-filter muebles if project selected
  const prId = document.getElementById('nueva-pr')?.value;
  if (prId && prId !== 'manual') onNuevaPr(prId);
}

function _filtrarProyNueva() {
  const q = (document.getElementById('nueva-pr-search')?.value || '').toLowerCase();
  const list = document.getElementById('nueva-pr-list');
  if (!list) return;
  const filtered = _PROYECTOS.filter(p =>
    [p.numero, p.nombre, p.obra, p.cliente_nombre, p.cliente].join(' ').toLowerCase().includes(q)
  ).slice(0, 6);
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:8px 12px;font-size:11px;color:#555;">Sin resultados</div>';
  } else {
    list.innerHTML = filtered.map(p =>
      `<div onmousedown="_selProyNueva('${p.id}')" style="padding:8px 12px;font-size:12px;cursor:pointer;transition:background .1s;" onmouseenter="this.style.background='#222'" onmouseleave="this.style.background='transparent'"><span style="color:#FFD600;font-family:'JetBrains Mono',monospace;font-size:11px;">${p.numero||''}</span> <span style="color:#ccc;">${(p.nombre && p.nombre !== p.numero) ? p.nombre : p.obra || ''}</span></div>`
    ).join('');
  }
  list.style.display = 'block';
}

function _selProyNueva(prId) {
  const pr = _PROYECTOS.find(p => p.id === prId);
  if (!pr) return;
  document.getElementById('nueva-pr').value = prId;
  document.getElementById('nueva-pr-search').value = (pr.numero||'') + ' · ' + ((pr.nombre && pr.nombre !== pr.numero) ? pr.nombre : pr.obra || '');
  document.getElementById('nueva-pr-list').style.display = 'none';
  document.getElementById('nueva-manual').style.display = 'none';
  onNuevaPr(prId);
}

function onNuevaPr(prId) {
  const pr = _PROYECTOS.find(p=>p.id===prId);
  document.getElementById('nueva-muebles-wrap').style.display = pr?'block':'none';
  if (pr) {
    const sel = document.getElementById('nueva-mueble');
    const tipo = modalTipoNueva;
    const muebles = (pr.muebles || []).filter(m => {
      if (!tipo) return true; // General/sin tipo: mostrar todos
      const flujos = m.flujos || [];
      if (tipo === 'lus') return flujos.includes('lustre');
      if (tipo === 'tap') return flujos.includes('tapiceria');
      return true;
    });
    sel.innerHTML = '<option value="">Seleccionar mueble...</option>' +
      (muebles.length ? muebles.map(m=>`<option value="${m.codigo}|||${m.nombre}">${m.codigo} · ${m.nombre}</option>`).join('') : '<option disabled>Sin muebles con este proceso</option>');
    const cliEl = document.getElementById('nueva-cliente');
    if (cliEl) cliEl.value = pr.cliente_nombre || pr.cliente || '';
    sel.onchange = () => {
      const v=sel.value.split('|||');
      document.getElementById('nueva-nombre').value=v[1]||'';
    };
  }
}

function confirmarNueva() {
  const prId = document.getElementById('nueva-pr')?.value;
  const pr = _PROYECTOS.find(p=>p.id===prId);
  const muebleVal = document.getElementById('nueva-mueble')?.value || '';
  const muebleParts = muebleVal.split('|||');
  const provSel = document.getElementById('nueva-proveedor')?.value || '';
  const nueva = {
    id: 'p'+Date.now(),
    tipo: modalTipoNueva,
    proyectoNum: pr?.numero || document.getElementById('nueva-num')?.value || '',
    obra: pr?.obra || document.getElementById('nueva-obra')?.value || '',
    cliente: document.getElementById('nueva-cliente')?.value || '',
    muebleCodigo: muebleParts[0] || '',
    muebleNombre: document.getElementById('nueva-nombre')?.value || muebleParts[1] || '',
    proveedorNombre: provSel,
    bultos: parseInt(document.getElementById('nueva-bultos')?.value) || 1,
    estado:'en_taller', partes:'', fechaDespacho:'', fechaRecepcion:'', estadoRecep:'', obs:'', nota:''
  };
  if (!nueva.muebleNombre) { alert('Completá el nombre del mueble'); return; }
  PARTIDAS.push(nueva);
  guardarPartidas([nueva.id]);
  const ov = document.getElementById('overlay-nueva');
  if(ov) document.body.removeChild(ov);
  render();
}

      <div class="field" style="position:relative;"><label>Proyecto</label>

        <input type="hidden" id="edit-proyecto" value="${prActual?.id||''}"/>
      </div>
      <div class="field"><label>Cliente</label>
        <div id="edit-cliente-display" style="font-size:12px;color:#ccc;padding:7px 0;">${clienteActual || '<span style="color:var(--muted);">—</span>'}</div>
      </div>
      <div class="field"><label>Mueble</label>
        <select id="edit-mueble-sel" onchange="_editMuebleChange()" style="${tieneProyecto?'':'display:none;'}"><option value="">Seleccionar...</option></select>
        <input id="edit-nombre" value="${(p.muebleNombre||'').replace(/"/g,'&quot;')}" placeholder="Nombre del mueble" style="${tieneProyecto?'margin-top:6px;':''}"/>
      </div>
      <div class="field"><label>Código</label><input id="edit-codigo" value="${(p.muebleCodigo||'').replace(/"/g,'&quot;')}" readonly style="opacity:.6;cursor:not-allowed;"/></div>

      <div class="field"><label>Retorno estimado</label><input type="date" id="edit-retorno" value="${defaultRetorno}"/></div>
      <div class="field"><label>Nota</label><textarea id="edit-nota" placeholder="Observaciones...">${(p.nota||'').replace(/</g,'&lt;')}</textarea></div>
      <div style="display:flex;gap:8px;">
        <button class="btn-sm primary" onclick="_guardarEditPartida('${p.id}')">Guardar</button>
        <button class="btn-sm" onclick="document.body.removeChild(document.getElementById('overlay-edit'))">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  if (tieneProyecto) _editLoadMuebles(prActual);
}

function _editFiltrarProy() {
  const q = (document.getElementById('edit-proy-search')?.value || '').toLowerCase();
  const list = document.getElementById('edit-proy-list');
  if (!list) return;
  const filtered = _PROYECTOS.filter(p =>
    [p.numero, p.nombre, p.obra, p.cliente_nombre, p.cliente].join(' ').toLowerCase().includes(q)
  ).slice(0, 8);
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:8px 12px;font-size:11px;color:#555;">Sin resultados</div>';
  } else {
    list.innerHTML = filtered.map(p =>
      `<div onmousedown="_editSelProy('${p.id}')" style="padding:8px 12px;font-size:12px;cursor:pointer;transition:background .1s;" onmouseenter="this.style.background='#222'" onmouseleave="this.style.background='transparent'"><span style="color:#FFD600;font-family:'JetBrains Mono',monospace;font-size:11px;">${p.numero||''}</span> <span style="color:#ccc;">${(p.nombre && p.nombre !== p.numero) ? p.nombre : p.obra || ''}</span></div>`
    ).join('');
  }
  list.style.display = 'block';
}

function _editSelProy(prId) {
  const pr = _PROYECTOS.find(p => p.id === prId);
  if (!pr) return;
  document.getElementById('edit-proyecto').value = prId;
  document.getElementById('edit-proy-search').value = (pr.numero||'') + ' \u00b7 ' + ((pr.nombre && pr.nombre !== pr.numero) ? pr.nombre : pr.obra || '');
  document.getElementById('edit-proy-list').style.display = 'none';
  // Update cliente
  const cli = pr.cliente_nombre || pr.cliente || '';
  document.getElementById('edit-cliente-display').innerHTML = cli || '<span style="color:var(--muted);">—</span>';
  // Show and load muebles
  const mSel = document.getElementById('edit-mueble-sel');
  if (mSel) { mSel.style.display = ''; }
  _editLoadMuebles(pr);
}

function _editLoadMuebles(pr) {
  const sel = document.getElementById('edit-mueble-sel');
  if (!sel || !pr) return;
  const muebles = pr.muebles || [];
  sel.innerHTML = '<option value="">Seleccionar...</option>' +
    muebles.map(m => `<option value="${m.codigo}|||${m.nombre}">${m.codigo} \u00b7 ${m.nombre}</option>`).join('');
}

function _editMuebleChange() {
  const sel = document.getElementById('edit-mueble-sel');
  if (!sel || !sel.value) return;
  const parts = sel.value.split('|||');
  document.getElementById('edit-codigo').value = parts[0] || '';
  document.getElementById('edit-nombre').value = parts[1] || '';
}

function _fechaMasDias(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

function _guardarEditPartida(id) {
  const p = PARTIDAS.find(x => x.id === id);
  if (!p) return;
  const prId = document.getElementById('edit-proyecto')?.value;
  const pr = _PROYECTOS.find(x => x.id === prId);
  if (pr) { p.proyectoNum = pr.numero || ''; p.obra = pr.obra || ''; p.cliente = pr.cliente_nombre || pr.cliente || ''; }
  p.muebleNombre = document.getElementById('edit-nombre')?.value || p.muebleNombre;
  p.muebleCodigo = document.getElementById('edit-codigo')?.value || p.muebleCodigo;
  p.bultos = parseInt(document.getElementById('edit-bultos')?.value) || 1;
  p.nota = document.getElementById('edit-nota')?.value || '';
  p.fechaRetornoEstimada = document.getElementById('edit-retorno')?.value || '';
  guardarPartidas([p.id]);
  const ov = document.getElementById('overlay-edit');
  if (ov) document.body.removeChild(ov);
  render();
}

function imprimirEtiquetas(id) {
  const p = PARTIDAS.find(x => x.id === id);
  if (!p) return;
  const bultos = p.bultos || 1;
  for (let i = 0; i < bultos; i++) {
    setTimeout(() => _imprimirEtiqueta(p), i * 600);
  }
}

function _imprimirEtiqueta(p) {
  const provFull = p.proveedorNombre || (p.tipo === 'tap' ? PROVS.tap : PROVS.lus);
  const envio = p.numero_envio || 'ENV: PENDIENTE';
  const provShort = (provFull || '').split(' ')[0].toUpperCase();
  // Cliente: fallback al proyecto si la partida no lo tiene
  let clienteRaw = p.cliente || '';
  if (!clienteRaw) {
    const pr = _PROYECTOS.find(x => x.numero === p.proyectoNum);
    clienteRaw = pr?.cliente_nombre || pr?.cliente || '';
  }
  const cliente = (clienteRaw || '\u2014').toUpperCase();
  const odf = (p.proyectoNum || p.obra || '\u2014').toUpperCase();
  const proyecto = (p.obra || '\u2014').toUpperCase();
  const muebleNombre = (p.muebleNombre || '\u2014').toUpperCase();
  const codigo = (p.muebleCodigo || '\u2014').toUpperCase();

    : '\u2014';

  const win = window.open('', '_blank', 'width=450,height=350');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
<style>
@page{size:60mm 30mm;margin:0}

.odf-sm{font-size:3pt;opacity:.4;text-transform:uppercase;margin:0.8mm 0 0.2mm;letter-spacing:0.3pt}
.proj-big{font-size:6.5pt;font-weight:bold;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mueble{font-size:3pt;font-weight:bold;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.5;margin-top:1mm}
.qr-wrap{width:16mm;height:16mm;flex-shrink:0}

</div><div class="qr-wrap" id="qr"></div></div>
<div class="foot"><span>${codigo}</span><span>${bultosNum} bulto(s) \u00b7 ${retorno}</span></div>
<script>
new QRCode(document.getElementById('qr'),{text:'${qrUrl}',width:128,height:128,correctLevel:QRCode.CorrectLevel.M});
setTimeout(function(){window.print();window.close();},700);

  win.document.close();

function _fmtFechaCorta(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

// CONFIG PROVEEDORES

async function abrirConfigProvs() {
  // Cargar proveedores de Supabase
  let provsList = [];
  try {
    const res = await fetch('/api/tiempos?action=proveedores-terceros');
    const data = await res.json();
    if (data.ok) provsList = data.proveedores || [];
  } catch(e) {}

  const overlay = document.createElement('div');
  overlay.className = 'overlay open';
  overlay.id = 'overlay-cfg-prov';
  overlay.onclick = () => document.body.removeChild(overlay);

  const tipoLabel = t => t === 'tap' ? 'Tapiceria' : t === 'lus' ? 'Lustre' : 'General';
  const rowHtml = (p) => `
    <div class="cfg-prov-row" data-id="${p.id}" data-tipo="${p.tipo||''}" style="display:flex;gap:8px;align-items:center;margin-bottom:10px;padding:8px 10px;background:#111;border:1px solid #1e1e1e;border-radius:6px;">
      <div style="flex-shrink:0;width:70px;">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">TIPO</div>
        <div style="font-size:11px;color:#888;">${tipoLabel(p.tipo)}</div>
      </div>
      <div style="flex:1;">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">EMPRESA</div>
        <input class="cfg-prov-nombre" value="${(p.nombre||'').replace(/"/g,'&quot;')}" placeholder="Nombre empresa" style="width:100%;background:transparent;border:none;border-bottom:1px solid #242424;padding:3px 0;color:#ccc;font-size:12px;outline:none;font-family:'Space Mono',monospace;" onfocus="this.style.borderColor='#FFD600'" onblur="this.style.borderColor='#242424'"/>
      </div>
      <button onclick="_eliminarProv('${p.id}',this.closest('.cfg-prov-row'))" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;flex-shrink:0;" title="Eliminar">\u2715</button>
    </div>`;

  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Configurar Proveedores</div>
      <div id="cfg-provs-list">${provsList.map(rowHtml).join('')}</div>
      <button class="btn-sm" onclick="_addProvRow()" style="margin-top:6px;">+ Agregar proveedor</button>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn-sm primary" onclick="_guardarConfigProvs()">Guardar</button>
        <button class="btn-sm" onclick="document.body.removeChild(document.getElementById('overlay-cfg-prov'))">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function _addProvRow() {
  const list = document.getElementById('cfg-provs-list');
  if (!list) return;
  const row = document.createElement('div');
  row.className = 'cfg-prov-row';
  row.dataset.id = '';
  row.dataset.tipo = 'lus';
  row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:10px;padding:8px 10px;background:#111;border:1px solid #1e1e1e;border-radius:6px;';
  row.innerHTML = `
    <div style="flex-shrink:0;width:70px;">
      <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">TIPO</div>
      <select class="cfg-prov-tipo" style="background:transparent;border:none;color:#888;font-size:11px;outline:none;padding:0;">
        <option value="lus">Lustre</option><option value="tap">Tapiceria</option><option value="gen">General</option>
      </select>
    </div>
    <div style="flex:1;">
      <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">EMPRESA</div>
      <input class="cfg-prov-nombre" value="" placeholder="Nombre empresa" style="width:100%;background:transparent;border:none;border-bottom:1px solid #242424;padding:3px 0;color:#ccc;font-size:12px;outline:none;font-family:'Space Mono',monospace;" onfocus="this.style.borderColor='#FFD600'" onblur="this.style.borderColor='#242424'"/>
    </div>
    <button onclick="this.closest('.cfg-prov-row').remove()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;flex-shrink:0;">\u2715</button>`;
  list.appendChild(row);
}

async function _eliminarProv(id, rowEl) {
  if (id) {
    await fetch('/api/tiempos?action=eliminar-proveedor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}).catch(()=>{});
  }
  if (rowEl) rowEl.remove();
}

async function _guardarConfigProvs() {
  const rows = document.querySelectorAll('.cfg-prov-row');
  const promises = [];
  // Update PROVS from the first lus and first tap found
  let newLus = '', newTap = '';
  rows.forEach(row => {
    const id = row.dataset.id || '';
    const nombre = row.querySelector('.cfg-prov-nombre')?.value?.trim() || '';
    const tipo = row.querySelector('.cfg-prov-tipo')?.value || row.dataset.tipo || 'lus';
    if (!nombre) return;
    if (tipo === 'lus' && !newLus) newLus = nombre;
    if (tipo === 'tap' && !newTap) newTap = nombre;
    promises.push(fetch('/api/tiempos?action=guardar-proveedor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id||undefined,nombre,tipo})}).catch(()=>{}));
  });
  await Promise.all(promises);
  // Update config_global proveedores
  if (newLus) PROVS.lus = newLus;
  if (newTap) PROVS.tap = newTap;
  fetch('/api/tiempos?action=guardar-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clave:'proveedores',valor:PROVS})}).catch(()=>{});
  const ov = document.getElementById('overlay-cfg-prov');
  if (ov) document.body.removeChild(ov);
  render();
}

function abrirDetalleBaruRecv(pid) {
  const p = PARTIDAS.find(x => x.id === pid);
  if (!p) return;
  const fmtF = d => d ? new Date(d+(d.includes('T')?'':'T12:00:00')).toLocaleDateString('es-UY',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
  const estadoTxt = e => e==='ok'?'<span style="color:var(--green);">✓ Conforme</span>':e==='obs'?'<span style="color:#f59e0b;">⚠ Con observaciones</span>':e==='rehacer'?'<span style="color:var(--red);">✗ A rehacer</span>':'—';
  const items = p.baru_items || [];
  let itemsHtml = '';
  if (items.length) {
    itemsHtml = `<div style="margin-top:12px;"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">TRABAJO REGISTRADO POR BARU</div>`;
    items.forEach((it, i) => {
      const sub = it.precio_usd_m2 ? (Math.round(it.metros_cuadrados * it.precio_usd_m2 * 100)/100) : 0;
      itemsHtml += `<div style="background:#111;border:1px solid var(--border);border-radius:4px;padding:8px 10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;">
        <div><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);">${it.tipo_lustre||'—'}</span></div>
        <div style="text-align:right;"><span style="font-family:'JetBrains Mono',monospace;font-size:11px;">${it.metros_cuadrados||0} m²</span>${sub>0?` <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);">$${sub.toFixed(2)}</span>`:''}</div>
      </div>`;
    });
    itemsHtml += '</div>';
  }
  const body = document.getElementById('detalle-baru-body');
  body.innerHTML = `
    <div style="margin-bottom:10px;">
      ${p.numero_envio ? `<span style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 8px;border-radius:3px;background:#0a1a2a;color:var(--blue);border:1px solid #1a2a3a;">${p.numero_envio}</span>` : ''}
      <span style="font-size:10px;color:var(--muted);margin-left:6px;">${p.proyectoNum||''}</span>
    </div>
    <div style="font-size:14px;font-weight:600;color:#ccc;margin-bottom:4px;">${p.muebleNombre||'—'}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">${[p.obra,p.cliente,p.bultos?p.bultos+' bulto(s)':''].filter(Boolean).join(' · ')}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:10px;color:var(--muted);margin-bottom:10px;">
      <div>Despachado: <span style="color:#ccc;">${fmtF(p.fechaDespacho)}</span></div>
      <div>Recibido: <span style="color:#ccc;">${fmtF(p.fechaRecepcion)}</span></div>
    </div>
    <div style="margin-bottom:8px;">Estado: ${estadoTxt(p.estadoRecep)}</div>
    ${p.obs ? `<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">Obs: ${p.obs}</div>` : ''}
    ${p.instruccion_lustre ? `<div style="border-left:2px solid var(--accent);padding-left:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:8px;">${p.instruccion_lustre}</div>` : ''}
    ${itemsHtml}
    ${p.monto_usd != null && p.monto_usd > 0 ? `<div style="margin-top:10px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);">Total: $${Number(p.monto_usd).toFixed(2)} USD</div>` : ''}
  `;
  document.getElementById('detalle-baru-title').textContent = 'DETALLE ENVÍO' + (p.numero_envio ? ' · ' + p.numero_envio : '');
  abrirModal('detalle-baru');
}

})();
