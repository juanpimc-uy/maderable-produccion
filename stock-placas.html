<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maderable · Stock Placas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');
:root{
  --bg:#0f0f0f;--panel:#161616;--card:#1e1e1e;--border:#2a2a2a;
  --text:#e8e8e8;--muted:#5a5a5a;--faint:#222;
  --amber:#FFD600;--green:#3DD68C;--red:#F05C5C;--blue:#5B8DEF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;overflow:hidden;}
.mono{font-family:'Space Mono',monospace;}

/* Sidebar */
.sidebar{width:190px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:16px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--amber);letter-spacing:2px;}
.nav-item{padding:11px 16px;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;border-left:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:8px;}
.nav-item:hover{color:var(--text);background:rgba(255,214,0,.04);}
.nav-item.active{color:var(--amber);border-left-color:var(--amber);background:rgba(255,214,0,.06);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.content{flex:1;overflow-y:auto;padding:24px 28px 80px;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}

/* Buttons */
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:opacity .15s;white-space:nowrap;}
.btn:hover{opacity:.82;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--amber);color:#0f0f0f;}
.btn-ghost{background:var(--faint);color:var(--muted);border:1px solid var(--border);}
.btn-success{background:var(--green);color:#0f0f0f;}
.btn-danger{background:var(--red);color:#fff;}
.btn-sm{padding:4px 10px;font-size:9px;}

/* Mode toggle */
.mode-toggle{display:flex;gap:2px;background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:3px;margin-bottom:20px;max-width:340px;}
.mode-btn{flex:1;padding:7px 12px;border:none;border-radius:5px;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;background:transparent;color:var(--muted);transition:all .2s;letter-spacing:.5px;}
.mode-btn.active{background:var(--amber);color:#0f0f0f;}

/* Fields */
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.field input,.field select{background:var(--faint);border:1px solid var(--border);border-radius:6px;padding:9px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%;transition:border-color .2s;}
.field input:focus{border-color:var(--amber);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* Section label */
.sec{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}

/* Tables */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);}
.tbl td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;vertical-align:middle;}
.tbl tr:hover td{background:rgba(255,255,255,.02);}
.tbl input{background:var(--faint);border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);font-size:13px;outline:none;}
.tbl input:focus{border-color:var(--amber);}

/* Info boxes */
.info-box{background:rgba(91,141,239,.06);border:1px solid rgba(91,141,239,.2);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:14px;line-height:1.5;}
.warn-box{background:rgba(255,214,0,.06);border:1px solid rgba(255,214,0,.2);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--amber);margin-bottom:10px;}
.ok-box{background:rgba(61,214,140,.06);border:1px solid rgba(61,214,140,.2);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--green);margin-bottom:10px;}

/* Overlay/Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:26px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}

/* Catalog */
.cat-search{width:100%;background:var(--faint);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px;font-family:'DM Sans',sans-serif;}
.cat-search:focus{border-color:var(--amber);}
.cat-results{max-height:340px;overflow-y:auto;}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);}
.cat-item:hover{background:rgba(255,255,255,.02);}
.cat-item-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.cat-item-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.cat-add-btn{padding:5px 12px;background:var(--amber);color:#0f0f0f;border:none;border-radius:5px;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;white-space:nowrap;}
.cat-status{padding:20px;text-align:center;font-size:12px;color:var(--muted);}

/* Shelf */
.shelf-grid{display:flex;gap:12px;flex-wrap:nowrap;}
.shelf-col{display:flex;flex-direction:column;gap:5px;}
.shelf-col-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--amber);text-align:center;margin-bottom:4px;}
.shelf-pos{border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .2s;border:1px solid transparent;}
.shelf-pos:hover{transform:scale(1.04);}
.shelf-pos.empty{background:#2e2e2e;border-color:#353535;}
.shelf-pos.partial{border-color:rgba(255,214,0,.35);}
.shelf-pos.full{background:var(--amber);border-color:var(--amber);}
.shelf-pos.highlighted{box-shadow:0 0 0 3px #FFD600, 0 0 14px rgba(255,214,0,.6);}
.tooltip-box{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 10px;min-width:130px;z-index:20;pointer-events:none;display:none;white-space:nowrap;font-size:11px;}
.shelf-pos:hover .tooltip-box{display:block;}

/* Scan */
.scan-input{width:100%;background:var(--faint);border:2px solid var(--amber);border-radius:6px;padding:10px 16px;color:var(--text);font-family:'Space Mono',monospace;font-size:15px;outline:none;letter-spacing:1px;}

/* Bar fill */
.bar-wrap{width:60px;height:6px;background:var(--faint);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;}
.bar-fill{height:100%;background:var(--amber);}

@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,214,0,.3);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}

@media print{
  body *{visibility:hidden;}
  #print-area,#print-area *{visibility:visible;}
  #print-area{position:fixed;inset:0;background:white;display:flex;flex-wrap:wrap;gap:3px;padding:3px;align-content:flex-start;}
  .label-item{width:60mm;height:30mm;border:1px solid #ccc;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2mm;page-break-inside:avoid;background:#fff;}
  .print-float{display:none!important;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">⬡ MADERABLE</div>
  <div style="flex:1;padding:8px 0;">

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const NEON = '/api/stock-placas';

const SHELF_A_COLS = ['A1','A2','A3','A4'];
const SHELF_B_COLS = ['B1','B2'];
const LEVELS = [1,2,3,4,5];
const CAP_A = 40, CAP_B = 25, CAP_BESP = 150;

const LS_FORMATS = 'placas_shelf_formats';
const DEF_SHELF_FORMATS = {
  A: { maxWidth: 130, label: 'Estantería 122cm' },
  B: { maxWidth: 200, label: 'Estantería 180cm' },
};
function getShelfFormats() {
  try { return JSON.parse(localStorage.getItem(LS_FORMATS)) || DEF_SHELF_FORMATS; } catch(e) { return DEF_SHELF_FORMATS; }
}
function parseTamano(str) {
  if(!str) return null;
  const m = str.replace(',','.').match(/(\d+\.?\d*)\s*[xX×]\s*(\d+\.?\d*)/);
  if(!m) return null;
  let a = parseFloat(m[1]), b = parseFloat(m[2]);
  if(a < 10) a *= 100;
  if(b < 10) b *= 100;
  return { w: Math.min(a,b), h: Math.max(a,b) };
}
function formatoParaTamano(tamStr) {
  const dims = parseTamano(tamStr);
  if(!dims) return null;
  const fmts = getShelfFormats();
  if(dims.w <= fmts.A.maxWidth) return 'A';
  if(dims.w <= fmts.B.maxWidth) return 'B';
  return null;
}
function formatoLabel(tamStr) {
  const dims = parseTamano(tamStr);
  const fmts = getShelfFormats();
  if(!dims) return `<span style="font-size:11px;color:var(--muted);">→ sin tamaño</span>`;
  const fmt = formatoParaTamano(tamStr);
  if(fmt) return `<span style="font-size:11px;color:var(--muted);">→ Formato ${fmt} · ${fmts[fmt].label}</span>`;
  return `<span style="font-size:11px;color:var(--amber);">⚠ Tamaño no reconocido — verificar formato manualmente</span>`;
}
function actualizarFormatoMaxWidth(key, val) {
  const fmts = getShelfFormats();
  if(fmts[key]) { fmts[key].maxWidth = +val; localStorage.setItem(LS_FORMATS, JSON.stringify(fmts)); }
}

// ═══════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════
let currentTab = 'ingreso';
let plateTypes = [], positions = [], stockData = [];

let ingresoMode = 'oc';
let ingresoOC = null;
let ingresoItems = [];
let ingresoEnConfirmacion = false;
let ingresoUltimoLote = [];

let salidaMode = 'so';
let salidaSO = null;
let salidaItems = [];
let soVerificadoSO = null;
let soVerificadoItems = [];

let remitoAgregarSOOpen = false;
let remitoHistorialExpanded = false;
const LS_REMITO_BORRADOR = 'remito_salida_borrador';
const LS_REMITOS_HIST    = 'remitos_historial';
function getRemitoBorrador()  { try{return JSON.parse(localStorage.getItem(LS_REMITO_BORRADOR))||null;}catch(e){return null;} }
function getRemitoHistorial() { try{return JSON.parse(localStorage.getItem(LS_REMITOS_HIST))||[];}catch(e){return[];} }
function guardarRemitoBorrador(r) { localStorage.setItem(LS_REMITO_BORRADOR, JSON.stringify(r)); }
function guardarRemitoHistorial(r) { const h=getRemitoHistorial(); h.unshift(r); localStorage.setItem(LS_REMITOS_HIST, JSON.stringify(h)); }
function actualizarBadgeRemito() {
  const b = getRemitoBorrador();
  const badge = document.getElementById('remito-badge');
  if(!badge) return;
  const n = b?.items?.length||0;
  badge.textContent = n;
  badge.style.display = n ? 'inline-flex' : 'none';
}
function mostrarToast(msg) {
  let t = document.getElementById('_toast');
  if(!t){ t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#0f0f0f;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;padding:10px 22px;border-radius:6px;z-index:9999;transition:opacity .3s;pointer-events:none;';
    document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1'; clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.opacity='0',2800);
}

let busqResultados = [];
let busqItem = null;
let highlightedPos = [];

let catCb = null, catTimer = null, catItems = [];
let historialCurrentId = null;

let inventarioData = [];
let inventarioLoaded = false;
let inventarioFiltro = {q:'', format:'Todos', soloConStock:true};
let invEditKey = null;
let invMoveKey = null;
let addStockForm = {item:null, tamano:'', espesor:'18mm', cantidad:1, position_id:''};
let salidaArticuloRows = [];
let salidaArticuloFiltro = {q:'', format:'Todos'};

const LS_HISTORIAL = 'historial_reportes';
function getHistorial() { try{return JSON.parse(localStorage.getItem(LS_HISTORIAL))||[];}catch(e){return[];} }
function guardarEnHistorial(entry) { const h=getHistorial(); h.unshift(entry); localStorage.setItem(LS_HISTORIAL,JSON.stringify(h)); }
function marcarHistorialFlag(flag) {
  if(!historialCurrentId) return;
  const h=getHistorial(); const idx=h.findIndex(r=>r.id===historialCurrentId);
  if(idx>=0){h[idx][flag]=true;localStorage.setItem(LS_HISTORIAL,JSON.stringify(h));}
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  try {
    const [a,b,c] = await Promise.all([
      fetch(NEON+'?action=plate-types').then(r=>r.json()),
      fetch(NEON+'?action=positions').then(r=>r.json()),
      fetch(NEON+'?action=stock').then(r=>r.json()),
    ]);
    plateTypes = Array.isArray(a)?a:[];
    positions  = Array.isArray(b)?b:[];
    stockData  = Array.isArray(c)?c:[];
    document.getElementById('stock-status').textContent =
      plateTypes.length+' tipos · '+positions.length+' posiciones';
  } catch(e) {
    console.warn('Error cargando datos base:', e.message);
  }
  actualizarBadgeRemito();
  renderTab('ingreso');
}

async function recargarStock() {
  try { stockData = await fetch(NEON+'?action=stock').then(r=>r.json()); } catch(e){}
}

// ═══════════════════════════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+tab);
  if(navEl) navEl.classList.add('active');
  const titles = {ingreso:'INGRESO',salida:'SALIDA',remito:'REMITO DE SALIDA',inventario:'INVENTARIO',estanteria:'ESTANTERÍA',historial:'HISTORIAL'};
  document.getElementById('topbar-title').textContent = titles[tab]||tab.toUpperCase();
  const contentEl = document.getElementById('content');
  contentEl.style.padding = tab==='estanteria' ? '14px' : '';
  if(tab==='inventario' && !inventarioLoaded) cargarInventario();
  renderTab(tab);
}

function renderTab(tab) {
  const c = document.getElementById('content');
  if (tab==='ingreso')      c.innerHTML = tplIngreso();
  else if (tab==='salida')  c.innerHTML = tplSalida();
  else if (tab==='remito')  c.innerHTML = tplRemito();
  else if (tab==='inventario')  c.innerHTML = tplInventario();
  else if (tab==='estanteria')  c.innerHTML = tplEstanteria();
  else if (tab==='historial')   c.innerHTML = tplHistorial();
}

// ═══════════════════════════════════════════════════════════
// TAB 1: INGRESO
// ═══════════════════════════════════════════════════════════
function tplIngreso() {
  if(ingresoEnConfirmacion) return tplConfirmacionFinal();
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div class="sec" style="margin:0;">Ingreso de stock</div>
    <a href="#" onclick="abrirGestionOpciones();return false;" style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);text-decoration:none;letter-spacing:.5px;" onmouseover="this.style.color='var(--amber)'" onmouseout="this.style.color='var(--muted)'">⚙ Gestionar tamaños y espesores</a>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn ${ingresoMode==='oc'?'active':''}" onclick="setIngresoMode('oc')">Por OC de Zoho</button>
    <button class="mode-btn ${ingresoMode==='articulo'?'active':''}" onclick="setIngresoMode('articulo')">Por artículo</button>
  </div>
  ${ingresoMode==='oc' ? tplIngresoOC() : tplIngresoArticulo()}`;
}

function eliminarEspesor(i) { const a=getEspesores();a.splice(i,1);localStorage.setItem(LS_ESPESORES,JSON.stringify(a));renderGestionOpciones(); }

// ── LocalStorage: tamaños y espesores ──
const LS_TAMANOS   = 'placas_tamanos';
const LS_ESPESORES = 'placas_espesores';
const DEF_TAMANOS  = ['2.60x1.83','2.44x1.83','2.75x1.83','2.60x2.15','22x0.40','23x2.00','50x2.00'];
const DEF_ESPESORES= ['3mm','9mm','15mm','18mm','25mm','MDF 3mm','MDF 15mm','MDF 18mm','—'];
function getTamanos()  { try{return JSON.parse(localStorage.getItem(LS_TAMANOS)) ||DEF_TAMANOS; }catch(e){return DEF_TAMANOS;} }
function getEspesores(){ try{return JSON.parse(localStorage.getItem(LS_ESPESORES))||DEF_ESPESORES;}catch(e){return DEF_ESPESORES;} }
function addTamano(v)  { const a=getTamanos(); if(!a.includes(v)){a.push(v);localStorage.setItem(LS_TAMANOS,JSON.stringify(a));} }
function addEspesor(v) { const a=getEspesores();if(!a.includes(v)){a.push(v);localStorage.setItem(LS_ESPESORES,JSON.stringify(a));} }
function onTamanoChange(i,sel) {
  if(sel.value==='__nuevo__'){
    const v=(prompt('Nuevo tamaño (ej: 2.60x1.83):')||'').trim();
    if(v){addTamano(v);ingresoItems[i].tamano=v;}
    renderTab('ingreso');
  } else {
    ingresoItems[i].tamano=sel.value;
    const pt=plateTypes.find(p=>p.sku===ingresoItems[i].sku);
    if(pt){calcPosIngreso(pt,sel.value).then(pos=>{ingresoItems[i].posicion=pos?.id||null;renderTab('ingreso');});}
    else renderTab('ingreso');
  }
}
function onEspesorChange(i,sel) {
  if(sel.value==='__nuevo__'){const v=(prompt('Nuevo espesor (ej: 18mm):')||'').trim();if(v){addEspesor(v);ingresoItems[i].espesor=v;}renderTab('ingreso');}
  else ingresoItems[i].espesor=sel.value;
}

async function buscarOC() {
  const rawNum = document.getElementById('oc-num')?.value?.trim();
  if(!rawNum) return;
  const st = document.getElementById('oc-status');
  st.innerHTML = '<span class="spinner"></span><span style="font-size:12px;color:var(--muted);">Buscando en Zoho...</span>';
  try {
    const token = await getZohoToken();
    const digits = rawNum.replace(/^OC-?0*/i,'').replace(/^0+/,'') || rawNum;
    const formats = [
      'OC-' + digits.padStart(5,'0'),
      'OC-' + digits,
      digits
    ];
    let ocs = [];
    for(const fmt of formats) {
      const r = await fetch('/api/zoho-books?endpoint='+encodeURIComponent('purchaseorders?purchaseorder_number='+fmt)+'&token='+token);
      const data = await r.json();
      ocs = data.purchaseorders||[];
      if(ocs.length) break;
    }
    if(!ocs.length){ st.innerHTML=`<div class="warn-box">No se encontró la OC <strong>${rawNum}</strong> en Zoho Books.</div>`; return; }
    const r2 = await fetch('/api/zoho-books?endpoint='+encodeURIComponent('purchaseorders/'+ocs[0].purchaseorder_id)+'&token='+token);
    const det = await r2.json();
    ingresoOC = det.purchaseorder||ocs[0];
    st.innerHTML = '';
    ingresoItems = await Promise.all((ingresoOC.line_items||[]).map(async it=>{
      const sku = it.sku||'';
      const pt = plateTypes.find(p=>p.sku===sku);
      const defTam=getTamanos()[0]||'2.60x1.83', defEsp='18mm';
      const pos = pt ? await calcPosIngreso(pt, defTam) : null;
      return {nombre:it.name||it.description||'—',sku,cantidad:it.quantity||1,posicion:pos?.id||null,plate_type_id:pt?.id||null,tamano:defTam,espesor:defEsp,estado:'pendiente'};
    }));
    renderTab('ingreso');
  } catch(e) {
    document.getElementById('oc-status').innerHTML = `<div style="color:var(--red);font-size:12px;">Error: ${e.message}</div>`;
  }
}

async function agregarItemIngreso(item) {
  const sku = item.sku||item.item_id||'';
  const pt = plateTypes.find(p=>p.sku===sku);
  const defTam=getTamanos()[0]||'2.60x1.83', defEsp='18mm';
  const pos = pt ? await calcPosIngreso(pt, defTam) : null;
  ingresoItems.push({nombre:item.name,sku,cantidad:1,posicion:pos?.id||null,plate_type_id:pt?.id||null,tamano:defTam,espesor:defEsp,estado:'pendiente'});
  cerrarCatalogo();
  renderTab('ingreso');
}

async function calcPosIngreso(pt, tamano) {
  if(!pt) return null;
  if(pt.fixed_position_id) return positions.find(p=>p.id===pt.fixed_position_id)||null;
  const fmt = (tamano ? formatoParaTamano(tamano) : null) || pt.format || 'A';
  const posFormat = positions.filter(p=>p.format===fmt);
  const withStock = posFormat
    .map(p=>({p,qty:(stockData.find(s=>s.position_id===p.id&&s.plate_type_id===pt.id)?.quantity||0)}))
    .filter(x=>x.qty>0&&x.qty<posCap(x.p))
    .sort((a,b)=>b.qty-a.qty);
  if(withStock.length) return withStock[0].p;
  return posFormat.find(p=>!(stockData.find(s=>s.position_id===p.id&&(s.quantity||0)>0)))||null;
}

function posCap(pos) {
  if(!pos) return CAP_A;
  if(pos.id.startsWith('B-ESP')) return CAP_BESP;
  if(pos.id.startsWith('B')) return CAP_B;
  return CAP_A;
}

async function confirmarItem(i) {
  const it = ingresoItems[i];
  const btn = document.getElementById('btn-confirm-'+i);
  if(btn){btn.disabled=true;btn.textContent='Calculando posición...';}
  try {
    // 1. Ensure plate_type exists in Neon
    let plate_type_id = it.plate_type_id;
    if(!plate_type_id && it.sku) {
      const fmt = formatoParaTamano(it.tamano) || 'A';
      const resp = await fetch(`${NEON}?action=plate-type&sku=${encodeURIComponent(it.sku)}&name=${encodeURIComponent(it.nombre)}&format=${fmt}`);
      const created = await resp.json();
      plate_type_id = created.id||null;
      if(plate_type_id){
        plateTypes.push({id:plate_type_id,name:it.nombre,sku:it.sku,format:fmt});
        ingresoItems[i].plate_type_id = plate_type_id;
      }
    }
    // 2. Refresh stock
    await recargarStock();
    // 3. Calculate position with fresh data
    const pt = plateTypes.find(p=>p.id===plate_type_id)||{id:plate_type_id,format:formatoParaTamano(it.tamano)||'A'};
    const pos = await calcPosIngreso(pt, it.tamano);
    const posId = pos?.id||null;
    ingresoItems[i].posicion = posId;
    ingresoItems[i].posicionAsignada = posId;
    ingresoItems[i].estado = 'confirmado';
    ingresoItems[i]._depositoLleno = !posId && !!plate_type_id;
    // 4. Recalculate pending items
    for(let j=0;j<ingresoItems.length;j++){
      if(ingresoItems[j].estado==='pendiente'){
        const ptj=plateTypes.find(p=>p.sku===ingresoItems[j].sku);
        if(ptj){const posj=await calcPosIngreso(ptj,ingresoItems[j].tamano);ingresoItems[j].posicion=posj?.id||null;}
      }
    }
    renderTab('ingreso');
  } catch(e){
    if(btn){btn.disabled=false;btn.textContent='✓ Confirmar este ítem';}
    alert('Error al confirmar: '+e.message);
  }
}

    }

  w.document.write(`<!DOCTYPE html><html><head><title>Etiquetas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>

async function guardarIngreso() {
  const btn = document.getElementById('btn-guardar-ingreso');
  if(btn){btn.disabled=true;btn.textContent='Guardando...';}
  try {
    const ts = new Date().toISOString();
    const ocNum = ingresoOC?.purchaseorder_number||null;
    const confirmados = ingresoItems.filter(it=>it.estado==='confirmado');
    for(const it of confirmados) {
      const pos = it.posicionAsignada||it.posicion||null;
      if(!pos||!it.plate_type_id) continue;
      await fetch(NEON+'?action=confirm-item',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({position_id:pos,plate_type_id:it.plate_type_id,quantity:it.cantidad,
          op:'add',movement_type:'ingreso',oc_number:ocNum,tamano:it.tamano||null,espesor:it.espesor||null})});
    }
    await recargarStock();
    ingresoUltimoLote = confirmados;
    const savedOC = ingresoOC;
    // Guardar en historial
    const hEntry = {
      id: Date.now(),
      tipo: 'ingreso',
      fecha: new Date().toISOString(),
      oc: savedOC?.purchaseorder_number||null,
      proveedor: savedOC?.vendor_name||null,
      items: confirmados.map(it=>({
        nombre:it.nombre, sku:it.sku, tamano:it.tamano||null, espesor:it.espesor||null,
        cantidad:it.cantidad, posicionAsignada:it.posicionAsignada||it.posicion||null,
        _depositoLleno:!!it._depositoLleno
      })),
      etiquetasImpresas: false,
      informeImpreso: false,
    };
    guardarEnHistorial(hEntry);
    historialCurrentId = hEntry.id;
    ingresoOC=null; ingresoItems=[]; ingresoEnConfirmacion=false;
    document.getElementById('content').innerHTML = tplIngresoExito(savedOC, ingresoUltimoLote);
  } catch(e) {
    if(btn){btn.disabled=false;btn.textContent='✓ CONFIRMAR Y GUARDAR INGRESO';}
    alert('Error al guardar: '+e.message);
  }
}

async function buscarSO() {
  const rawNum = document.getElementById('so-num')?.value?.trim();
  if(!rawNum) return;
  const st = document.getElementById('so-status');
  st.innerHTML = '<span class="spinner"></span><span style="font-size:12px;color:var(--muted);">Buscando en Zoho...</span>';
  try {
    const token = await getZohoToken();
    const digits = rawNum.replace(/\D/g,'');
    const formats = ['SO-'+digits.padStart(5,'0'), 'SO-'+digits, digits];
    let sos = [];
    for(const fmt of formats) {
      const r = await fetch('/api/zoho-books?endpoint='+encodeURIComponent('salesorders?salesorder_number='+fmt)+'&token='+token);
      const data = await r.json();
      sos = data.salesorders||[];
      if(sos.length) break;
    }
    if(!sos.length){ st.innerHTML=`<div class="warn-box">No se encontró la SO <strong>${rawNum}</strong> en Zoho Books.</div>`; return; }
    st.innerHTML = '<span class="spinner"></span><span style="font-size:12px;color:var(--muted);">Verificando stock en depósito...</span>';
    const r2 = await fetch('/api/zoho-books?endpoint='+encodeURIComponent('salesorders/'+sos[0].salesorder_id)+'&token='+token);
    const det = await r2.json();
    const so = det.salesorder||sos[0];
    salidaSO = so;
    soVerificadoSO = so;
    const obra = so.reference_number||so.delivery_address?.address||'';
    soVerificadoItems = await Promise.all((so.line_items||[]).map(async it=>{
      const sku = it.sku||'';
      const pedido = Number(it.quantity)||1;
      let disponible=0, posicion=null, plate_type_id=null, posiciones=[];
      if(sku) {
        try {
          const sr = await fetch(`${NEON}?action=stock-by-sku&sku=${encodeURIComponent(sku)}`);
          const sd = await sr.json();
          if(Array.isArray(sd)&&sd.length){
            posiciones=sd;
            disponible=sd.reduce((a,p)=>a+(p.disponible||0),0);
            posicion=sd[0].position_id;
            plate_type_id=sd[0].plate_type_id;
          }
        } catch(e){}
      }
      const estado = disponible>=pedido?'en_stock':(disponible>0?'parcial':'sin_stock');
      return {nombre:it.name||'—', sku, pedido, disponible, posicion, plate_type_id, posiciones, estado,
        retirar:Math.min(pedido,disponible), obra, incluirSinStock:false};
    }));
    st.innerHTML='';
    renderTab('salida');
  } catch(e) {
    const stEl = document.getElementById('so-status');
    if(stEl) stEl.innerHTML = `<div style="color:var(--red);font-size:12px;">Error: ${e.message}</div>`;
  }
}

function agregarARemitoSalida() {
  const so = soVerificadoSO;
  if(!so) return;
  const soNum = so.salesorder_number;
  const newItems = soVerificadoItems
    .filter(it=>(it.estado!=='sin_stock'&&it.retirar>0)||(it.estado==='sin_stock'&&it.incluirSinStock))
    .map(it=>({
      articulo: it.nombre,
      sku: it.sku,
      cantidad: it.estado==='sin_stock' ? it.pedido : it.retirar,
      posicion: it.posicion||null,
      plate_type_id: it.plate_type_id||null,
      obra: it.obra||'',
      so_number: soNum,
      tiene_stock: it.estado!=='sin_stock',
    }));
  if(!newItems.length) return;
  let borrador = getRemitoBorrador();
  if(!borrador) borrador={id:Date.now(),estado:'borrador',items:[],creado:new Date().toISOString(),sos_incluidas:[]};
  for(const ni of newItems) {
    const ex = borrador.items.find(r=>r.sku===ni.sku&&r.posicion===ni.posicion);
    if(ex) ex.cantidad+=ni.cantidad; else borrador.items.push(ni);
  }
  if(!borrador.sos_incluidas.includes(soNum)) borrador.sos_incluidas.push(soNum);
  guardarRemitoBorrador(borrador);
  actualizarBadgeRemito();
  mostrarToast(`✓ ${newItems.length} ítem${newItems.length!==1?'s':''} agregado${newItems.length!==1?'s':''} al Remito de Salida`);
  soVerificadoSO=null; soVerificadoItems=[]; salidaSO=null;
  renderTab('salida');
}

function calcPosRetiro(pt) {
  if(!pt) return null;
  return stockData
    .filter(s=>s.plate_type_id===pt.id&&(s.quantity||0)>0)
    .sort((a,b)=>(a.quantity||0)-(b.quantity||0))[0]||null;
}

function agregarItemSalida(item) {
  const sku = item.sku||item.item_id||'';
  const pt = plateTypes.find(p=>p.sku===sku);
  const pos = calcPosRetiro(pt);
  salidaItems.push({nombre:item.name,sku,cantidad:1,posicion:pos?.position_id||null,plate_type_id:pt?.id||null,obra:'',_scanned:false});
  cerrarCatalogo();
  renderTab('salida');
}

function iniciarSalidaArticuloRows() {
  salidaArticuloRows = stockData
    .filter(s=>(s.quantity||0)>0)
    .map(s=>{
      const pt = plateTypes.find(p=>p.id===s.plate_type_id);
      const pos = positions.find(p=>p.id===s.position_id);
      return {position_id:s.position_id, plate_type_id:s.plate_type_id,
        quantity:s.quantity, name:pt?.name||'—', sku:pt?.sku||'',
        format:pos?.format||pt?.format||'A', retirar:0, obra:''};
    })
    .sort((a,b)=>a.position_id.localeCompare(b.position_id));
  renderTab('salida');
}

function continuarSalidaArticulo() {
  salidaItems = salidaArticuloRows
    .filter(r=>r.retirar>0)
    .map(r=>({nombre:r.name, sku:r.sku, cantidad:r.retirar,
      posicion:r.position_id, plate_type_id:r.plate_type_id,
      obra:r.obra||'', _scanned:false}));
  renderTab('salida');
}

function imprimirResumen(ordenBy) {
  const items = [...salidaItems].sort((a,b)=>{
    const ka = ordenBy==='obra'?(a.obra||''):(a.posicion||'');
    const kb = ordenBy==='obra'?(b.obra||''):(b.posicion||'');
    return ka.localeCompare(kb);
  });
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Retiro de placas</title><style>
    body{font-family:monospace;padding:24px;color:#000;font-size:12px;}
    h2{margin-bottom:4px;font-size:16px;}
    .sub{color:#666;margin-bottom:20px;font-size:11px;}
    table{width:100%;border-collapse:collapse;}
    th,td{border:1px solid #ccc;padding:7px 10px;text-align:left;}
    th{background:#f0f0f0;text-transform:uppercase;font-size:10px;letter-spacing:1px;}
    @media print{button{display:none;}}
  </style></head><body>
    <h2>Retiro de placas</h2>
    <div class="sub">${new Date().toLocaleDateString('es-AR')} · Ordenado por ${ordenBy}</div>
    <table>
      <thead><tr><th>Artículo</th><th>SKU</th><th>Posición</th><th>Cantidad</th><th>Obra</th></tr></thead>
      <tbody>${items.map(it=>`<tr><td>${it.nombre}</td><td>${it.sku||'—'}</td><td>${it.posicion||'—'}</td><td>${it.cantidad}</td><td>${it.obra||'—'}</td></tr>`).join('')}</tbody>
    </table>
    <br/><button onclick="window.print()">Imprimir</button>
  </body></html>`);
  w.document.close();
}

async function confirmarSalida() {
  if(!salidaItems.length) return;
  if(!confirm('¿Confirmar retiro de '+salidaItems.reduce((a,i)=>a+i.cantidad,0)+' unidades?')) return;
  const btn = document.getElementById('btn-confirm-salida');
  btn.disabled=true; btn.textContent='Confirmando...';
  try {
    const ts = new Date().toISOString();
    const soNum = salidaSO?.salesorder_number||null;
    for(const it of salidaItems){
      if(!it.posicion||!it.plate_type_id) continue;
      await fetch(NEON+'?action=confirm-item',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({position_id:it.posicion,plate_type_id:it.plate_type_id,quantity:it.cantidad,
          op:'subtract',movement_type:'salida',so_number:soNum,obra:it.obra||null})});
    }
    await recargarStock();
    salidaSO=null; salidaItems=[];
    renderTab('salida');
  } catch(e){
    btn.disabled=false; btn.textContent='Confirmar todo';
    alert('Error: '+e.message);
  }
}

function procesarScan(raw) {
  const parts = raw.trim().split('|');
  if(parts.length<3){ document.getElementById('scan-feedback').innerHTML=`<div class="warn-box">QR inválido: ${raw}</div>`; return; }
  const [sku,,posicion] = parts;
  const it = salidaItems.find(i=>i.sku===sku&&i.posicion===posicion);
  if(!it){ document.getElementById('scan-feedback').innerHTML=`<div class="warn-box">No coincide con ningún ítem de la orden: ${sku} @ ${posicion}</div>`; return; }
  it._scanned = true;
  const todos = salidaItems.every(i=>i._scanned);
  document.getElementById('scan-feedback').innerHTML = `<div class="ok-box">✓ ${sku} @ ${posicion} escaneado.${todos?' <strong>Todos listos. Confirmá el retiro.</strong>':''}</div>`;
  renderTab('salida');
}

function shelfPos(posId, cap) {
  const s = stockData.find(x=>x.position_id===posId);
  const qty = s?.quantity||0;
  const ptId = s?.plate_type_id;
  const pt = plateTypes.find(p=>p.id===ptId);
  const pct = qty/cap;
  const cls = qty===0?'empty':(pct>=1?'full':'partial');
  const hl = highlightedPos.includes(posId);
  const lvl = posId.split('-').pop();
  let bg;
  if(cls==='empty') bg='#2e2e2e';
  else if(cls==='full') bg='#FFD600';
  else bg=`rgba(255,214,0,${(0.12+pct*0.6).toFixed(2)})`;
  const textCol = cls==='full'?'#0f0f0f':cls==='empty'?'#555':'rgba(255,214,0,.9)';
  return `<div class="shelf-pos ${cls}${hl?' highlighted':''}"
    onclick="mostrarDetallePosicion('${posId}')"
    style="width:140px;height:110px;background:${bg};">
    <div class="tooltip-box">
      <div class="mono" style="font-size:10px;color:var(--amber);margin-bottom:2px;">${posId}</div>
      ${pt?`<div style="font-size:11px;margin-bottom:2px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${pt.name}</div>`:'<div style="font-size:11px;color:var(--muted);">Vacía</div>'}
      <div class="mono" style="font-size:10px;color:var(--muted);">${qty} / ${cap}</div>
    </div>
    <div style="text-align:center;line-height:1.3;">
      <div class="mono" style="font-size:14px;color:${textCol};font-weight:700;">${posId}</div>
      ${qty>0?`<div class="mono" style="font-size:20px;font-weight:700;color:${cls==='full'?'#0f0f0f':'#ccc'};margin-top:2px;">${qty}</div>`:''}
    </div>
  </div>`;
}

function shelfCol(col, fmt, cap) {
  const cells = [...LEVELS].reverse().map(lvl=>shelfPos(col+'-'+lvl, cap)).join('');
  return `<div class="shelf-col">
    <div class="shelf-col-label">${col}</div>

}

function abrirCatalogo(cb) {
  catCb=cb; catItems=[];
  document.getElementById('cat-overlay').classList.add('open');
  const inp = document.getElementById('cat-search-input');
  inp.value='';
  document.getElementById('cat-results').innerHTML='<div class="cat-status">Escribí para buscar en el catálogo de Zoho</div>';
  setTimeout(()=>inp.focus(),80);
}

function cerrarCatalogo() {
  document.getElementById('cat-overlay').classList.remove('open');
  clearTimeout(catTimer);
  catCb=null;
}

function catDebounce(q) {
  clearTimeout(catTimer);
  const t=q.trim();
  if(!t){ document.getElementById('cat-results').innerHTML='<div class="cat-status">Escribí para buscar en el catálogo de Zoho</div>'; return; }
  document.getElementById('cat-results').innerHTML='<div class="cat-status"><span class="spinner"></span>Buscando...</div>';
  catTimer=setTimeout(()=>catBuscar(t),400);
}

async function catBuscar(q) {
  try {
    const token = await getZohoToken();
    let items=[];
    const ep1='items?search_text='+encodeURIComponent(q)+'&per_page=50';
    const d1 = await fetch('/api/zoho-books?endpoint='+encodeURIComponent(ep1)+'&token='+token).then(r=>r.json());
    items = d1.items||[];
    if(!items.length){
      const ep2='items?name_contains='+encodeURIComponent(q)+'&per_page=50';
      const d2 = await fetch('/api/zoho-books?endpoint='+encodeURIComponent(ep2)+'&token='+token).then(r=>r.json());
      items = d2.items||[];
    }
    catItems=items;
    if(!items.length){ document.getElementById('cat-results').innerHTML=`<div class="cat-status">Sin resultados para "${q}"</div>`; return; }
    document.getElementById('cat-results').innerHTML = items.map((it,i)=>`
      <div class="cat-item">
        <div>
          <div class="cat-item-name">${it.name}</div>
          <div class="cat-item-meta">SKU: ${it.sku||it.item_id||'—'} · ${it.unit||'unidad'}${it.stock_on_hand!=null?' · Stock: '+it.stock_on_hand:''}</div>
        </div>
        <button class="cat-add-btn" onclick="catSeleccionar(${i})">+ Agregar</button>
      </div>`).join('');
  } catch(e) {
    document.getElementById('cat-results').innerHTML=`<div class="cat-status" style="color:var(--red);">Error: ${e.message}</div>`;
  }
}

function catSeleccionar(idx) {
  const it=catItems[idx];
  if(!it||!catCb) return;
  const cb=catCb;
  cerrarCatalogo();
  cb(it);
}

function mostrarDetallePosicion(posId) {

      <tbody>
        ${items.map(it=>{
          const pt = plateTypes.find(p=>p.id===it.plate_type_id);

async function cargarInventario() {
  inventarioLoaded = false;
  renderTab('inventario');
  try {
    const r = await fetch(NEON+'?action=all-stock');
    inventarioData = await r.json();
  } catch(e) {
    inventarioData = [];
  }
  inventarioLoaded = true;
  invEditKey = null; invMoveKey = null;
  renderTab('inventario');
}

function tplInventario() {
  const q = inventarioFiltro.q.toLowerCase();
  const fmtF = inventarioFiltro.format;
  const filtered = inventarioLoaded ? inventarioData.filter(r=>{
    if(inventarioFiltro.soloConStock && (r.quantity||0)<=0) return false;
    if(q && !(r.name||'').toLowerCase().includes(q) && !(r.sku||'').toLowerCase().includes(q)) return false;
    if(fmtF!=='Todos' && r.format!==fmtF) return false;
    return true;
  }) : [];
  const totalPos = inventarioData.filter(r=>(r.quantity||0)>0).length;
  const totalUnits = inventarioData.reduce((s,r)=>s+(r.quantity||0),0);
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
    <div class="sec" style="margin:0;">Inventario</div>
    <button class="btn btn-primary btn-sm" onclick="abrirAgregarStock()">+ Agregar stock</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
    <input placeholder="Buscar artículo o SKU..." value="${inventarioFiltro.q}"
      oninput="inventarioFiltro.q=this.value;renderTab('inventario')"
      style="flex:1;min-width:180px;background:var(--faint);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;"/>
    <select onchange="inventarioFiltro.format=this.value;renderTab('inventario')"
      style="background:var(--faint);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;">
      ${['Todos','A','B'].map(f=>`<option value="${f}" ${inventarioFiltro.format===f?'selected':''}>${f==='Todos'?'Todos formatos':'Formato '+f}</option>`).join('')}
    </select>
    <select onchange="inventarioFiltro.soloConStock=this.value==='1';renderTab('inventario')"
      style="background:var(--faint);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;">
      <option value="1" ${inventarioFiltro.soloConStock?'selected':''}>Solo con stock</option>
      <option value="0" ${!inventarioFiltro.soloConStock?'selected':''}>Todas las posiciones</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="cargarInventario()">↻ Recargar</button>
  </div>
  ${!inventarioLoaded ? `<div style="text-align:center;padding:40px;color:var(--muted);"><span class="spinner"></span> Cargando...</div>` :
    filtered.length===0 ? `<div style="padding:30px;text-align:center;color:var(--muted);font-size:13px;">Sin resultados.</div>` : `
  <div style="overflow-x:auto;">
  <table class="tbl">
    <thead><tr>
      <th>Posición</th><th>Artículo</th><th>SKU</th><th>Cant.</th><th>Acciones</th>
    </tr></thead>
    <tbody>
      ${filtered.map(r=>{
        const key = r.position_id+'__'+r.plate_type_id;
        const keyId = key.replace(/[^a-z0-9]/gi,'_');
        const isEdit = invEditKey===key;
        const isMove = invMoveKey===key;
        return `<tr>
          <td><span class="mono" style="color:var(--amber);font-size:12px;">${r.position_id}</span></td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.name}">${r.name}</td>
          <td><span class="mono" style="font-size:10px;color:var(--muted);">${r.sku||'—'}</span></td>
          <td>${isEdit
            ? `<input type="number" id="ieq_${keyId}" value="${r.quantity}" min="0" style="width:70px;"
                 onkeydown="if(event.key==='Enter')guardarCantidadInv('${r.position_id}',${r.plate_type_id})"/>
               <button class="btn btn-success btn-sm" onclick="guardarCantidadInv('${r.position_id}',${r.plate_type_id})">✓</button>
               <button class="btn btn-ghost btn-sm" onclick="invEditKey=null;renderTab('inventario')">✗</button>`
            : `<span class="mono" style="font-size:13px;">${r.quantity}</span>`
          }</td>
          <td>
            <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
              ${isEdit ? '' : `<button class="btn btn-ghost btn-sm" title="Editar cantidad" onclick="invEditKey='${key}';invMoveKey=null;renderTab('inventario')">✏</button>`}
              ${isMove
                ? `<select id="ims_${keyId}" style="background:var(--faint);border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);font-size:12px;outline:none;">
                     ${positions.filter(p=>p.format===r.format&&p.id!==r.position_id).map(p=>{
                       const used = stockData.find(s=>s.position_id===p.id)?.quantity||0;
                       const cap = posCap(p);
                       return `<option value="${p.id}">${p.id} · ${used}/${cap}</option>`;
                     }).join('')}
                   </select>
                   <button class="btn btn-success btn-sm" onclick="ejecutarMoverStock('${r.position_id}',${r.plate_type_id},${r.quantity},'${keyId}')">✓ Mover</button>
                   <button class="btn btn-ghost btn-sm" onclick="invMoveKey=null;renderTab('inventario')">✗</button>`
                : `<button class="btn btn-ghost btn-sm" title="Cambiar posición" onclick="invMoveKey='${key}';invEditKey=null;renderTab('inventario')">📍</button>`
              }
              <button class="btn btn-ghost btn-sm" title="Imprimir etiquetas" onclick="imprimirEtiquetasInv('${r.position_id}',${r.plate_type_id})">🖨</button>
              <button class="btn btn-danger btn-sm" title="Eliminar" onclick="eliminarStockInv('${r.position_id}',${r.plate_type_id})">🗑</button>

        </tr>`;
      }).join('')}
    </tbody>
  </table>

  ${inventarioLoaded ? `<div style="margin-top:14px;" class="mono"><span style="font-size:11px;color:var(--muted);">${totalPos} posiciones ocupadas · ${totalUnits} unidades totales en depósito</span></div>` : ''}`;
}

async function guardarCantidadInv(posId, ptId) {
  const inp = document.getElementById('ieq_'+(posId+'__'+ptId).replace(/[^a-z0-9]/gi,'_'));
  if(!inp) return;
  const qty = Math.max(0, parseInt(inp.value)||0);
  try {
    await fetch(NEON+'?action=update-stock',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({position_id:posId, plate_type_id:ptId, quantity:qty})});
    invEditKey = null;
    await Promise.all([recargarStock(), cargarInventario()]);
  } catch(e){ alert('Error: '+e.message); }
}

async function ejecutarMoverStock(fromPos, ptId, qty, keyId) {
  const sel = document.getElementById('ims_'+keyId);
  if(!sel) return;
  const toPos = sel.value;
  if(!toPos||toPos===fromPos){ invMoveKey=null; renderTab('inventario'); return; }
  if(!confirm(`¿Mover ${qty} unidades de ${fromPos} → ${toPos}?`)) return;
  try {
    await fetch(NEON+'?action=move-stock',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({from_position_id:fromPos, to_position_id:toPos, plate_type_id:ptId, quantity:qty})});
    invMoveKey = null;
    await Promise.all([recargarStock(), cargarInventario()]);
  } catch(e){ alert('Error: '+e.message); }
}

async function eliminarStockInv(posId, ptId) {
  const row = inventarioData.find(r=>r.position_id===posId&&r.plate_type_id===ptId);
  if(!confirm(`¿Eliminar ${row?.name||'este stock'} de ${posId}?`)) return;
  try {
    await fetch(NEON+'?action=delete-stock',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({position_id:posId, plate_type_id:ptId})});
    await Promise.all([recargarStock(), cargarInventario()]);
  } catch(e){ alert('Error: '+e.message); }
}

function imprimirEtiquetasInv(posId, ptId) {
  const row = inventarioData.find(r=>r.position_id===posId&&r.plate_type_id===ptId);
  if(!row) return;
  const n = parseInt(prompt(`¿Cuántas etiquetas imprimir?\n(stock actual: ${row.quantity})`, String(row.quantity))||'0');
  if(!n||n<=0) return;
  abrirVentanaEtiquetas([{nombre:row.name, sku:row.sku,
    posicionAsignada:row.position_id, posicion:row.position_id,
    cantidad:n, tamano:null, espesor:null, estado:'confirmado'}]);
}

function abrirAgregarStock() {
  addStockForm = {item:null, tamano:getTamanos()[0]||'2.60x1.83', espesor:'18mm', cantidad:1, position_id:''};
  renderAddStockForm();
  document.getElementById('addstock-overlay').classList.add('open');

function cerrarAgregarStock() {
  document.getElementById('addstock-overlay').classList.remove('open');
}

function renderAddStockForm() {
  const tamanos = getTamanos();
  const espesores = getEspesores();
  const fmt = addStockForm.item ? (formatoParaTamano(addStockForm.tamano)||'A') : 'A';
  const posFmt = positions.filter(p=>p.format===fmt);
  document.getElementById('addstock-content').innerHTML = `

       </div>`
    : `<button class="btn btn-primary btn-sm" style="margin-bottom:14px;" onclick="abrirCatalogo(it=>{addStockForm.item=it;cerrarCatalogo();renderAddStockForm();})">Buscar artículo en Zoho</button>`
  }
  <div class="g2" style="margin-bottom:12px;">
    <div class="field">
      <label>Tamaño</label>
      <select onchange="addStockForm.tamano=this.value;renderAddStockForm()">
        ${tamanos.map(t=>`<option value="${t}" ${addStockForm.tamano===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Espesor</label>
      <select onchange="addStockForm.espesor=this.value">
        ${espesores.map(e=>`<option value="${e}" ${addStockForm.espesor===e?'selected':''}>${e}</option>`).join('')}
      </select>
    </div>
  </div>
  <div class="g2" style="margin-bottom:16px;">
    <div class="field">
      <label>Cantidad</label>
      <input type="number" min="1" value="${addStockForm.cantidad}" oninput="addStockForm.cantidad=Math.max(1,+this.value||1)"/>
    </div>
    <div class="field">
      <label>Posición</label>
      <select onchange="addStockForm.position_id=this.value">
        <option value="">— Seleccionar —</option>
        ${posFmt.map(p=>{
          const used = stockData.find(s=>s.position_id===p.id)?.quantity||0;
          const cap = posCap(p);
          return `<option value="${p.id}" ${addStockForm.position_id===p.id?'selected':''}>${p.id} · ${used}/${cap}</option>`;
        }).join('')}
      </select>
    </div>
  </div>
  <div style="display:flex;gap:10px;justify-content:flex-end;">
    <button class="btn btn-ghost" onclick="cerrarAgregarStock()">Cancelar</button>
    <button class="btn btn-success" ${addStockForm.item&&addStockForm.position_id?'':'disabled'} onclick="confirmarAgregarStock()">✓ Confirmar</button>
  </div>`;
}

async function confirmarAgregarStock() {
  const f = addStockForm;
  if(!f.item||!f.position_id) return;
  try {
    // Get or create plate_type
    const fmt = formatoParaTamano(f.tamano)||'A';
    const sku = f.item.sku||f.item.item_id||'';
    const resp = await fetch(`${NEON}?action=plate-type&sku=${encodeURIComponent(sku)}&name=${encodeURIComponent(f.item.name)}&format=${fmt}`);
    const pt = await resp.json();
    if(!pt.id) throw new Error('No se pudo obtener plate_type');
    await fetch(NEON+'?action=confirm-item',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({position_id:f.position_id, plate_type_id:pt.id,
        quantity:f.cantidad, op:'add', movement_type:'ajuste-manual'})});
    cerrarAgregarStock();
    await Promise.all([recargarStock(), cargarInventario()]);
  } catch(e){ alert('Error: '+e.message); }
}

function remitoEditarCantidad(i, val) {
  const b = getRemitoBorrador(); if(!b) return;
  b.items[i].cantidad = Math.max(1, val||1);
  guardarRemitoBorrador(b);
}
function remitoEditarObra(i, val) {
  const b = getRemitoBorrador(); if(!b) return;
  b.items[i].obra = val;
  guardarRemitoBorrador(b);
}
function remitoEliminarItem(i) {
  const b = getRemitoBorrador(); if(!b) return;
  b.items.splice(i, 1);
  if(!b.items.length) localStorage.removeItem(LS_REMITO_BORRADOR);
  else guardarRemitoBorrador(b);
  actualizarBadgeRemito();
  renderTab('remito');
}

function remitoAgregarItemManual(zohoItem) {
  const sku = zohoItem.sku||zohoItem.item_id||'';
  const nombre = zohoItem.name||'—';
  const pt = plateTypes.find(p=>p.sku===sku);
  const posEntry = pt ? calcPosRetiro(pt) : null;
  const posicion = posEntry?.position_id||null;
  const tiene_stock = !!posicion;
  let borrador = getRemitoBorrador();
  if(!borrador) borrador={id:Date.now(),estado:'borrador',items:[],creado:new Date().toISOString(),sos_incluidas:[]};
  borrador.items.push({articulo:nombre, sku, cantidad:1, posicion, plate_type_id:pt?.id||null, obra:'', so_number:null, tiene_stock});
  guardarRemitoBorrador(borrador);
  actualizarBadgeRemito();
  mostrarToast(`✓ ${nombre} agregado al remito`);
  renderTab('remito');
}

async function buscarSOParaRemito() {
  const rawNum = document.getElementById('remito-so-num')?.value?.trim();
  if(!rawNum) return;
  const st = document.getElementById('remito-so-status');
  st.innerHTML = '<span class="spinner"></span><span style="font-size:12px;color:var(--muted);">Buscando...</span>';
  try {
    const token = await getZohoToken();
    const digits = rawNum.replace(/\D/g,'');
    const formats = ['SO-'+digits.padStart(5,'0'), 'SO-'+digits, digits];
    let sos = [];
    for(const fmt of formats) {
      const r = await fetch('/api/zoho-books?endpoint='+encodeURIComponent('salesorders?salesorder_number='+fmt)+'&token='+token);
      const data = await r.json();
      sos = data.salesorders||[];
      if(sos.length) break;
    }
    if(!sos.length){ st.innerHTML=`<div class="warn-box">No encontrada: <strong>${rawNum}</strong></div>`; return; }
    st.innerHTML = '<span class="spinner"></span><span style="font-size:12px;color:var(--muted);">Verificando stock...</span>';
    const r2 = await fetch('/api/zoho-books?endpoint='+encodeURIComponent('salesorders/'+sos[0].salesorder_id)+'&token='+token);
    const det = await r2.json();
    const so = det.salesorder||sos[0];
    const soNum = so.salesorder_number;
    const obra = so.reference_number||so.delivery_address?.address||'';
    let borrador = getRemitoBorrador();
    if(!borrador) borrador={id:Date.now(),estado:'borrador',items:[],creado:new Date().toISOString(),sos_incluidas:[]};
    let addedCount = 0;
    for(const it of (so.line_items||[])) {
      const sku = it.sku||'';
      const cantidad = Number(it.quantity)||1;
      let posicion=null, plate_type_id=null, tiene_stock=false;
      if(sku) {
        try {
          const sr = await fetch(`${NEON}?action=stock-by-sku&sku=${encodeURIComponent(sku)}`);
          const sd = await sr.json();
          if(Array.isArray(sd)&&sd.length){ posicion=sd[0].position_id; plate_type_id=sd[0].plate_type_id; tiene_stock=true; }
        } catch(e){}
      }
      const ni = {articulo:it.name||'—', sku, cantidad, posicion, plate_type_id, obra, so_number:soNum, tiene_stock};
      const ex = borrador.items.find(r=>r.sku===sku&&r.posicion===posicion);
      if(ex) ex.cantidad+=cantidad; else { borrador.items.push(ni); addedCount++; }
    }
    if(!borrador.sos_incluidas.includes(soNum)) borrador.sos_incluidas.push(soNum);
    guardarRemitoBorrador(borrador);
    actualizarBadgeRemito();
    remitoAgregarSOOpen = false;
    mostrarToast(`✓ ${addedCount} ítems de ${soNum} agregados`);
    renderTab('remito');
  } catch(e) {
    const stEl = document.getElementById('remito-so-status');
    if(stEl) stEl.innerHTML = `<div style="color:var(--red);font-size:12px;">Error: ${e.message}</div>`;
  }
}

async function confirmarRemito() {
  const borrador = getRemitoBorrador();
  if(!borrador||!borrador.items.length) return;
  const totalU = borrador.items.reduce((a,it)=>a+(it.cantidad||0),0);
  if(!confirm(`¿Confirmar salida de ${totalU} unidades?`)) return;
  const btn = document.getElementById('btn-confirmar-remito');
  if(btn){btn.disabled=true;btn.textContent='Confirmando...';}
  try {
    const itemsConStock = borrador.items.filter(it=>it.tiene_stock&&it.posicion&&it.plate_type_id);
    if(itemsConStock.length) {
      const resp = await fetch(NEON+'?action=confirm-salida',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ items: itemsConStock.map(it=>({
          position_id:it.posicion, plate_type_id:it.plate_type_id,
          quantity:it.cantidad, obra:it.obra||null, so_number:it.so_number||null,
        })) })
      });
      const ok = await resp.json();
      if(!ok?.ok && ok?.error) throw new Error(ok.error);
    }
    const confirmed = {...borrador, estado:'confirmado', confirmado:new Date().toISOString()};
    guardarRemitoHistorial(confirmed);
    localStorage.removeItem(LS_REMITO_BORRADOR);
    actualizarBadgeRemito();
    await recargarStock();
    const n = confirmed.items.length;
    document.getElementById('content').innerHTML = `
    <div style="text-align:center;padding:60px 20px;">
      <div style="font-size:52px;margin-bottom:16px;color:var(--green);">✓</div>
      <div class="mono" style="font-size:11px;letter-spacing:2px;color:var(--green);text-transform:uppercase;margin-bottom:8px;">Salida registrada</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:4px;">${confirmed.sos_incluidas.join(' · ')||'Remito manual'}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:28px;">${n} ítem${n!==1?'s':''} · ${totalU} unidades descontadas</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="switchTab('remito')">Ver historial</button>
        <button class="btn btn-ghost" onclick="switchTab('salida')">Nueva salida</button>
      </div>
    </div>`;
  } catch(e){
    if(btn){btn.disabled=false;btn.textContent='✓ CONFIRMAR Y EJECUTAR SALIDA';}
    alert('Error: '+e.message);
  }
}

async function getZohoToken() {
  const data = await fetch('/api/zoho-token').then(r=>r.json());

  return data.access_token;
