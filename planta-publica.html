<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<link rel="manifest" href="/manifest-publica.json">
<meta name="theme-color" content="#FFD600">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planta MBLE">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBLE · Planta</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0a0c; --surf:#111114; --brd:#1e1e22;
    --tx1:#f0f0f2; --tx2:#a0a0aa; --tx3:#555560;
    --col:#3b82f6; --arm:#f59e0b; --cor:#ef4444;
    --mod:#8b5cf6; --cam:#06b6d4; --coo:#6b7280;
    --obr:#10b981; --red:#ef4444; --grn:#22c55e;
  }
  body{background:var(--bg);color:var(--tx1);font-family:'Barlow Condensed',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ── Login ── */
  #screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .login-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:40px;width:100%;max-width:360px;}
  .login-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--arm);letter-spacing:4px;text-align:center;margin-bottom:6px;}
  .login-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:2px;text-align:center;margin-bottom:28px;}
  .login-input{width:100%;background:#0d0d10;border:1px solid var(--brd);border-radius:6px;padding:12px 14px;color:var(--tx1);font-size:15px;outline:none;margin-bottom:12px;transition:border-color .15s;font-family:'IBM Plex Mono',monospace;letter-spacing:3px;}
  .login-input:focus{border-color:var(--arm);}
  .login-btn{width:100%;background:var(--arm);color:#0a0a0c;border:none;border-radius:6px;padding:13px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:opacity .15s;}
  .login-btn:hover{opacity:.85;}
  .login-btn:disabled{opacity:.5;cursor:not-allowed;}
  .login-error{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);text-align:center;min-height:18px;margin-top:10px;}

  /* ── Header ── */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:var(--surf);border-bottom:1px solid var(--brd);}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--arm);display:flex;align-items:center;gap:10px;}
  .logo-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:1.5px;margin-top:2px;}
  .live{width:8px;height:8px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  .hdr-stats{display:flex;gap:28px;}
  .st{text-align:center;}
  .st-n{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;}
  .st-l{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
  .clock{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--tx1);text-align:right;letter-spacing:2px;}
  .date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);text-align:right;letter-spacing:1px;margin-top:2px;}

  /* ── Legend ── */
  .leg{display:flex;align-items:center;gap:16px;padding:8px 28px;background:var(--surf);border-bottom:1px solid var(--brd);flex-wrap:wrap;}
  .lg{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:.5px;}
  .ld{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .leg-sep{width:1px;height:14px;background:var(--brd);margin:0 4px;}
  .leg-ot{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.5px;}

  /* ── Main grid ── */
  .main{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:20px 28px 12px;flex:1;min-height:0;overflow:hidden;}
  .sh{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .sp{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;}
  .sp.pl{color:var(--arm);}
  .sp.of{color:var(--col);}
  .sl{flex:1;height:1px;background:var(--brd);}
  .sc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx3);}
  .grid{display:grid;gap:6px;}
  .grid-pl{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
  .grid-of{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}

  /* ── Cards ── */
  .card{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px 12px;border-left:3px solid var(--tx3);transition:border-color .15s;}
  .cc-col{border-left-color:var(--col);} .cc-arm{border-left-color:var(--arm);} .cc-cor{border-left-color:var(--cor);}
  .cc-mod{border-left-color:var(--mod);} .cc-cam{border-left-color:var(--cam);} .cc-coo{border-left-color:var(--coo);}
  .cc-obr{border-left-color:var(--obr);}
  .cr1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
  .cname{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
  .ctime{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--tx2);flex-shrink:0;margin-left:8px;}
  .ctime.ot{color:var(--red);font-weight:600;}
  .cr2{display:flex;align-items:baseline;gap:4px;margin-bottom:2px;}
  .ccli{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .csep{color:var(--tx3);font-size:10px;}
  .ctipo{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--arm);font-weight:500;flex-shrink:0;}
  .cmueble{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
  .cr4{display:flex;align-items:center;}
  .cbadge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:#1a1a1e;color:var(--tx3);}
  .bb-col{background:rgba(59,130,246,.12);color:var(--col);} .bb-arm{background:rgba(245,158,11,.12);color:var(--arm);}
  .bb-cor{background:rgba(239,68,68,.12);color:var(--cor);} .bb-mod{background:rgba(139,92,246,.12);color:var(--mod);}
  .bb-cam{background:rgba(6,182,212,.12);color:var(--cam);} .bb-coo{background:rgba(107,114,128,.12);color:var(--coo);}
  .bb-obr{background:rgba(16,185,129,.12);color:var(--obr);}


  /* ── CNC Sidebar ── */
  .cnc-sidebar{width:160px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
  .cnc-sidebar.hidden{display:none;}
  .cnc-header{background:var(--surf);border:1px solid var(--brd);border-radius:6px;padding:4px;text-align:center;}
  .cnc-bar-container{background:var(--surf);border:1px solid var(--brd);border-radius:6px;padding:6px;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
  .cnc-rows{flex:1;display:flex;flex-direction:column;min-height:0;width:100%;}
  .cnc-row{display:flex;align-items:center;justify-content:center;gap:6px;min-height:0;}
  .cnc-row-seg{width:32px;height:100%;flex-shrink:0;}
  .cnc-row:first-child .cnc-row-seg{border-radius:4px 4px 0 0;}
  .cnc-row:last-child .cnc-row-seg{border-radius:0 0 4px 4px;}
  .cnc-row-seg.corte{background:var(--obr);}
  .cnc-row-seg.parado{background:var(--arm);}
  .cnc-row-seg.descanso{background:var(--coo);opacity:0.35;}
  .cnc-row-label{width:40px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--tx3);text-align:left;line-height:1;overflow:hidden;white-space:nowrap;}
  .cnc-row-label.lbl-corte{color:var(--obr);}
  .cnc-row-label.lbl-parado{color:var(--arm);}
  .cnc-footer{background:var(--surf);border:1px solid var(--brd);border-radius:6px;padding:4px;text-align:center;}
  .cnc-placas-label{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--tx3);text-transform:uppercase;letter-spacing:.2px;margin-bottom:1px;}
  .cnc-placas-count{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:bold;color:var(--obr);margin-bottom:3px;line-height:1;}
  .cnc-mini-legend{display:flex;gap:4px;justify-content:center;font-size:7px;color:var(--tx3);}
  .cnc-legend-item{display:flex;align-items:center;gap:2px;}
  .cnc-legend-box{width:4px;height:4px;border-radius:1px;}
  .cnc-legend-box.corte{background:var(--obr);}
  .cnc-legend-box.parado{background:var(--arm);}
  .cnc-percentage-footer{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--obr);margin-top:2px;font-weight:bold;}
  .content-with-sidebar{display:flex;flex:1;min-height:0;overflow:hidden;}

  /* ── Responsive ── */
  @media(max-width:900px){.main{grid-template-columns:1fr;} .lane{grid-template-columns:120px 1fr 60px;}}
  @media(max-width:480px){.hdr{flex-direction:column;gap:10px;padding:12px 16px;} .hdr-stats{gap:16px;} .main{padding:12px 16px;} .pf{padding:8px 16px 20px;} .leg{padding:8px 16px;}}

  /* ── Bottom panels (Recepciones + Kitting) ── */
  .bottom{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:2px solid var(--brd);overflow:hidden;height:33vh;flex-shrink:0;}
  .panel-half{display:flex;flex-direction:column;overflow:hidden;}
  .panel-half.rec{border-right:1px solid var(--brd);background:#0d0d10;}
  .panel-half.kit{background:#0a0c0d;}
  .panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;flex-shrink:0;}
  .panel-hdr.rec-hdr{background:rgba(245,158,11,.07);border-bottom:1px solid rgba(245,158,11,.18);}
  .panel-hdr.kit-hdr{background:rgba(59,130,246,.07);border-bottom:1px solid rgba(59,130,246,.18);}
  .phdr-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;}
  .rec-hdr .phdr-title{color:var(--arm);}
  .kit-hdr .phdr-title{color:var(--col);}
  .phdr-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:2px 8px;border-radius:3px;letter-spacing:.5px;}
  .rec-hdr .phdr-badge{background:rgba(245,158,11,.12);color:var(--arm);}
  .kit-hdr .phdr-badge{background:rgba(59,130,246,.12);color:var(--col);}
  .panel-body{flex:1;overflow-y:auto;padding:4px 0;}
  .brow{display:grid;grid-template-columns:90px 1fr 70px;gap:8px;align-items:center;padding:5px 16px;border-bottom:1px solid #141417;font-size:12px;}
  .brow:last-child{border-bottom:none;}
  .brow-num{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--tx1);}
  .brow-desc{min-width:0;overflow:hidden;}
  .brow-main{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx2);font-size:12px;}
  .brow-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brow-st{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.5px;text-align:right;}
  .brow-st.st-pendiente{color:var(--arm);}
  .brow-st.st-parcial{color:var(--col);}
  .brow-st.st-vencida{color:var(--red);}
  .brow-st.st-completo{color:var(--grn);}
  @media(max-width:900px){.bottom{grid-template-columns:1fr;max-height:50vh;}}

  @media(min-width:900px) and (max-width:1400px){
    body { zoom: 0.65; height: 154vh; }
  }

  /* ── Dashboard container ── */
  #screen-dash{display:none;flex-direction:column;flex:1;min-height:0;}
  #tv-err{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);display:none;padding:10px 28px;}

  @media(max-width:768px){
    html, body { height:auto; overflow:auto; }
    #screen-dash { height:auto; min-height:100vh; display:flex; flex-direction:column; }
    .main { overflow:visible; min-height:0; flex:none; }
    .bottom {
      flex-shrink:0;
      grid-template-columns:1fr;
      height:auto;
      border-top:2px solid var(--brd);
    }
    .bottom-tabs {
      display:flex;
      border-bottom:1px solid var(--brd);
      background:var(--surf);
    }
    .btab {
      flex:1;
      padding:8px;
      font-family:'IBM Plex Mono',monospace;
      font-size:10px;
      font-weight:600;
      letter-spacing:1px;
      text-align:center;
      text-transform:uppercase;
      color:var(--tx3);
      cursor:pointer;
      border:none;
      background:transparent;
      border-bottom:2px solid transparent;
    }
    .btab.active-rec { color:var(--arm); border-bottom-color:var(--arm); }
    .btab.active-kit { color:var(--col); border-bottom-color:var(--col); }
    .panel-half.rec, .panel-half.kit {
      border-right:none;
      height:auto;
      max-height:none;
      display:none;
    }
    .panel-half.rec.tab-visible, .panel-half.kit.tab-visible { display:flex; }
    .panel-half.rec .panel-hdr, .panel-half.kit .panel-hdr { display:none; }
    .panel-half.rec .panel-body, .panel-half.kit .panel-body {
      max-height:55vh;
      overflow-y:auto;
    }
  }
</style>
</head>
<body>

<!-- ═══ LOGIN ════════════════════════════════════════════════════════════════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">⬡ MBLE</div>
    <div class="login-sub">VISTA PLANTA · ACCESO INTERNO</div>
    <input id="pw-input" class="login-input" type="password" placeholder="contraseña"
      onkeydown="if(event.key==='Enter')_loginPublico()">
    <button class="login-btn" id="pw-btn" onclick="_loginPublico()">ENTRAR</button>
    <div class="login-error" id="pw-err"></div>
  </div>
</div>

<!-- ═══ DASHBOARD ════════════════════════════════════════════════════════════ -->
<div id="screen-dash">
  <div id="tv-err">⚠ Reconectando...</div>

  <header class="hdr">
    <div>
      <div class="logo"><div class="live"></div>MBLE · PLANTA</div>
      <div class="logo-sub">Panel de operaciones</div>
    </div>
    <div class="hdr-stats">
      <div class="st"><div class="st-n" style="color:var(--arm)" id="cnt-tarea">0</div><div class="st-l">En Tarea</div></div>
      <div class="st"><div class="st-n" style="color:var(--tx3)" id="cnt-sin">0</div><div class="st-l">Sin Tarea</div></div>
      <div class="st"><div class="st-n" style="color:var(--red)" id="cnt-ot">0</div><div class="st-l">+9H turno</div></div>
      <div class="st"><div class="st-n" style="color:var(--col)" id="cnt-rec">0</div><div class="st-l">OC Pend.</div></div>
    </div>
    <div><div class="clock" id="tv-clock">--:--:--</div><div class="date" id="tv-date">—</div></div>
  </header>

  <div class="leg">
    <div class="lg"><div class="ld" style="background:var(--col)"></div>Colocación</div>
    <div class="lg"><div class="ld" style="background:var(--arm)"></div>Armado</div>
    <div class="lg"><div class="ld" style="background:var(--cor)"></div>Corte</div>
    <div class="lg"><div class="ld" style="background:var(--mod)"></div>Modelado</div>
    <div class="lg"><div class="ld" style="background:var(--cam)"></div>CAM</div>
    <div class="lg"><div class="ld" style="background:var(--coo)"></div>Coordinación</div>
    <div class="lg"><div class="ld" style="background:var(--obr)"></div>Obra</div>
    <div class="leg-sep"></div>
    <div class="leg-ot"><div class="ld" style="background:var(--red)"></div>+9H en turno</div>
  </div>

  <div class="content-with-sidebar">
    <div style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;">
      <div class="main">
        <div>
          <div class="sh"><span class="sp pl">Planta</span><div class="sl"></div><span class="sc" id="sc-pl">0</span></div>
          <div class="grid grid-pl" id="tv-planta"></div>
        </div>
        <div>
          <div class="sh"><span class="sp of">Oficina</span><div class="sl"></div><span class="sc" id="sc-of">0</span></div>
          <div class="grid grid-of" id="tv-oficina"></div>
        </div>
      </div>

      <!-- ═══ BOTTOM: Recepciones + Kitting ═══════════════════════════════════ -->
      <div class="bottom">
        <div class="bottom-tabs" id="bottom-tabs" style="display:none">
          <button class="btab active-rec" onclick="switchTab('rec')">📦 Recepciones</button>
          <button class="btab" onclick="switchTab('kit')">🧩 Kitting SO</button>
        </div>
        <div class="panel-half rec">
          <div class="panel-hdr rec-hdr">
            <div class="phdr-title">RECEPCIONES OC</div>
            <div class="phdr-badge" id="rec-badge">0</div>
          </div>
          <div class="panel-body" id="tv-rec"></div>
        </div>
        <div class="panel-half kit">
          <div class="panel-hdr kit-hdr">
            <div class="phdr-title">KITTING SO</div>
            <div class="phdr-badge" id="kit-badge">0</div>
          </div>
          <div class="panel-body" id="tv-kit"></div>
        </div>
      </div>
    </div>

    <!-- ═══ CNC SIDEBAR ═════════════════════════════════════════════════════ -->
    <div class="cnc-sidebar hidden" id="cnc-sidebar">
      <div class="cnc-header">
        <div class="cnc-placas-label">Placas</div>
        <div class="cnc-placas-count" id="cnc-placas-count">—</div>
      </div>
      <div class="cnc-bar-container">
        <div class="cnc-rows" id="cnc-rows"></div>
      </div>
      <div class="cnc-footer">
        <div class="cnc-mini-legend">
          <div class="cnc-legend-item"><div class="cnc-legend-box corte"></div><span>Corte</span></div>
          <div class="cnc-legend-item"><div class="cnc-legend-box parado"></div><span>Parado</span></div>
        </div>
        <div class="cnc-percentage-footer" id="cnc-percentage">—</div>
      </div>
    </div>
  </div>

</div>

<script>
const FLAG_KEY = 'planta_publica_auth';

// ── Init ─────────────────────────────────────────────────────────────────────
if (localStorage.getItem(FLAG_KEY) === '1') {
  mostrarDash();
}

// ── Login ────────────────────────────────────────────────────────────────────
async function _loginPublico() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  const btn = document.getElementById('pw-btn');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('pw-err').textContent = '';
  try {
    const r = await fetch('/api/tiempos?action=login-publico', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw })
    }).then(res => res.json());
    if (r.ok) {
      localStorage.setItem(FLAG_KEY, '1');
      mostrarDash();
    } else {
      document.getElementById('pw-err').textContent = 'Contraseña incorrecta';
    }
  } catch(e) {
    document.getElementById('pw-err').textContent = 'Error de conexión';
  } finally {
    btn.disabled = false; btn.textContent = 'ENTRAR';
  }
}

// ── Tabs mobile ──────────────────────────────────────────────────────────────
function switchTab(tab) {
  const rec = document.querySelector('.panel-half.rec');
  const kit = document.querySelector('.panel-half.kit');
  const tabs = document.querySelectorAll('.btab');
  if (tab === 'rec') {
    rec.classList.add('tab-visible');
    kit.classList.remove('tab-visible');
    tabs[0].className = 'btab active-rec';
    tabs[1].className = 'btab';
  } else {
    kit.classList.add('tab-visible');
    rec.classList.remove('tab-visible');
    tabs[0].className = 'btab';
    tabs[1].className = 'btab active-kit';
  }
}

// ── Mostrar dashboard ─────────────────────────────────────────────────────────
function mostrarDash() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-dash').style.display = 'flex';
  if (window.innerWidth <= 768) {
    document.getElementById('bottom-tabs').style.display = 'flex';
    document.querySelector('.panel-half.rec').classList.add('tab-visible');
  }
  cargarSnapshot();
  cargarBottom();
  cargarCNC();
  setInterval(cargarSnapshot, 60000);
  setInterval(cargarCNC, 60000);
  setInterval(cargarBottom, 600000); // cada 10 min (Zoho rate limit)
  mantenerPantallaActiva();
}

async function mantenerPantallaActiva() {
  try {
    if ('wakeLock' in navigator) {
      let wakeLock = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible') {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      });
      console.log('Wake Lock activo');
    } else {
      console.warn('Wake Lock no soportado en este browser');
    }
  } catch(e) {
    console.warn('Wake Lock error:', e);
  }
}

async function cargarSnapshot() {

// ── Centro map ───────────────────────────────────────────────────────────────
const CM = {
  COLOCACION:   {css:'col', chip:'ch-col', badge:'bb-col', color:'var(--col)'},
  ARMADO:       {css:'arm', chip:'ch-arm', badge:'bb-arm', color:'var(--arm)'},
  CORTE:        {css:'cor', chip:'ch-cor', badge:'bb-cor', color:'var(--cor)'},
  MODELADO:     {css:'mod', chip:'ch-mod', badge:'bb-mod', color:'var(--mod)'},
  CAM:          {css:'cam', chip:'ch-cam', badge:'bb-cam', color:'var(--cam)'},
  COORDINACION: {css:'coo', chip:'ch-coo', badge:'bb-coo', color:'var(--coo)'},
  OBRA:         {css:'obr', chip:'ch-obr', badge:'bb-obr', color:'var(--obr)'},
  ENCHAPADO:    {css:'mod', chip:'ch-mod', badge:'bb-mod', color:'var(--mod)'},
  REVISION:     {css:'arm', chip:'ch-arm', badge:'bb-arm', color:'var(--arm)'},
  HERRERIA:     {css:'cor', chip:'ch-cor', badge:'bb-cor', color:'var(--cor)'},
  ELECTRICA:    {css:'cam', chip:'ch-cam', badge:'bb-cam', color:'var(--cam)'},
  MACIZO:       {css:'col', chip:'ch-col', badge:'bb-col', color:'var(--col)'},
  DESCANSO:     {css:'coo', chip:'ch-coo', badge:'bb-coo', color:'var(--coo)'},
};
function getCM(centroLabel) {
  if (!centroLabel) return CM.COORDINACION;
  const k = centroLabel.toUpperCase().split('/')[0].trim();
  return CM[k] || CM.COORDINACION;
}

function fmtMin(m) {
  const h = Math.floor(m/60), mm = m % 60;
  return h > 0 ? `${h}H ${String(mm).padStart(2,'0')}M` : `${mm}M`;
}

function cncBadge(c) {
  const t = fmtMin(c.minutos || 0);
  if (c.estado === 'cortando')
    return `<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);border-radius:4px;padding:2px 8px;">
      <span style="width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse-dot 1.5s infinite;"></span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:#4ade80;letter-spacing:.5px;">CORTANDO #${c.placa_numero || '?'} · ${t}</span>
    </span>`;
  return `<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.25);border-radius:4px;padding:2px 8px;">
    <span style="width:7px;height:7px;border-radius:50%;background:#f59e0b;"></span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:#f59e0b;letter-spacing:.5px;">PARADO · ${t}</span>
  </span>`;
}

function buildCard(op) {
  const esAusente = op.estado === 'ausente';

  if (op.estado === 'sin_tarea') {
    const centro = op.ultimo_centro_label || '—';
    const cli = op.ultimo_proyecto?.nombre || '—';
    const muebleStr = op.ultimo_mueble?.nombre || '—';
    return `<div class="card" style="border-left:3px solid var(--red);background:rgba(239,68,68,.08);">
      <div class="cr1">
        <div class="cname" style="color:var(--tx1)">${op.nombre}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;background:rgba(239,68,68,.2);color:var(--red);padding:2px 8px;border-radius:3px;font-weight:600;">SIN TAREA</div>
      </div>
      <div class="cr2"><div class="ccli">${cli}</div></div>
      <div class="cmueble">${muebleStr}</div>
      <div class="cr4"><span class="cbadge" style="background:rgba(239,68,68,.1);color:var(--red);">—</span></div>
    </div>`;
  }

  if (esAusente) {
    const centro = op.ultimo_centro_label || '—';
    const m = getCM(centro.toUpperCase());
    const cli = op.ultimo_proyecto?.nombre || '—';
    const muebleStr = op.ultimo_mueble?.nombre || '—';
    return `<div class="card cc-${m.css}" style="opacity:0.35;filter:saturate(0.3);">
      <div class="cr1">
        <div class="cname">${op.nombre}</div>
        <div style="font-size:9px;color:#3a3d47;background:#131520;padding:2px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;">AUSENTE</div>
      </div>
      <div class="cr2"><div class="ccli">${cli}</div></div>
      <div class="cmueble">${muebleStr}</div>
      <div class="cr4"><span class="cbadge ${m.badge}">${centro}</span></div>
    </div>`;
  }

  const label = (op.centro_label || op.centro || '').toUpperCase();
  const m = getCM(label);
  const mins = op.tiempo_minutos || 0;
  const ot = mins >= 540;
  const hasMeta = op.proyecto?.cliente && op.proyecto.cliente !== '—';
  const tipo = op.mueble?.codigo || '';
  const cli = hasMeta ? op.proyecto.cliente : '—';
  const odfStr = op.proyecto?.odf || '';
  const muebleStr = op.mueble?.nombre || '';
  const linea3 = hasMeta
    ? [odfStr, muebleStr].filter(Boolean).join('  ·  ')
    : 'Coordinación general';
  const centroDisplay = op.centro_label || label;
  return `<div class="card cc-${m.css}">
    <div class="cr1">
      <div class="cname">${op.nombre}</div>
      <div class="ctime${ot?' ot':''}">${fmtMin(mins)}</div>
    </div>
    <div class="cr2">
      <div class="ccli">${cli}</div>
      ${tipo ? `<span class="csep">·</span><div class="ctipo">${tipo}</div>` : ''}
    </div>
    <div class="cmueble">${linea3}</div>
    <div class="cr4"><span class="cbadge ${m.badge}">${centroDisplay}</span>${op.cnc ? cncBadge(op.cnc) : ''}</div>
  </div>`;
}


// ── Render ────────────────────────────────────────────────────────────────────
function renderSnapshot(data) {
  const { counters, operarios, timestamp } = data;

  const visibles = (operarios || []).filter(op => op.estado !== 'ausente');
  const allOps = operarios || [];
  const plantaActiva  = visibles.filter(op => op.rol_app === 'operario');
  const plantaAusente = allOps.filter(op => op.rol_app === 'operario' && op.estado === 'ausente');
  const CENTRO_ORDER = ['CORTE','ENCHAPADO','ARMADO','COLOCACION','HERRERIA','ELECTRICA','MACIZO'];
  function centroRank(op) {
    const c = (op.centro_label || op.centro || '').toUpperCase().split('/')[0].trim();
    const idx = CENTRO_ORDER.indexOf(c);
    return idx >= 0 ? idx : CENTRO_ORDER.length;
  }
  plantaActiva.sort((a, b) => {
    const ra = centroRank(a), rb = centroRank(b);
    if (ra !== rb) return ra - rb;
    const oa = (a.proyecto?.odf || a.proyecto?.cliente || '').toUpperCase();
    const ob = (b.proyecto?.odf || b.proyecto?.cliente || '').toUpperCase();
    return oa.localeCompare(ob);
  });
  const planta = [...plantaActiva, ...plantaAusente];
  const oficinaActiva  = visibles.filter(op => op.rol_app !== 'operario');
  const oficinaAusente = allOps.filter(op => op.rol_app !== 'operario' && op.estado === 'ausente');
  const oficina = [...oficinaActiva, ...oficinaAusente];
  const enTarea = visibles.filter(op => op.estado === 'en_tarea');
  const overtime = enTarea.filter(op => (op.tiempo_minutos||0) >= 540);

  // Counters
  document.getElementById('cnt-tarea').textContent = counters.en_tarea || 0;
  document.getElementById('cnt-sin').textContent   = counters.sin_tarea || 0;
  document.getElementById('cnt-ot').textContent    = overtime.length;

  // Cards
  document.getElementById('tv-planta').innerHTML  = planta.map(buildCard).join('') || '<div style="color:var(--tx3);font-size:12px;padding:8px;">Sin actividad</div>';
  document.getElementById('tv-oficina').innerHTML = oficina.map(buildCard).join('') || '';
  document.getElementById('sc-pl').textContent = plantaActiva.length;
  document.getElementById('sc-of').textContent = oficinaActiva.length;

}

// ── Bottom panels (Recepciones + Kitting) ────────────────────────────────────
async function cargarBottom() {
  try {
    const r = await fetch('/api/tiempos?action=tv-bottom').then(res => res.json());
    if (!r.ok) return;
    renderBottom(r);
  } catch(e) {}
}

function renderBottom(data) {
  const { recepciones, kitting } = data;

  // Recepciones
  const recEl = document.getElementById('tv-rec');
  document.getElementById('rec-badge').textContent = (recepciones || []).length;
  const cntRec = document.getElementById('cnt-rec');
  if (cntRec) cntRec.textContent = (recepciones || []).length;
  if (!recepciones || !recepciones.length) {
    recEl.innerHTML = '<div style="padding:12px 16px;color:var(--tx3);font-size:11px;">Sin OC pendientes</div>';
  } else {
    recEl.innerHTML = recepciones.map(oc => {
      const stClass = oc.estado === 'vencida' ? 'st-vencida' : 'st-pendiente';
      const stLabel = oc.estado === 'vencida' ? 'VENCIDA' : (oc.fecha_entrega || 'S/F');
      return `<div class="brow">
        <div class="brow-num">${oc.oc_numero}</div>
        <div class="brow-desc">
          <div class="brow-main">${oc.proveedor}</div>
          <div class="brow-sub">${oc.referencia || ''}</div>
        </div>
        <div class="brow-st ${stClass}">${stLabel}</div>
      </div>`;
    }).join('');
  }

  // Kitting
  const kitEl = document.getElementById('tv-kit');
  document.getElementById('kit-badge').textContent = (kitting || []).length;
  if (!kitting || !kitting.length) {
    kitEl.innerHTML = '<div style="padding:12px 16px;color:var(--tx3);font-size:11px;">Sin SOs pendientes</div>';
  } else {
    kitEl.innerHTML = kitting.map(so => {
      const stClass = so.estado === 'parcial' ? 'st-parcial' : (so.estado === 'completo' ? 'st-completo' : 'st-pendiente');
      const stLabel = so.estado.toUpperCase();
      return `<div class="brow">
        <div class="brow-num">${so.so_numero}</div>
        <div class="brow-desc">
          <div class="brow-main">${so.mueble}</div>
          <div class="brow-sub">${so.obra}</div>
        </div>
        <div class="brow-st ${stClass}">${stLabel}</div>
      </div>`;
    }).join('');
  }
}

// ── CNC sidebar ──────────────────────────────────────────────────────────────
async function cargarCNC() {
  try {
    const r = await fetch('/api/tiempos?action=cnc-timeline').then(res => res.json());
    if (!r.ok || !r.segmentos || !r.segmentos.length) {
      document.getElementById('cnc-sidebar').classList.add('hidden');
      return;
    }
    renderCNC(r);
  } catch(e) {
    document.getElementById('cnc-sidebar').classList.add('hidden');
  }
}

function renderCNC(data) {
  const sidebar = document.getElementById('cnc-sidebar');
  sidebar.classList.remove('hidden');

  const { porcentaje_corte, segmentos, placas_cortadas } = data;
  document.getElementById('cnc-percentage').textContent = `${Math.round(porcentaje_corte || 0)}%`;
  document.getElementById('cnc-placas-count').textContent = placas_cortadas ?? '0';

  const fmtMinCnc = (m) => {
    const h = Math.floor(m/60), mm = m % 60;
    if (h > 0 && mm > 0) return `${h}h${mm}m`;
    if (h > 0) return `${h}h`;
    return `${mm}m`;
  };

  const rowsEl = document.getElementById('cnc-rows');
  if (segmentos && segmentos.length) {
    const totalMin = segmentos.reduce((s, x) => s + (x.minutos || 0), 0) || 1;
    rowsEl.innerHTML = segmentos.map(seg => {
      const pct = ((seg.minutos || 0) / totalMin) * 100;
      const lblClass = seg.tipo === 'corte' ? 'lbl-corte' : (seg.tipo === 'parado' ? 'lbl-parado' : '');
      const label = pct >= 2.5 && seg.minutos ? fmtMinCnc(seg.minutos) : '';
      return `<div class="cnc-row" style="flex:${pct} 0 0;">
        <div class="cnc-row-seg ${seg.tipo}"></div>
        <div class="cnc-row-label ${lblClass}">${label}</div>
      </div>`;
    }).join('');
  } else {
    rowsEl.innerHTML = '<div class="cnc-row" style="flex:1;"><div class="cnc-row-seg" style="background:var(--coo);opacity:0.15;"></div><div class="cnc-row-label"></div></div>';
  }
}

// ── Clock ────────────────────────────────────────────────────────────────────
const DAYS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MNAMES=['ene','feb','mar','abr','may','jun','jul','ago','set','oct','nov','dic'];
function tickClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  const el = document.getElementById('tv-clock');
  const dl = document.getElementById('tv-date');
  if (el) el.textContent = `${hh}:${mm}:${ss}`;
  if (dl) dl.textContent = `${DAYS[d.getDay()]} ${d.getDate()} ${MNAMES[d.getMonth()]} ${d.getFullYear()}`;
}
tickClock(); setInterval(tickClock, 1000);
