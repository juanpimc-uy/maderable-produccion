<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<link rel="manifest" href="/manifest-publica.json">
<meta name="theme-color" content="#FFD600">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planta MBLE">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBLE · Planta</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0a0c; --surf:#111114; --brd:#1e1e22;
    --tx1:#f0f0f2; --tx2:#a0a0aa; --tx3:#555560;
    --col:#3b82f6; --arm:#f59e0b; --cor:#ef4444;
    --mod:#8b5cf6; --cam:#06b6d4; --coo:#6b7280;
    --obr:#10b981; --red:#ef4444; --grn:#22c55e;
  }
  body{background:var(--bg);color:var(--tx1);font-family:'Barlow Condensed',sans-serif;min-height:100vh;overflow-x:hidden;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ── Login ── */
  #screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .login-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:40px;width:100%;max-width:360px;}
  .login-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--arm);letter-spacing:4px;text-align:center;margin-bottom:6px;}
  .login-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:2px;text-align:center;margin-bottom:28px;}
  .login-input{width:100%;background:#0d0d10;border:1px solid var(--brd);border-radius:6px;padding:12px 14px;color:var(--tx1);font-size:15px;outline:none;margin-bottom:12px;transition:border-color .15s;font-family:'IBM Plex Mono',monospace;letter-spacing:3px;}
  .login-input:focus{border-color:var(--arm);}
  .login-btn{width:100%;background:var(--arm);color:#0a0a0c;border:none;border-radius:6px;padding:13px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:opacity .15s;}
  .login-btn:hover{opacity:.85;}
  .login-btn:disabled{opacity:.5;cursor:not-allowed;}
  .login-error{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);text-align:center;min-height:18px;margin-top:10px;}

  /* ── Header ── */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:var(--surf);border-bottom:1px solid var(--brd);}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--arm);display:flex;align-items:center;gap:10px;}
  .logo-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:1.5px;margin-top:2px;}
  .live{width:8px;height:8px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .hdr-stats{display:flex;gap:28px;}
  .st{text-align:center;}
  .st-n{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;}
  .st-l{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
  .clock{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--tx1);text-align:right;letter-spacing:2px;}
  .date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);text-align:right;letter-spacing:1px;margin-top:2px;}

  /* ── Legend ── */
  .leg{display:flex;align-items:center;gap:16px;padding:8px 28px;background:var(--surf);border-bottom:1px solid var(--brd);flex-wrap:wrap;}
  .lg{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:.5px;}
  .ld{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .leg-sep{width:1px;height:14px;background:var(--brd);margin:0 4px;}
  .leg-ot{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.5px;}

  /* ── Main grid ── */
  .main{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:20px 28px 12px;}
  .sh{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .sp{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;text-transform:uppercase;}
  .sp.pl{color:var(--arm);}
  .sp.of{color:var(--col);}
  .sl{flex:1;height:1px;background:var(--brd);}
  .sc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx3);}
  .grid{display:grid;gap:6px;}
  .grid-pl{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
  .grid-of{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}

  /* ── Cards ── */
  .card{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px 12px;border-left:3px solid var(--tx3);transition:border-color .15s;}
  .cc-col{border-left-color:var(--col);} .cc-arm{border-left-color:var(--arm);} .cc-cor{border-left-color:var(--cor);}
  .cc-mod{border-left-color:var(--mod);} .cc-cam{border-left-color:var(--cam);} .cc-coo{border-left-color:var(--coo);}
  .cc-obr{border-left-color:var(--obr);}
  .cr1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
  .cname{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
  .ctime{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--tx2);flex-shrink:0;margin-left:8px;}
  .ctime.ot{color:var(--red);font-weight:600;}
  .cr2{display:flex;align-items:baseline;gap:4px;margin-bottom:2px;}
  .ccli{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .csep{color:var(--tx3);font-size:10px;}
  .ctipo{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--arm);font-weight:500;flex-shrink:0;}
  .cmueble{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
  .cr4{display:flex;align-items:center;}
  .cbadge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:#1a1a1e;color:var(--tx3);}
  .bb-col{background:rgba(59,130,246,.12);color:var(--col);} .bb-arm{background:rgba(245,158,11,.12);color:var(--arm);}
  .bb-cor{background:rgba(239,68,68,.12);color:var(--cor);} .bb-mod{background:rgba(139,92,246,.12);color:var(--mod);}
  .bb-cam{background:rgba(6,182,212,.12);color:var(--cam);} .bb-coo{background:rgba(107,114,128,.12);color:var(--coo);}
  .bb-obr{background:rgba(16,185,129,.12);color:var(--obr);}

  /* ── Projects footer ── */
  .pf{padding:8px 28px 20px;}
  .pf-hdr{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .pf-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--tx2);white-space:nowrap;}
  .pf-line{flex:1;height:1px;background:var(--brd);}
  .lanes{display:flex;flex-direction:column;gap:4px;}
  .lane{display:grid;grid-template-columns:160px 1fr 80px;gap:10px;align-items:center;padding:5px 0;border-bottom:1px solid #141417;}
  .lane:last-child{border-bottom:none;}
  .li{min-width:0;}
  .li-cli{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--tx1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .li-odf{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:1px;}
  .lt{display:flex;flex-wrap:wrap;gap:3px;}
  .chip{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;padding:2px 5px;border-radius:3px;white-space:nowrap;}
  .ch-col{background:rgba(59,130,246,.15);color:var(--col);} .ch-arm{background:rgba(245,158,11,.15);color:var(--arm);}
  .ch-cor{background:rgba(239,68,68,.15);color:var(--cor);} .ch-mod{background:rgba(139,92,246,.15);color:var(--mod);}
  .ch-cam{background:rgba(6,182,212,.15);color:var(--cam);} .ch-coo{background:rgba(107,114,128,.15);color:var(--coo);}
  .ch-obr{background:rgba(16,185,129,.15);color:var(--obr);}
  .lr{display:flex;align-items:center;gap:8px;}
  .lr-bar{flex:1;height:4px;background:#1a1a1e;border-radius:2px;overflow:hidden;}
  .lr-fill{height:100%;border-radius:2px;transition:width .3s;}
  .lr-n{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;min-width:18px;text-align:right;}

  /* ── Responsive ── */
  @media(max-width:900px){.main{grid-template-columns:1fr;} .lane{grid-template-columns:120px 1fr 60px;}}
  @media(max-width:480px){.hdr{flex-direction:column;gap:10px;padding:12px 16px;} .hdr-stats{gap:16px;} .main{padding:12px 16px;} .pf{padding:8px 16px 20px;} .leg{padding:8px 16px;}}

  /* ── Dashboard container ── */
  #screen-dash{display:none;}
  #tv-err{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);display:none;padding:10px 28px;}
</style>
</head>
<body>

<!-- ═══ LOGIN ════════════════════════════════════════════════════════════════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">⬡ MBLE</div>
    <div class="login-sub">VISTA PLANTA · ACCESO INTERNO</div>
    <input id="pw-input" class="login-input" type="password" placeholder="contraseña"
      onkeydown="if(event.key==='Enter')_loginPublico()">
    <button class="login-btn" id="pw-btn" onclick="_loginPublico()">ENTRAR</button>
    <div class="login-error" id="pw-err"></div>
  </div>
</div>

<!-- ═══ DASHBOARD ════════════════════════════════════════════════════════════ -->
<div id="screen-dash">
  <div id="tv-err">⚠ Reconectando...</div>

  <header class="hdr">
    <div>
      <div class="logo"><div class="live"></div>MBLE · PLANTA</div>
      <div class="logo-sub">Panel de operaciones</div>
    </div>
    <div class="hdr-stats">
      <div class="st"><div class="st-n" style="color:var(--arm)" id="cnt-tarea">0</div><div class="st-l">En Tarea</div></div>
      <div class="st"><div class="st-n" style="color:var(--tx3)" id="cnt-sin">0</div><div class="st-l">Sin Tarea</div></div>
      <div class="st"><div class="st-n" style="color:var(--red)" id="cnt-ot">0</div><div class="st-l">+9H turno</div></div>
      <div class="st"><div class="st-n" style="color:var(--col)" id="cnt-proy">0</div><div class="st-l">Proyectos</div></div>
    </div>
    <div><div class="clock" id="tv-clock">--:--:--</div><div class="date" id="tv-date">—</div></div>
  </header>

  <div class="leg">
    <div class="lg"><div class="ld" style="background:var(--col)"></div>Colocación</div>
    <div class="lg"><div class="ld" style="background:var(--arm)"></div>Armado</div>
    <div class="lg"><div class="ld" style="background:var(--cor)"></div>Corte</div>
    <div class="lg"><div class="ld" style="background:var(--mod)"></div>Modelado</div>
    <div class="lg"><div class="ld" style="background:var(--cam)"></div>CAM</div>
    <div class="lg"><div class="ld" style="background:var(--coo)"></div>Coordinación</div>
    <div class="lg"><div class="ld" style="background:var(--obr)"></div>Obra</div>
    <div class="leg-sep"></div>
    <div class="leg-ot"><div class="ld" style="background:var(--red)"></div>+9H en turno</div>
  </div>

  <div class="main">
    <div>
      <div class="sh"><span class="sp pl">Planta</span><div class="sl"></div><span class="sc" id="sc-pl">0</span></div>
      <div class="grid grid-pl" id="tv-planta"></div>
    </div>
    <div>
      <div class="sh"><span class="sp of">Oficina</span><div class="sl"></div><span class="sc" id="sc-of">0</span></div>
      <div class="grid grid-of" id="tv-oficina"></div>
    </div>
  </div>

  <div class="pf">
    <div class="pf-hdr">
      <div class="pf-title">Proyectos activos</div>
      <div class="pf-line"></div>
    </div>
    <div class="lanes" id="tv-lanes"></div>
  </div>
</div>

<script>
const FLAG_KEY = 'planta_publica_auth';

// ── Init ─────────────────────────────────────────────────────────────────────
if (localStorage.getItem(FLAG_KEY) === '1') {
  mostrarDash();
}

// ── Login ────────────────────────────────────────────────────────────────────
async function _loginPublico() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  const btn = document.getElementById('pw-btn');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('pw-err').textContent = '';
  try {
    const r = await fetch('/api/tiempos?action=login-publico', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw })
    }).then(res => res.json());
    if (r.ok) {
      localStorage.setItem(FLAG_KEY, '1');
      mostrarDash();
    } else {
      document.getElementById('pw-err').textContent = 'Contraseña incorrecta';
    }
  } catch(e) {
    document.getElementById('pw-err').textContent = 'Error de conexión';
  } finally {
    btn.disabled = false; btn.textContent = 'ENTRAR';
  }
}

// ── Mostrar dashboard ─────────────────────────────────────────────────────────
function mostrarDash() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-dash').style.display = 'block';
  cargarSnapshot();
  setInterval(cargarSnapshot, 60000);
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function cargarSnapshot() {
  try {
    const r = await fetch('/api/tiempos?action=dashboard-snapshot').then(res => res.json());
    if (r.error) throw new Error(r.error);
    document.getElementById('tv-err').style.display = 'none';
    renderSnapshot(r);
  } catch(e) {
    document.getElementById('tv-err').style.display = '';
  }
}

// ── Centro map ───────────────────────────────────────────────────────────────
const CM = {
  COLOCACION:   {css:'col', chip:'ch-col', badge:'bb-col', color:'var(--col)'},
  ARMADO:       {css:'arm', chip:'ch-arm', badge:'bb-arm', color:'var(--arm)'},
  CORTE:        {css:'cor', chip:'ch-cor', badge:'bb-cor', color:'var(--cor)'},
  MODELADO:     {css:'mod', chip:'ch-mod', badge:'bb-mod', color:'var(--mod)'},
  CAM:          {css:'cam', chip:'ch-cam', badge:'bb-cam', color:'var(--cam)'},
  COORDINACION: {css:'coo', chip:'ch-coo', badge:'bb-coo', color:'var(--coo)'},
  OBRA:         {css:'obr', chip:'ch-obr', badge:'bb-obr', color:'var(--obr)'},
  ENCHAPADO:    {css:'mod', chip:'ch-mod', badge:'bb-mod', color:'var(--mod)'},
  REVISION:     {css:'arm', chip:'ch-arm', badge:'bb-arm', color:'var(--arm)'},
  HERRERIA:     {css:'cor', chip:'ch-cor', badge:'bb-cor', color:'var(--cor)'},
  ELECTRICA:    {css:'cam', chip:'ch-cam', badge:'bb-cam', color:'var(--cam)'},
  MACIZO:       {css:'col', chip:'ch-col', badge:'bb-col', color:'var(--col)'},
  DESCANSO:     {css:'coo', chip:'ch-coo', badge:'bb-coo', color:'var(--coo)'},
};
function getCM(centroLabel) {
  if (!centroLabel) return CM.COORDINACION;
  const k = centroLabel.toUpperCase().split('/')[0].trim();
  return CM[k] || CM.COORDINACION;
}

function fmtMin(m) {
  const h = Math.floor(m/60), mm = m % 60;
  return h > 0 ? `${h}H ${String(mm).padStart(2,'0')}M` : `${mm}M`;
}

function buildCard(op) {
  const label = (op.centro_label || op.centro || '').toUpperCase();
  const m = getCM(label);
  const mins = op.tiempo_minutos || 0;
  const ot = mins >= 540;
  const hasMeta = op.proyecto?.cliente && op.proyecto.cliente !== '—';
  const tipo = op.mueble?.codigo || '';
  const cli = hasMeta ? op.proyecto.cliente : '—';
  const odfStr = op.proyecto?.odf || '';
  const muebleStr = op.mueble?.nombre || '';
  const linea3 = hasMeta
    ? [odfStr, muebleStr].filter(Boolean).join('  ·  ')
    : 'Coordinación general';
  const centroDisplay = op.centro_label || label;
  return `<div class="card cc-${m.css}">
    <div class="cr1">
      <div class="cname">${op.nombre}</div>
      <div class="ctime${ot?' ot':''}">${fmtMin(mins)}</div>
    </div>
    <div class="cr2">
      <div class="ccli">${cli}</div>
      ${tipo ? `<span class="csep">·</span><div class="ctipo">${tipo}</div>` : ''}
    </div>
    <div class="cmueble">${linea3}</div>
    <div class="cr4"><span class="cbadge ${m.badge}">${centroDisplay}</span></div>
  </div>`;
}

function buildLane(proy, maxChips) {
  const pct = Math.round((proy.chips.length / maxChips) * 100);
  const color = proy.color;
  const chips = proy.chips.map(ch => {
    const cm = getCM(ch.c);
    return `<div class="chip ${cm.chip}">${ch.l}</div>`;
  }).join('');
  return `<div class="lane">
    <div class="li">
      <div class="li-cli">${proy.cli}</div>
      <div class="li-odf">${proy.odf}</div>
    </div>
    <div class="lt">${chips}</div>
    <div class="lr">
      <div class="lr-bar">
        <div class="lr-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div class="lr-n" style="color:${color}">${proy.chips.length}</div>
    </div>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSnapshot(data) {
  const { counters, operarios, timestamp } = data;

  const visibles = (operarios || []).filter(op => op.estado !== 'ausente');
  const planta  = visibles.filter(op => op.rol_app === 'operario' && op.estado !== 'sin_tarea');
  const oficina = visibles.filter(op => op.rol_app !== 'operario' && op.estado !== 'sin_tarea');
  const enTarea = visibles.filter(op => op.estado === 'en_tarea');
  const overtime = enTarea.filter(op => (op.tiempo_minutos||0) >= 540);

  // Counters
  document.getElementById('cnt-tarea').textContent = counters.en_tarea || 0;
  document.getElementById('cnt-sin').textContent   = counters.sin_tarea || 0;
  document.getElementById('cnt-ot').textContent    = overtime.length;

  // Cards
  document.getElementById('tv-planta').innerHTML  = planta.map(buildCard).join('') || '<div style="color:var(--tx3);font-size:12px;padding:8px;">Sin actividad</div>';
  document.getElementById('tv-oficina').innerHTML = oficina.map(buildCard).join('') || '';
  document.getElementById('sc-pl').textContent = planta.length;
  document.getElementById('sc-of').textContent = oficina.length;

  // Proyectos lanes
  const proyMap = {};
  enTarea.forEach(op => {
    const odf = op.proyecto?.odf;
    if (!odf) return;
    if (!proyMap[odf]) {
      proyMap[odf] = {
        cli: op.proyecto?.cliente || '—',
        odf,
        color: getCM((op.centro_label||'').toUpperCase()).color,
        chips: []
      };
    }
    const apellido = op.nombre.split(' ').slice(-1)[0];
    const inicial = op.nombre[0];
    proyMap[odf].chips.push({
      l: `${inicial}. ${apellido}`,
      c: (op.centro_label || op.centro || '').toUpperCase()
    });
  });
  const proyList = Object.values(proyMap);
  document.getElementById('cnt-proy').textContent = proyList.length;
  const maxChips = Math.max(...proyList.map(p=>p.chips.length), 1);
  document.getElementById('tv-lanes').innerHTML = proyList.map(p => buildLane(p, maxChips)).join('');
}

// ── Clock ────────────────────────────────────────────────────────────────────
const DAYS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MNAMES=['ene','feb','mar','abr','may','jun','jul','ago','set','oct','nov','dic'];
function tickClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  const el = document.getElementById('tv-clock');
  const dl = document.getElementById('tv-date');
  if (el) el.textContent = `${hh}:${mm}:${ss}`;
  if (dl) dl.textContent = `${DAYS[d.getDay()]} ${d.getDate()} ${MNAMES[d.getMonth()]} ${d.getFullYear()}`;
}
tickClock(); setInterval(tickClock, 1000);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch((err) => {
        console.warn('SW registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
