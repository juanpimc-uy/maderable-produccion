<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBLE · TV Planta</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0a0c; --surf:#111114; --brd:#1e1e22;
    --tx1:#f0f0f2; --tx2:#a0a0aa; --tx3:#555560;
    --col:#3b82f6; --arm:#f59e0b; --cor:#ef4444;
    --mod:#8b5cf6; --cam:#06b6d4; --coo:#6b7280;
    --obr:#10b981; --red:#ef4444; --grn:#22c55e;
  }
  body{background:var(--bg);color:var(--tx1);font-family:'Barlow Condensed',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ── Login ── */
  #screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .login-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:40px;width:100%;max-width:360px;}
  .login-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--arm);letter-spacing:4px;text-align:center;margin-bottom:6px;}
  .login-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:2px;text-align:center;margin-bottom:28px;}
  .login-input{width:100%;background:#0d0d10;border:1px solid var(--brd);border-radius:6px;padding:12px 14px;color:var(--tx1);font-size:15px;outline:none;margin-bottom:12px;transition:border-color .15s;font-family:'IBM Plex Mono',monospace;letter-spacing:3px;}
  .login-input:focus{border-color:var(--arm);}
  .login-btn{width:100%;background:var(--arm);color:#0a0a0c;border:none;border-radius:6px;padding:13px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:opacity .15s;}
  .login-btn:hover{opacity:.85;}
  .login-btn:disabled{opacity:.5;cursor:not-allowed;}
  .login-error{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);text-align:center;min-height:18px;margin-top:10px;}

  /* ── Header ── */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 28px;background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--arm);display:flex;align-items:center;gap:10px;}
  .logo-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:1.5px;margin-top:2px;}
  .live{width:8px;height:8px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  .hdr-stats{display:flex;gap:28px;}
  .st{text-align:center;}
  .st-n{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;}
  .st-l{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
  .clock{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--tx1);text-align:right;letter-spacing:2px;}
  .date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);text-align:right;letter-spacing:1px;margin-top:2px;}

  /* ── Legend ── */
  .leg{display:flex;align-items:center;gap:16px;padding:6px 28px;background:var(--surf);border-bottom:1px solid var(--brd);flex-wrap:wrap;flex-shrink:0;}
  .lg{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:.5px;}
  .ld{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .leg-sep{width:1px;height:14px;background:var(--brd);margin:0 4px;}
  .leg-ot{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.5px;}

  /* ── Main: flex column, grid fills remaining space ── */
  .main{display:flex;flex-direction:column;flex:1;min-height:0;padding:10px 18px 10px;overflow:hidden;}
  .grid{display:grid;flex:1;min-height:0;gap:6px;align-content:stretch;}

  /* ── Cards ── */
  .card{background:var(--surf);border:1px solid var(--brd);border-radius:.4em;padding:.35em .5em;border-left:.18em solid var(--tx3);display:flex;flex-direction:column;justify-content:center;overflow:hidden;min-height:0;}
  .cc-col{border-left-color:var(--col);} .cc-arm{border-left-color:var(--arm);} .cc-cor{border-left-color:var(--cor);}
  .cc-mod{border-left-color:var(--mod);} .cc-cam{border-left-color:var(--cam);} .cc-coo{border-left-color:var(--coo);}
  .cc-obr{border-left-color:var(--obr);}
  .cr1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.1em;}
  .cname{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px;line-height:1.1;min-width:0;flex:1;}
  .nl{display:block;font-family:'Barlow Condensed',sans-serif;font-size:1.55em;font-weight:700;text-transform:uppercase;letter-spacing:.5px;line-height:.96;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ctime{font-family:'IBM Plex Mono',monospace;font-size:.6em;font-weight:500;color:var(--tx2);flex-shrink:0;margin-left:.3em;}
  .ctime.ot{color:var(--red);font-weight:600;}
  .cr2{display:flex;align-items:baseline;gap:.15em;margin-bottom:.05em;}
  .ccli{font-family:'Barlow Condensed',sans-serif;font-size:.72em;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .csep{color:var(--tx3);font-size:.5em;}
  .ctipo{font-family:'IBM Plex Mono',monospace;font-size:.72em;color:var(--arm);font-weight:500;flex-shrink:0;}
  .cmueble{font-family:'IBM Plex Mono',monospace;font-size:.72em;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.15em;}
  .cr4{display:flex;align-items:center;gap:.3em;}
  .cbadge{font-family:'IBM Plex Mono',monospace;font-size:.45em;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:.15em .4em;border-radius:3px;background:#1a1a1e;color:var(--tx3);}
  .bb-col{background:rgba(59,130,246,.12);color:var(--col);} .bb-arm{background:rgba(245,158,11,.12);color:var(--arm);}
  .bb-cor{background:rgba(239,68,68,.12);color:var(--cor);} .bb-mod{background:rgba(139,92,246,.12);color:var(--mod);}
  .bb-cam{background:rgba(6,182,212,.12);color:var(--cam);} .bb-coo{background:rgba(107,114,128,.12);color:var(--coo);}
  .bb-obr{background:rgba(16,185,129,.12);color:var(--obr);}
  .entrada-chip{font-family:'IBM Plex Mono',monospace;font-size:.66em;color:var(--tx3);letter-spacing:.5px;margin-left:auto;white-space:nowrap;flex-shrink:0;}
  .entrada-chip b{color:var(--tx1);font-weight:700;}

  /* ── Dashboard container ── */
  #screen-dash{display:none;flex-direction:column;flex:1;min-height:0;}
  #tv-err{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);display:none;padding:10px 28px;}
</style>
</head>
<body>

<!-- ═══ LOGIN ════════════════════════════════════════════════════════════════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">⬡ MBLE</div>
    <div class="login-sub">TV PLANTA · ACCESO INTERNO</div>
    <input id="pw-input" class="login-input" type="password" placeholder="contraseña"
      onkeydown="if(event.key==='Enter')_loginPublico()">
    <button class="login-btn" id="pw-btn" onclick="_loginPublico()">ENTRAR</button>
    <div class="login-error" id="pw-err"></div>
  </div>
</div>

<!-- ═══ DASHBOARD ════════════════════════════════════════════════════════════ -->
<div id="screen-dash">
  <div id="tv-err">⚠ Reconectando...</div>

  <header class="hdr">
    <div>
      <div class="logo"><div class="live"></div>MBLE · TV PLANTA</div>
      <div class="logo-sub">Solo operarios</div>
    </div>
    <div class="hdr-stats">
      <div class="st"><div class="st-n" style="color:var(--arm)" id="cnt-tarea">0</div><div class="st-l">En Tarea</div></div>
      <div class="st"><div class="st-n" style="color:var(--tx3)" id="cnt-sin">0</div><div class="st-l">Sin Tarea</div></div>
      <div class="st"><div class="st-n" style="color:var(--red)" id="cnt-ot">0</div><div class="st-l">+9H turno</div></div>
    </div>
    <div><div class="clock" id="tv-clock">--:--:--</div><div class="date" id="tv-date">—</div></div>
  </header>

  <div class="leg">
    <div class="lg"><div class="ld" style="background:var(--col)"></div>Colocación</div>
    <div class="lg"><div class="ld" style="background:var(--arm)"></div>Armado</div>
    <div class="lg"><div class="ld" style="background:var(--cor)"></div>Corte</div>
    <div class="lg"><div class="ld" style="background:var(--mod)"></div>Modelado</div>
    <div class="lg"><div class="ld" style="background:var(--cam)"></div>CAM</div>
    <div class="lg"><div class="ld" style="background:var(--coo)"></div>Coordinación</div>
    <div class="lg"><div class="ld" style="background:var(--obr)"></div>Obra</div>
    <div class="leg-sep"></div>
    <div class="leg-ot"><div class="ld" style="background:var(--red)"></div>+9H en turno</div>
  </div>

  <div class="main">
    <div class="grid" id="tv-grid"></div>
  </div>
</div>

<script>
const FLAG_KEY = 'planta_publica_auth';

// ── Init ─────────────────────────────────────────────────────────────────────
if (localStorage.getItem(FLAG_KEY) === '1') {
  mostrarDash();
}

// ── Login ────────────────────────────────────────────────────────────────────
async function _loginPublico() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  const btn = document.getElementById('pw-btn');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('pw-err').textContent = '';
  try {
    const r = await fetch('/api/tiempos?action=login-publico', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw })
    }).then(res => res.json());
    if (r.ok) {
      localStorage.setItem(FLAG_KEY, '1');
      mostrarDash();
    } else {
      document.getElementById('pw-err').textContent = 'Contraseña incorrecta';
    }
  } catch(e) {
    document.getElementById('pw-err').textContent = 'Error de conexión';
  } finally {
    btn.disabled = false; btn.textContent = 'ENTRAR';
  }
}

// ── Mostrar dashboard ─────────────────────────────────────────────────────────
function mostrarDash() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-dash').style.display = 'flex';
  cargarSnapshot();
  setInterval(cargarSnapshot, 60000);
  mantenerPantallaActiva();
}

async function mantenerPantallaActiva() {
  try {
    if ('wakeLock' in navigator) {
      let wakeLock = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible') {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      });
    }
  } catch(e) {}
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function cargarSnapshot() {
  try {
    const r = await fetch('/api/tiempos?action=dashboard-snapshot').then(res => res.json());
    if (r.error) throw new Error(r.error);
    document.getElementById('tv-err').style.display = 'none';
    renderSnapshot(r);
  } catch(e) {
    document.getElementById('tv-err').style.display = '';
  }
}

// ── Centro map ───────────────────────────────────────────────────────────────
const CM = {
  COLOCACION:   {css:'col', chip:'ch-col', badge:'bb-col', color:'var(--col)'},
  ARMADO:       {css:'arm', chip:'ch-arm', badge:'bb-arm', color:'var(--arm)'},
  CORTE:        {css:'cor', chip:'ch-cor', badge:'bb-cor', color:'var(--cor)'},
  MODELADO:     {css:'mod', chip:'ch-mod', badge:'bb-mod', color:'var(--mod)'},
  CAM:          {css:'cam', chip:'ch-cam', badge:'bb-cam', color:'var(--cam)'},
  COORDINACION: {css:'coo', chip:'ch-coo', badge:'bb-coo', color:'var(--coo)'},
  OBRA:         {css:'obr', chip:'ch-obr', badge:'bb-obr', color:'var(--obr)'},
  ENCHAPADO:    {css:'mod', chip:'ch-mod', badge:'bb-mod', color:'var(--mod)'},
  REVISION:     {css:'arm', chip:'ch-arm', badge:'bb-arm', color:'var(--arm)'},
  HERRERIA:     {css:'cor', chip:'ch-cor', badge:'bb-cor', color:'var(--cor)'},
  ELECTRICA:    {css:'cam', chip:'ch-cam', badge:'bb-cam', color:'var(--cam)'},
  MACIZO:       {css:'col', chip:'ch-col', badge:'bb-col', color:'var(--col)'},
  DESCANSO:     {css:'coo', chip:'ch-coo', badge:'bb-coo', color:'var(--coo)'},
};
function getCM(centroLabel) {
  if (!centroLabel) return CM.COORDINACION;
  const k = centroLabel.toUpperCase().split('/')[0].trim();
  return CM[k] || CM.COORDINACION;
}

function fmtMin(m) {
  const h = Math.floor(m/60), mm = m % 60;
  return h > 0 ? `${h}H ${String(mm).padStart(2,'0')}M` : `${mm}M`;
}

function cncBadge(c) {
  const t = fmtMin(c.minutos || 0);
  if (c.estado === 'cortando')
    return `<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);border-radius:4px;padding:2px 8px;">
      <span style="width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse-dot 1.5s infinite;"></span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:#4ade80;letter-spacing:.5px;">CORTANDO #${c.placa_numero || '?'} · ${t}</span>
    </span>`;
  return `<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.25);border-radius:4px;padding:2px 8px;">
    <span style="width:7px;height:7px;border-radius:50%;background:#f59e0b;"></span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:#f59e0b;letter-spacing:.5px;">PARADO · ${t}</span>
  </span>`;
}

// ── Layout helpers ───────────────────────────────────────────────────────────
const CENTRO_ORDER = ['CORTE','ENCHAPADO','ARMADO','COLOCACION','HERRERIA','ELECTRICA','MACIZO'];

function computeCols(n){
  if(n<=1)return 1; if(n<=2)return 2; if(n<=3)return 3;
  if(n===4)return 2; if(n<=6)return 3; if(n<=8)return 4;
  if(n===9)return 3; if(n===10)return 5; if(n<=12)return 4;
  return 5;
}

function nameLines(nombre) {
  const parts = (nombre || '').trim().split(/\s+/);
  if (parts.length <= 1) return `<span class="nl">${nombre || ''}</span><span class="nl">&nbsp;</span>`;
  return `<span class="nl">${parts[0]}</span><span class="nl">${parts.slice(1).join(' ')}</span>`;
}

function fmtEntrada(entrada) {
  if (!entrada) return '';
  try {
    const t = new Date(entrada).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/Montevideo'});
    return `<span class="entrada-chip">ENTRÓ <b>${t}</b></span>`;
  } catch(e) { return ''; }
}

function buildCard(op) {
  const esAusente = op.estado === 'ausente';

  if (op.estado === 'sin_tarea') {
    const centro = op.ultimo_centro_label || '—';
    const cli = op.ultimo_proyecto?.nombre || '—';
    const muebleStr = op.ultimo_mueble?.nombre || '—';
    return `<div class="card" style="border-left-color:var(--red);background:rgba(239,68,68,.08);">
      <div class="cr1">
        <div class="cname">${nameLines(op.nombre)}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:.45em;background:rgba(239,68,68,.2);color:var(--red);padding:.15em .4em;border-radius:3px;font-weight:600;white-space:nowrap;">SIN TAREA</div>
      </div>
      <div class="cr2"><div class="ccli">${cli}</div></div>
      <div class="cmueble">${muebleStr}</div>
      <div class="cr4"><span class="cbadge" style="background:rgba(239,68,68,.1);color:var(--red);">—</span>${fmtEntrada(op.entrada)}</div>
    </div>`;
  }

  if (esAusente) {
    const centro = op.ultimo_centro_label || '—';
    const m = getCM(centro.toUpperCase());
    const cli = op.ultimo_proyecto?.nombre || '—';
    const muebleStr = op.ultimo_mueble?.nombre || '—';
    return `<div class="card cc-${m.css}" style="opacity:0.35;filter:saturate(0.3);">
      <div class="cr1">
        <div class="cname">${nameLines(op.nombre)}</div>
        <div style="font-size:.45em;color:#3a3d47;background:#131520;padding:.15em .4em;border-radius:3px;font-family:'IBM Plex Mono',monospace;white-space:nowrap;">AUSENTE</div>
      </div>
      <div class="cr2"><div class="ccli">${cli}</div></div>
      <div class="cmueble">${muebleStr}</div>
      <div class="cr4"><span class="cbadge ${m.badge}">${centro}</span></div>
    </div>`;
  }

  const label = (op.centro_label || op.centro || '').toUpperCase();
  const m = getCM(label);
  const mins = op.tiempo_minutos || 0;
  const ot = mins >= 540;
  const hasMeta = op.proyecto?.cliente && op.proyecto.cliente !== '—';
  const tipo = op.mueble?.codigo || '';
  const cli = hasMeta ? op.proyecto.cliente : '—';
  const odfStr = op.proyecto?.odf || '';
  const muebleStr = op.mueble?.nombre || '';
  const linea3 = hasMeta
    ? [odfStr, muebleStr].filter(Boolean).join('  ·  ')
    : 'Coordinación general';
  const centroDisplay = op.centro_label || label;
  return `<div class="card cc-${m.css}">
    <div class="cr1">
      <div class="cname">${nameLines(op.nombre)}</div>
      <div class="ctime${ot?' ot':''}">${fmtMin(mins)}</div>
    </div>
    <div class="cr2">
      <div class="ccli">${cli}</div>
      ${tipo ? `<span class="csep">·</span><div class="ctipo">${tipo}</div>` : ''}
    </div>
    <div class="cmueble">${linea3}</div>
    <div class="cr4"><span class="cbadge ${m.badge}">${centroDisplay}</span>${op.cnc ? cncBadge(op.cnc) : ''}${fmtEntrada(op.entrada)}</div>
  </div>`;
}

// ── Scale helpers ────────────────────────────────────────────────────────────
function applyScale() {
  const grid = document.getElementById('tv-grid');
  if (!grid) return;
  const rect = grid.getBoundingClientRect();
  if (!rect.height || !rect.width) return;
  const style = getComputedStyle(grid);
  const cols = parseInt(style.gridTemplateColumns.split(' ').length) || 1;
  const rows = parseInt(style.gridTemplateRows.split(' ').length) || 1;
  const cellW = rect.width / cols;
  const cellH = rect.height / rows;
  const base = Math.min(cellH / 7, cellW / 15);
  grid.style.fontSize = Math.max(15, Math.min(46, base)) + 'px';
}

function fitNames(){
  const lines = [...document.querySelectorAll('#tv-grid .nl')];
  if(!lines.length) return;
  lines.forEach(el => el.style.fontSize = '');            // volver al base del CSS (.nl = 1.55em)
  const size = parseFloat(getComputedStyle(lines[0]).fontSize);
  let ratio = Infinity;
  lines.forEach(el => { if(el.scrollWidth > 0) ratio = Math.min(ratio, el.clientWidth / el.scrollWidth); });
  if(!isFinite(ratio) || ratio <= 0) return;
  let target = Math.min(size * ratio, size);              // tope = base; achica al más exigente
  target = Math.max(12, target);
  lines.forEach(el => el.style.fontSize = target + 'px'); // todos al mismo tamaño
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSnapshot(data) {
  const { counters, operarios } = data;
  const allOps = (operarios || []).filter(op => op.rol_app === 'operario');
  const visibles = allOps.filter(op => op.estado !== 'ausente');
  const ausentes = allOps.filter(op => op.estado === 'ausente');

  function centroRank(op) {
    const c = (op.centro_label || op.centro || '').toUpperCase().split('/')[0].trim();
    const idx = CENTRO_ORDER.indexOf(c);
    return idx >= 0 ? idx : CENTRO_ORDER.length;
  }

  // Sort activos: by centro order, then by ODF
  const activos = visibles.slice().sort((a, b) => {
    const ra = centroRank(a), rb = centroRank(b);
    if (ra !== rb) return ra - rb;
    const oa = (a.proyecto?.odf || a.proyecto?.cliente || '').toUpperCase();
    const ob = (b.proyecto?.odf || b.proyecto?.cliente || '').toUpperCase();
    return oa.localeCompare(ob);
  });

  const todos = [...activos, ...ausentes];
  const n = todos.length || 1;

  // Counters — only operarios
  const enTarea = visibles.filter(op => op.estado === 'en_tarea');
  const sinTarea = visibles.filter(op => op.estado === 'sin_tarea');
  const overtime = enTarea.filter(op => (op.tiempo_minutos||0) >= 540);
  document.getElementById('cnt-tarea').textContent = enTarea.length;
  document.getElementById('cnt-sin').textContent   = sinTarea.length;
  document.getElementById('cnt-ot').textContent    = overtime.length;

  // Grid sizing
  const grid = document.getElementById('tv-grid');
  const cols = computeCols(n);
  const rows = Math.ceil(n / cols);
  grid.style.gridTemplateColumns = `repeat(${cols},1fr)`;
  grid.style.gridTemplateRows    = `repeat(${rows},1fr)`;

  // Render cards
  grid.innerHTML = todos.map(buildCard).join('') || '<div style="color:var(--tx3);font-size:14px;padding:8px;">Sin operarios</div>';

  // Scale
  applyScale();
  fitNames();
}

window.addEventListener('resize', () => {
  applyScale();
  fitNames();
});

// ── Clock ────────────────────────────────────────────────────────────────────
const DAYS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MNAMES=['ene','feb','mar','abr','may','jun','jul','ago','set','oct','nov','dic'];
function tickClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  const el = document.getElementById('tv-clock');
  const dl = document.getElementById('tv-date');
  if (el) el.textContent = `${hh}:${mm}:${ss}`;
  if (dl) dl.textContent = `${DAYS[d.getDay()]} ${d.getDate()} ${MNAMES[d.getMonth()]} ${d.getFullYear()}`;
}
tickClock(); setInterval(tickClock, 1000);
</script>
