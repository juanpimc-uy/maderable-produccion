<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<script src="/js/supabase-config.js"></script>
<script src="/js/auth.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maderable · MRP Armado SO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --bg:#0f0f0f;--panel:#1e1e1e;--card:#252525;--border:#2a2a2a;--borderL:#333;
  --text:#e8e8e8;--muted:#888;--faint:#1a1a1a;
  --accent:#FFD600;--amber:#FFD600;--green:#3DD68C;--red:#F05C5C;--blue:#5B8DEF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.mono{font-family:'Space Mono',monospace;}

/* Sidebar */
.sidebar{width:200px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--amber);letter-spacing:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;font-size:13px;color:var(--muted);border-left:3px solid transparent;transition:all .15s;user-select:none;}
.nav-item:hover{background:var(--faint);color:var(--text);}
.nav-item.active{background:rgba(245,166,35,.08);color:var(--amber);border-left-color:var(--amber);font-weight:600;}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}

/* Layout */
.shell{display:flex;height:100vh;overflow:hidden;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.content{flex:1;overflow-y:auto;padding:24px;}

/* Buttons */
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:opacity .15s;white-space:nowrap;}
.btn-amber{background:var(--amber);color:#0f0f0f;}
.btn-amber:hover{opacity:.85;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--amber);color:var(--text);}
.btn-sm{padding:5px 10px;font-size:9px;}
.btn-danger{background:var(--red);color:#fff;}

/* Page */
.page{max-width:1100px;margin:0 auto;}

/* Filtros */
.filtros{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.tab-bar{display:flex;gap:0;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.tab-btn{padding:8px 14px;background:transparent;border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{background:var(--amber);color:#0f0f0f;}
select.filtro-select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 12px;font-family:'Space Mono',monospace;font-size:10px;outline:none;}
select.filtro-select:focus{border-color:var(--amber);}
.toggle-wrap{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;}
.toggle-wrap input{accent-color:var(--amber);}

/* Contador */
.contador{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:16px;}

/* Cards SO — estilo recepciones */
.so-card{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #1a1a1a;transition:background .15s;flex-wrap:wrap;}
.so-card:last-child{border-bottom:none;}
.so-card.expanded{background:rgba(255,214,0,.03);border-bottom:1px solid var(--border);}
.so-card.oculta{opacity:.45;}
.so-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.so-dot.pendiente{background:#ef4444;}
.so-dot.parcial{background:#FFD600;}
.so-dot.completo{background:#22c55e;}
.so-info{flex:1;min-width:0;}
.so-num{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--amber);}
.odf-badge{background:#1e1e1e;border:1px solid #FFD600;color:#FFD600;font-family:monospace;font-size:9px;padding:2px 7px;border-radius:3px;letter-spacing:.5px;margin-left:8px;}
.so-mueble{font-size:13px;font-weight:600;color:var(--text);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.so-meta{font-family:'Space Mono',monospace;font-size:12px;color:#999;margin-top:3px;}
.so-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.so-estado-block{text-align:right;}
.so-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:4px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.so-badge.pendiente{color:#ef4444;background:rgba(239,68,68,.12);}
.so-badge.parcial{color:#FFD600;background:rgba(255,214,0,.12);}
.so-badge.completo{color:#22c55e;background:rgba(34,197,94,.12);}
.so-progreso{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);display:block;margin-top:2px;}
.so-actions{display:flex;align-items:center;gap:4px;}
.so-actions button{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .15s;}
.so-actions button:hover{border-color:var(--amber);color:var(--text);}
.btn-marcar-todo{background:#22c55e;color:#0f0f0f;border:none;border-radius:4px;padding:5px 14px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:background .15s;}
.btn-marcar-todo:hover{background:#16a34a;}

/* Detalle expandido */
.so-detalle{display:none;margin-top:10px;padding-top:12px;border-top:1px solid var(--border);width:100%;}
.so-card.expanded .so-detalle{display:block;}

/* Tabla de líneas */
.lineas-table{width:100%;border-collapse:collapse;font-size:12px;}
.lineas-table th{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);}
.lineas-table td{padding:8px 10px;border-bottom:1px solid var(--faint);vertical-align:middle;}
.lineas-table tr:hover td{background:rgba(255,255,255,.02);}
.linea-input{width:60px;background:var(--faint);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:5px 8px;font-family:'Space Mono',monospace;font-size:12px;text-align:center;outline:none;}
.linea-input:focus{border-color:var(--amber);}
.linea-input.done{border-color:var(--green);}
.linea-input.partial{border-color:var(--amber);}
.linea-badge{display:inline-flex;padding:2px 8px;border-radius:3px;font-family:'Space Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.linea-badge.armado{color:#22c55e;background:rgba(34,197,94,.12);}
.linea-badge.parcial{color:var(--amber);background:rgba(255,214,0,.12);}
.linea-badge.pendiente{color:#555;background:rgba(85,85,85,.12);}
.chk-todo{accent-color:var(--amber);cursor:pointer;width:15px;height:15px;vertical-align:middle;}

/* Eliminadas */
.eliminadas-toggle{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;margin-top:10px;user-select:none;}
.eliminadas-toggle:hover{color:var(--amber);}
.fila-eliminada td{background:#111 !important;opacity:.55;}

/* Proyecto selector — combo */
.proy-selector{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.proy-selector label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.proy-combo{position:relative;flex:1;}
.proy-combo-input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:7px 28px 7px 10px;color:var(--text);font-family:'Space Mono',monospace;font-size:11px;outline:none;}
.proy-combo-input:focus{border-color:var(--amber);}
.proy-combo-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;line-height:1;}
.proy-combo-clear:hover{color:var(--text);}
.proy-combo-list{display:none;position:absolute;top:100%;left:0;right:0;max-height:180px;overflow-y:auto;background:var(--panel);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;z-index:10;}
.proy-combo-list.open{display:block;}
.proy-combo-item{padding:6px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--faint);}
.proy-combo-item:hover{background:rgba(255,214,0,.08);}
.proy-combo-item.active{background:rgba(255,214,0,.15);}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,214,0,.3);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}

/* Responsive */
@media(max-width:700px){
  .sidebar{display:none;}
  .content{padding:12px;}
  .filtros{flex-direction:column;align-items:stretch;}
  .so-card{flex-wrap:wrap;gap:10px;}
  .so-right{width:100%;justify-content:flex-end;}
  .lineas-table{font-size:11px;}
  .linea-input{width:48px;}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ══════════════════════════════════════════════════════════════ -->
<div id="screen-login">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:40px;width:100%;max-width:360px;">
      <div style="font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--amber);letter-spacing:3px;text-align:center;margin-bottom:6px;">⬡ MADERABLE</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-align:center;margin-bottom:28px;">ARMADO SO — PLANTA</div>
      <input id="pw-input" type="password" placeholder="contraseña"
        style="width:100%;background:var(--faint);border:1px solid var(--border);border-radius:6px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px;font-family:'Space Mono',monospace;letter-spacing:3px;"
        onkeydown="if(event.key==='Enter')_login()">
      <button onclick="_login()" style="width:100%;background:var(--amber);color:#0f0f0f;border:none;border-radius:6px;padding:13px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;">INGRESAR →</button>
    </div>
  </div>
</div>

<!-- ═══ APP ════════════════════════════════════════════════════════════════ -->
<div id="screen-app" style="display:none;">
<div class="shell">

<script src="sidebar.js"></script>
<div id="sidebar-root"></div>

<!-- ═══ MAIN ════════════════════════════════════════════════════════════ -->
<div class="main">
<div class="content">
<div class="page">

  <!-- FILTROS -->
  <div class="filtros">
    <div style="display:flex;align-items:center;gap:12px;flex:1;flex-wrap:wrap;">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="todas" onclick="setTab(this)">TODAS</button>
        <button class="tab-btn" data-tab="pendiente" onclick="setTab(this)">PENDIENTES</button>
        <button class="tab-btn" data-tab="parcial" onclick="setTab(this)">PARCIALES</button>
        <button class="tab-btn" data-tab="completo" onclick="setTab(this)">COMPLETAS</button>
      </div>
      <select class="filtro-select" id="filtro-obra" onchange="aplicarFiltros()">
        <option value="">TODAS LAS OBRAS</option>
      </select>
      <label class="toggle-wrap">
        <input type="checkbox" id="toggle-ocultas" onchange="aplicarFiltros()"> VER OCULTAS
      </label>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="cargarTodo()">&#8634; ACTUALIZAR</button>
  </div>

  <!-- CONTADOR -->
  <div class="contador" id="contador">—</div>

  <!-- LISTA DE CARDS -->
  <div id="lista-sos"></div>

</div>
</div><!-- /content -->
</div><!-- /main -->

<script>
// ═══════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════
const usuario = AUTH.usuarioActual();
if (!usuario) { window.location.href = '/admin.html'; }
const EMPLEADO_ID = usuario?.id;

const API = '/api/armados';
function headers() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + EMPLEADO_ID };
}
async function apiGet(action, params = '') {
  const res = await fetch(`${API}?action=${action}${params}`, { headers: headers() });
  return res.json();
}
async function apiPost(action, body) {
  const res = await fetch(`${API}?action=${action}`, { method: 'POST', headers: headers(), body: JSON.stringify(body) });
  return res.json();
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let allSos = [];
let proyectos = [];
let expandedId = null;
let currentTab = 'todas';

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function cargarTodo() {
  document.getElementById('lista-sos').innerHTML = '<div style="text-align:center;padding:40px;"><span class="spinner"></span> Cargando SOs desde Zoho...</div>';

  const [sosRes, proysData] = await Promise.all([
    apiGet('listar-sos-zoho'),
    window.sbFetch('proyectos_cache?activo=eq.true&order=nombre&select=id,nombre,numero,cliente_nombre,obra').catch(() => []),
  ]);

  if (sosRes.ok !== undefined && !sosRes.ok) {
    document.getElementById('lista-sos').innerHTML = `<div style="color:var(--red);padding:20px;">Error: ${sosRes.error}</div>`;
    return;
  }

  allSos = sosRes.sos || [];
  proyectos = proysData || [];

  // Poblar dropdown de obras
  const obras = [...new Set(allSos.map(s => s.obra).filter(Boolean))].sort();
  const sel = document.getElementById('filtro-obra');
  sel.innerHTML = '<option value="">TODAS LAS OBRAS</option>' + obras.map(o => `<option value="${o}">${o}</option>`).join('');

  aplicarFiltros();
  cachearObrasMueblesFaltantes();
}

// ═══════════════════════════════════════════════════════════════
// CACHEO BACKGROUND: obra/mueble faltantes
// ═══════════════════════════════════════════════════════════════
async function cachearObrasMueblesFaltantes() {
  const sinCache = allSos.filter(so => !so.obra && !so.mueble).slice(0, 30);
  const LOTE = 5;
  for (let i = 0; i < sinCache.length; i += LOTE) {
    const lote = sinCache.slice(i, i + LOTE);
    await Promise.all(lote.map(async so => {
      try {
        const res = await apiGet('detalle-so-zoho&so_zoho_id=' + so.so_zoho_id);
        if (res.ok) {
          so.obra = res.obra || '';
          so.mueble = res.mueble || '';
          const mEl = document.getElementById('mueble-' + so.so_zoho_id);
          const chipEl = document.getElementById('chip-' + so.so_zoho_id);
          if (mEl && res.mueble) mEl.textContent = res.mueble;
          if (chipEl) {
            const proy = proyectos.find(p => p.id === so.proyecto_id);
            const proyName = proy ? proy.nombre : null;
            const parts = so.proyecto_id && proyName ? [so.cliente_nombre, proyName].filter(Boolean) : [so.cliente_nombre, so.obra].filter(Boolean);
            chipEl.textContent = parts.join(' · ');
          }
        }
      } catch(e) {}
    }));
    await new Promise(r => setTimeout(r, 1000));
  }
}

// ═══════════════════════════════════════════════════════════════
// FILTROS
// ═══════════════════════════════════════════════════════════════
function setTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = btn.dataset.tab;
  aplicarFiltros();
}

function aplicarFiltros() {
  const obraFiltro = document.getElementById('filtro-obra').value;
  const verOcultas = document.getElementById('toggle-ocultas').checked;

  let filtered = allSos.filter(s => {
    if (!verOcultas && s.oculta) return false;
    if (currentTab !== 'todas' && s.estado !== currentTab) return false;
    if (obraFiltro && s.obra !== obraFiltro) return false;
    return true;
  });

  document.getElementById('contador').textContent = `${filtered.length} SOs CONFIRMADAS · desde Zoho`;
  renderCards(filtered);
}

// ═══════════════════════════════════════════════════════════════
// RENDER CARDS
// ═══════════════════════════════════════════════════════════════
function renderCards(sos) {
  const container = document.getElementById('lista-sos');
  if (!sos.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-family:\'Space Mono\',monospace;font-size:11px;">No hay SOs para mostrar</div>';
    return;
  }

  container.innerHTML = sos.map(so => {
    const isExpanded = expandedId === so.so_zoho_id;
    const proyName = so.proyecto_id ? (proyectos.find(p => p.id === so.proyecto_id)?.nombre || so.proyecto_id) : null;
    const metaParts = so.proyecto_id && proyName ? [so.cliente_nombre, proyName].filter(Boolean) : [so.cliente_nombre, so.obra].filter(Boolean);
    const proyBadge = so.proyecto_id ? (proyectos.find(p => p.id === so.proyecto_id)?.nombre || '') : '';
    const odfBadge = proyBadge ? `<span class="odf-badge">${esc(proyBadge)}</span>` : '';

    return `
    <div class="so-card ${isExpanded ? 'expanded' : ''} ${so.oculta ? 'oculta' : ''}" id="card-${so.so_zoho_id}">
      <span class="so-dot ${so.estado}" data-so="${so.so_zoho_id}"></span>
      <div class="so-info">
        <span class="so-num">${so.so_numero}${odfBadge}</span>
        <div class="so-mueble" id="mueble-${so.so_zoho_id}">${so.mueble ? esc(so.mueble) : ''}</div>
        <div class="so-meta" id="chip-${so.so_zoho_id}">${metaParts.join(' · ')}</div>
      </div>
      <div class="so-right">
        <div class="so-estado-block">
          <span class="so-badge ${so.estado}" data-so="${so.so_zoho_id}">${so.estado.toUpperCase()}</span>
          ${so.lineas_total > 0 ? `<span class="so-progreso" data-so="${so.so_zoho_id}">${so.lineas_armadas}/${so.lineas_total} líneas</span>` : ''}
        </div>
        <div class="so-actions">
          <button title="${isExpanded ? 'Colapsar' : 'Expandir'}" onclick="toggleExpand('${so.so_zoho_id}')">${isExpanded ? '&#9660;' : '&#9654;'}</button>
          <button title="Imprimir etiqueta" onclick="imprimirEtiqueta('${so.so_zoho_id}')">&#9113;</button>
          <button title="${so.oculta ? 'Mostrar SO' : 'Ocultar SO'}" onclick="toggleOcultar('${so.so_zoho_id}',${!so.oculta})">${so.oculta ? '&#9673;' : '&#10005;'}</button>
        </div>
      </div>
      <div class="so-detalle" id="detalle-${so.so_zoho_id}" style="width:100%;">
        ${isExpanded ? '<div style="text-align:center;padding:20px;"><span class="spinner"></span></div>' : ''}
      </div>
    </div>`;
  }).join('');

  if (expandedId) cargarDetalle(expandedId);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ═══════════════════════════════════════════════════════════════
// EXPAND / COLLAPSE
// ═══════════════════════════════════════════════════════════════
function toggleExpand(id) {
  if (expandedId === id) {
    expandedId = null;
  } else {
    expandedId = id;
  }
  aplicarFiltros();
}

async function cargarDetalle(soId) {
  const det = document.getElementById('detalle-' + soId);
  if (!det) return;
  det.innerHTML = '<div style="text-align:center;padding:20px;"><span class="spinner"></span> Cargando líneas...</div>';

  const res = await apiGet('detalle-so-zoho', '&so_zoho_id=' + soId);
  if (!res.ok) {
    det.innerHTML = `<div style="color:var(--red);">Error: ${res.error}</div>`;
    return;
  }

  const lineas = res.lineas || [];
  const visibles = lineas.filter(l => !l.eliminada);
  const eliminadas = lineas.filter(l => l.eliminada);

  const so = allSos.find(s => s.so_zoho_id === soId);

  // Guardar mueble y obra del detalle en el objeto local
  if (so) {
    if (res.mueble) {
      so.mueble = res.mueble;
      const mEl = document.getElementById('mueble-' + soId);
      if (mEl) mEl.textContent = res.mueble;
    }
    if (res.obra) {
      so.obra = res.obra;
    }
    // Rearmar meta con datos actualizados
    const proyName = so.proyecto_id ? (proyectos.find(p => p.id === so.proyecto_id)?.nombre || so.proyecto_id) : null;
    const metaParts = so.proyecto_id && proyName ? [so.cliente_nombre, proyName].filter(Boolean) : [so.cliente_nombre, so.obra].filter(Boolean);
    const chipEl = document.getElementById('chip-' + soId);
    if (chipEl) chipEl.textContent = metaParts.join(' · ');
  }

  let html = `<div style="margin-bottom:8px;text-align:right;">
    <button class="btn-marcar-todo" onclick="marcarTodo('${soId}')">&#10003; MARCAR TODO</button>
  </div>
  <table class="lineas-table">
    <thead><tr>
      <th>DESCRIPCION</th><th>TOTAL</th><th>ARMADO</th><th></th><th>ESTADO</th><th></th>
    </tr></thead><tbody>`;

  visibles.forEach(l => {
    const pct = l.cantidad_total > 0 ? l.cantidad_armada / l.cantidad_total : 0;
    const inputClass = pct >= 1 ? 'done' : (l.cantidad_armada > 0 ? 'partial' : '');
    const badgeClass = pct >= 1 ? 'armado' : (l.cantidad_armada > 0 ? 'parcial' : 'pendiente');
    const badgeText = pct >= 1 ? 'ARMADO' : (l.cantidad_armada > 0 ? 'PARCIAL' : 'PENDIENTE');
    const checked = pct >= 1 ? 'checked' : '';

    html += `<tr data-linea="${l.linea_zoho_id}">
      <td>${esc(l.descripcion)}</td>
      <td class="mono" style="text-align:center;">${l.cantidad_total}</td>
      <td style="display:flex;align-items:center;gap:6px;">
        <input type="number" class="linea-input ${inputClass}" min="0" max="${l.cantidad_total}" step="1"
          value="${l.cantidad_armada}" data-so="${soId}" data-total="${l.cantidad_total}"
          onblur="guardarLinea('${soId}','${l.linea_zoho_id}',this)"
          onkeydown="if(event.key==='Enter')this.blur()">
        <input type="checkbox" class="chk-todo" ${checked}
          title="TODO" onchange="todoLinea('${soId}','${l.linea_zoho_id}',this,${l.cantidad_total})">
      </td>
      <td></td>
      <td><span class="linea-badge ${badgeClass}">${badgeText}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="eliminarLinea('${soId}','${l.linea_zoho_id}')" title="Eliminar">&times;</button></td>
    </tr>`;
  });

  html += '</tbody></table>';

  // Eliminadas
  if (eliminadas.length) {
    html += `<div class="eliminadas-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      &#9660; VER ELIMINADAS (${eliminadas.length})</div>
    <div style="display:none;"><table class="lineas-table" style="margin-top:6px;">
      <tbody>`;
    eliminadas.forEach(l => {
      html += `<tr class="fila-eliminada">
        <td>${esc(l.descripcion)}</td>
        <td class="mono" style="text-align:center;">${l.cantidad_total}</td>
        <td class="mono" style="text-align:center;">${l.cantidad_armada}</td>
        <td colspan="2"></td>
        <td><button class="btn btn-ghost btn-sm" onclick="restaurarLinea('${soId}','${l.linea_zoho_id}')">RESTAURAR</button></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Proyecto selector — combo buscable
  const soEstado = so || {};
  const proyActual = soEstado.proyecto_id ? proyectos.find(p => p.id === soEstado.proyecto_id) : null;
  const proyActualLabel = proyActual ? [proyActual.nombre, proyActual.cliente_nombre, proyActual.obra].filter(Boolean).join(' · ') : '';
  html += `<div class="proy-selector">
    <label>VINCULAR A PROYECTO</label>
    <div class="proy-combo" id="proy-combo-${soId}">
      <input type="text" class="proy-combo-input" id="proy-input-${soId}"
        placeholder="Buscar proyecto..." value="${esc(proyActualLabel)}"
        onfocus="abrirProyCombo('${soId}','${esc(so?.cliente_nombre || '')}')"
        oninput="filtrarProyCombo('${soId}')">
      ${soEstado.proyecto_id ? `<button class="proy-combo-clear" onclick="vincularProyecto('${soId}','');document.getElementById('proy-input-${soId}').value='';cerrarProyCombo('${soId}')">&times;</button>` : ''}
      <div class="proy-combo-list" id="proy-list-${soId}"></div>
    </div>
  </div>`;

  det.innerHTML = html;

  // Actualizar estado desde datos de la API
  const lineasActivas = (res.lineas || []).filter(l => !l.eliminada);
  const totalLineas = lineasActivas.length;
  const armadasLineas = lineasActivas.filter(l => l.cantidad_armada >= l.cantidad_total && l.cantidad_total > 0).length;
  const estadoPrevio = so ? so.estado : null;
  actualizarEstadoCard(soId, totalLineas, armadasLineas);
  // Persistir si cambió
  if (so && so.estado !== estadoPrevio) {
    const firstLinea = lineasActivas[0];
    if (firstLinea) {
      await apiPost('upsert-linea-estado', {
        so_zoho_id: soId, so_numero: so.so_numero,
        linea_zoho_id: firstLinea.linea_zoho_id, estado: so.estado,
      });
    }
  }
}

function actualizarEstadoCard(soId, total, armadas) {
  const so = allSos.find(s => s.so_zoho_id === soId);
  if (!so) return;
  so.lineas_total = total;
  so.lineas_armadas = armadas;
  const estado = armadas === total && total > 0 ? 'completo'
    : armadas > 0 ? 'parcial' : 'pendiente';
  so.estado = estado;
  const badge = document.querySelector(`.so-badge[data-so="${soId}"]`);
  const dot = document.querySelector(`.so-dot[data-so="${soId}"]`);
  const prog = document.querySelector(`.so-progreso[data-so="${soId}"]`);
  if (badge) { badge.textContent = estado.toUpperCase(); badge.className = 'so-badge ' + estado; }
  if (dot) dot.className = 'so-dot ' + estado;
  if (prog) prog.textContent = armadas + '/' + total + ' líneas';
}

// ═══════════════════════════════════════════════════════════════
// ACCIONES
// ═══════════════════════════════════════════════════════════════
async function marcarTodo(soId) {
  const res = await apiGet('detalle-so-zoho', '&so_zoho_id=' + soId);
  if (!res.ok) return;
  const so = allSos.find(s => s.so_zoho_id === soId);
  const visibles = (res.lineas || []).filter(l => !l.eliminada && l.cantidad_armada < l.cantidad_total);
  await Promise.all(visibles.map(l =>
    apiPost('upsert-linea-estado', {
      so_zoho_id: soId, so_numero: so?.so_numero, linea_zoho_id: l.linea_zoho_id,
      empleado_id: EMPLEADO_ID, cantidad_armada: l.cantidad_total, estado: 'completo',
    })
  ));
  await cargarDetalle(soId);
}

async function guardarLinea(soId, lineaId, input) {
  const so = allSos.find(s => s.so_zoho_id === soId);
  const val = Math.max(0, parseInt(input.value) || 0);
  input.value = val;
  // Actualizar visual primero para calcular estado
  actualizarFilaLinea(soId, input);
  await apiPost('upsert-linea-estado', {
    so_zoho_id: soId, so_numero: so?.so_numero, linea_zoho_id: lineaId,
    empleado_id: EMPLEADO_ID, cantidad_armada: val, estado: so.estado,
  });
}

async function todoLinea(soId, lineaId, chk, total) {
  const so = allSos.find(s => s.so_zoho_id === soId);
  const val = chk.checked ? total : 0;
  // Actualizar input y visual de la fila primero
  const row = chk.closest('tr');
  const inp = row.querySelector('.linea-input');
  if (inp) { inp.value = val; actualizarFilaLinea(soId, inp); }
  await apiPost('upsert-linea-estado', {
    so_zoho_id: soId, so_numero: so?.so_numero, linea_zoho_id: lineaId,
    empleado_id: EMPLEADO_ID, cantidad_armada: val, estado: so.estado,
  });
}

function actualizarFilaLinea(soId, input) {
  const val = Number(input.value);
  const total = Number(input.dataset.total || 0);
  const pct = total > 0 ? val / total : 0;
  input.className = 'linea-input ' + (pct >= 1 ? 'done' : (val > 0 ? 'partial' : ''));
  const row = input.closest('tr');
  if (row) {
    const badge = row.querySelector('.linea-badge');
    if (badge) {
      const cls = pct >= 1 ? 'armado' : (val > 0 ? 'parcial' : 'pendiente');
      const txt = pct >= 1 ? 'ARMADO' : (val > 0 ? 'PARCIAL' : 'PENDIENTE');
      badge.className = 'linea-badge ' + cls;
      badge.textContent = txt;
    }
    const chk = row.querySelector('.chk-todo');
    if (chk) chk.checked = pct >= 1;
  }
  // Recalcular estado card desde DOM y persistir
  const inputs = document.querySelectorAll(`.linea-input[data-so="${soId}"]`);
  let t = inputs.length, a = 0;
  inputs.forEach(inp => {
    if (Number(inp.value) >= Number(inp.dataset.total || 0) && Number(inp.dataset.total || 0) > 0) a++;
  });
  actualizarEstadoCard(soId, t, a);
}

async function eliminarLinea(soId, lineaId) {
  if (!confirm('¿Eliminar esta línea del seguimiento?')) return;
  const so = allSos.find(s => s.so_zoho_id === soId);
  await apiPost('upsert-linea-estado', {
    so_zoho_id: soId, so_numero: so?.so_numero, linea_zoho_id: lineaId,
    empleado_id: EMPLEADO_ID, eliminada: true,
  });
  cargarDetalle(soId);
}

async function restaurarLinea(soId, lineaId) {
  const so = allSos.find(s => s.so_zoho_id === soId);
  await apiPost('upsert-linea-estado', {
    so_zoho_id: soId, so_numero: so?.so_numero, linea_zoho_id: lineaId,
    empleado_id: EMPLEADO_ID, eliminada: false,
  });
  cargarDetalle(soId);
}

async function toggleOcultar(soId, oculta) {
  if (oculta && !confirm('¿Ocultar esta SO de la lista?')) return;
  const so = allSos.find(s => s.so_zoho_id === soId);
  await apiPost('ocultar-so', { so_zoho_id: soId, so_numero: so?.so_numero, oculta });
  // Actualizar estado local
  if (so) so.oculta = oculta;
  aplicarFiltros();
}

async function vincularProyecto(soId, proyId) {
  const so = allSos.find(s => s.so_zoho_id === soId);
  await apiPost('vincular-proyecto', { so_zoho_id: soId, so_numero: so?.so_numero, proyecto_id: proyId || null });
  if (so) so.proyecto_id = proyId || null;
  aplicarFiltros();
}

function proyLabel(p) { return [p.nombre, p.cliente_nombre, p.obra].filter(Boolean).join(' · ') || p.numero; }

function abrirProyCombo(soId, clienteNombre) {
  const list = document.getElementById('proy-list-' + soId);
  const input = document.getElementById('proy-input-' + soId);
  input.select();
  const q = '';
  renderProyList(soId, q, clienteNombre);
  list.classList.add('open');
  // Cerrar al hacer click fuera
  setTimeout(() => document.addEventListener('click', function handler(e) {
    const combo = document.getElementById('proy-combo-' + soId);
    if (combo && !combo.contains(e.target)) { cerrarProyCombo(soId); document.removeEventListener('click', handler); }
  }), 10);
}

function filtrarProyCombo(soId) {
  const input = document.getElementById('proy-input-' + soId);
  const so = allSos.find(s => s.so_zoho_id === soId);
  renderProyList(soId, input.value, so?.cliente_nombre || '');
}

function renderProyList(soId, query, clienteNombre) {
  const list = document.getElementById('proy-list-' + soId);
  const q = query.toLowerCase();
  // Pre-filtrar por cliente si no hay query
  let filtered = proyectos;
  if (!q && clienteNombre) {
    const preFiltered = proyectos.filter(p => (p.cliente_nombre || '').toLowerCase().includes(clienteNombre.toLowerCase()));
    if (preFiltered.length > 0) filtered = preFiltered;
  }
  if (q) {
    filtered = proyectos.filter(p => proyLabel(p).toLowerCase().includes(q));
  }
  list.innerHTML = filtered.slice(0, 20).map(p =>
    `<div class="proy-combo-item" onclick="seleccionarProy('${soId}','${p.id}')">${esc(proyLabel(p))}</div>`
  ).join('') || '<div class="proy-combo-item" style="color:var(--muted);">Sin resultados</div>';
  list.classList.add('open');
}

function seleccionarProy(soId, proyId) {
  const p = proyectos.find(x => x.id === proyId);
  const input = document.getElementById('proy-input-' + soId);
  if (input && p) input.value = proyLabel(p);
  cerrarProyCombo(soId);
  vincularProyecto(soId, proyId);
}

function cerrarProyCombo(soId) {
  const list = document.getElementById('proy-list-' + soId);
  if (list) list.classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════
// IMPRESION DE ETIQUETA 60x30mm
// ═══════════════════════════════════════════════════════════════
async function imprimirEtiqueta(soId) {
  const so = allSos.find(s => s.so_zoho_id === soId);
  if (!so) return;

  // Fetch mueble/obra si nunca se expandió esta SO
  if (!so.mueble || !so.obra) {
    const res = await apiGet('detalle-so-zoho', '&so_zoho_id=' + soId);
    if (res.mueble) {
      so.mueble = res.mueble;
      const mEl = document.getElementById('mueble-' + soId);
      if (mEl) mEl.textContent = res.mueble;
    }
    if (res.obra) so.obra = res.obra;
  }

  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Etiqueta ${so.so_numero}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#fff;font-family:monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .label{width:60mm;height:30mm;border:.5px solid #999;display:flex;flex-direction:column;justify-content:center;padding:2mm 3mm;overflow:hidden;}
    .field-label{font-size:5pt;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3mm;}
    .field-value{font-size:10pt;font-weight:700;line-height:1.2;margin-bottom:1.5mm;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
    .field-value.mueble{font-size:8pt;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
    .no-print{margin:8mm;display:flex;gap:6mm;}
    @media print{.no-print{display:none;}body{min-height:auto;}@page{size:60mm 30mm;margin:0;}}
  </style></head><body>
  <div class="no-print">
    <button onclick="window.print()" style="padding:8px 18px;background:#FFD600;border:none;border-radius:5px;font-family:monospace;font-weight:700;font-size:11px;cursor:pointer;">IMPRIMIR</button>
    <button onclick="window.close()" style="padding:8px 14px;background:#333;color:#aaa;border:none;border-radius:5px;font-family:monospace;font-size:11px;cursor:pointer;">Cerrar</button>
  </div>
  <div class="label">
    <div class="field-label">CLIENTE</div>
    <div class="field-value">${esc(so.cliente_nombre || '—')}</div>
    <div class="field-label">OBRA</div>
    <div class="field-value">${esc(so.obra || '—')}</div>
    <div class="field-label">MUEBLE</div>
    <div class="field-value mueble">${esc(so.mueble || '—')}</div>
  </div>
  </body></html>`);
  w.document.close();
}

}

cargarTodo();
